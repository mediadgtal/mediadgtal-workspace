<style>
  :root{
    --sidebar-bg:#16151a; --bg:#1e1c22; --active-bg:#25232c;
    --accent:#cf9b4a; --accent-2:#d9914e; --accent-dim:#8a6a35;
    --pink:#c77398; --pink-bg:#33222a;
    --tool4arts-bg:#342c1f; --tool4arts-text:#cf9b4a;
    --rozwoj-bg:#322419; --rozwoj-text:#e0954a;
    --admin-text:#837a82; --admin-bg:#2a2830;
    --muted:#8a8390; --muted-light:#c5bec3;
    --danger:#d1636f;
    --border:#2a2830; --text:#f0eef2;
    --radius:12px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); display:flex; min-height:100vh; overflow-x:hidden;
    font-size:14px;
  }
  a{color:inherit}
  button{font-family:inherit; cursor:pointer}
  input,select,textarea{font-family:inherit; font-size:13.5px}

  /* ---- Sidebar ---- */
  #sidebar{
    width:230px; flex:0 0 230px; background:var(--sidebar-bg); color:var(--muted-light);
    display:flex; flex-direction:column; padding:20px 14px; gap:4px; border-right:1px solid var(--border);
  }
  #sidebar .brand{ padding:2px 4px 22px 4px; }
  #sidebar .brand img{ width:100%; height:auto; display:block; }
  .navitem{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:9px;
    color:var(--muted-light); text-decoration:none; font-size:13.5px; border:none; background:transparent; width:100%; text-align:left;
  }
  .navitem:hover{background:rgba(255,255,255,.04); color:#fff}
  .navitem.active{background:var(--active-bg); color:#fff; font-weight:600}

  @keyframes sunPulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.06)}}

  .wx-cloud{position:absolute; background:rgba(255,255,255,.85); border-radius:50px}
  .wx-cloud:before, .wx-cloud:after{content:""; position:absolute; background:inherit; border-radius:50%}
  .wx-cloud.c1{width:90px; height:28px; top:26px; left:-150px; animation:driftCloud 32s linear infinite}
  .wx-cloud.c1:before{width:42px; height:42px; top:-20px; left:10px}
  .wx-cloud.c1:after{width:32px; height:32px; top:-14px; left:44px}
  .wx-cloud.c2{width:66px; height:22px; top:78px; left:-120px; opacity:.7; animation:driftCloud 44s linear infinite; animation-delay:-12s}
  .wx-cloud.c2:before{width:32px; height:32px; top:-15px; left:8px}
  .wx-cloud.c2:after{width:24px; height:24px; top:-11px; left:32px}
  .wx-cloud.c3{width:104px; height:32px; top:128px; left:-160px; opacity:.55; animation:driftCloud 56s linear infinite; animation-delay:-26s}
  .wx-cloud.c3:before{width:48px; height:48px; top:-22px; left:14px}
  .wx-cloud.c3:after{width:36px; height:36px; top:-16px; left:54px}
  @keyframes driftCloud{from{left:-160px} to{left:100%}}

  @keyframes fallSnow{to{transform:translate(var(--drift,10px),260px)}}

function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function seedHistoricalLog(habitName, log){
  var hist = HABIT_HISTORY_2026[habitName];
  if(!hist) return;
  Object.keys(hist).forEach(function(ym){
    var parts = ym.split("-"), y = +parts[0], m = +parts[1];
    var dim = daysInMonth(y,m);
    var doneCount = Math.round(hist[ym]/100*dim);
    for(var d=1; d<=doneCount; d++){ log[ym+"-"+String(d).padStart(2,"0")] = true; }
  });
}
function habitMonthStats(h, ym){
  var parts = ym.split("-"), y = +parts[0], m = +parts[1];
  var dim = daysInMonth(y,m);
  var done = 0;
  for(var d=1; d<=dim; d++){
    if(h.log && h.log[ym+"-"+String(d).padStart(2,"0")]) done++;
  }
  return {done: done, days: dim, pct: dim ? Math.round(done/dim*100) : 0};
}
function habitYearStats(h, yr){
  var totalDone=0, totalDays=0;
  for(var m=1;m<=12;m++){
    var st = habitMonthStats(h, yr+"-"+String(m).padStart(2,"0"));
    totalDone += st.done; totalDays += st.days;
  }
  return {done: totalDone, days: totalDays, pct: totalDays ? Math.round(totalDone/totalDays*100) : 0};
}
function migrateHabit(h){
  if(!h.log){
    h.log = {};
    seedHistoricalLog(h.name, h.log);
  }
  return h;
}

function undoZad(){
  var a = zadUndoStack.pop();
  if(!a) return;
  if(a.type==="toggle"){
    var t = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t){ t.done = a.prevDone; t.completedAt = a.prevCompletedAt; }
  } else if(a.type==="add"){
    state.tasks = state.tasks.filter(function(t){return t.id!==a.id;});
  } else if(a.type==="edit"){
    var t2 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t2){ t2.title=a.prev.title; t2.category=a.prev.category; t2.scope=a.prev.scope; t2.createdAt=a.prev.createdAt; t2.completedAt=a.prev.completedAt; t2.recurWeekday=a.prev.recurWeekday; }
  } else if(a.type==="softdelete" || a.type==="restore"){
    var t3 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t3) t3.deletedAt = a.prevDeletedAt;
  } else if(a.type==="recurtoggle"){
    var t4 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t4){
      if(!t4.recurCompletions) t4.recurCompletions = {};
      if(a.prev) t4.recurCompletions[a.dateKey] = true; else delete t4.recurCompletions[a.dateKey];
    }
  }
  save(); renderAll();
}

function load(){
  var raw = localStorage.getItem(STORAGE_KEY);
  var def = defaultState();
  if(!raw){ state = def; save(); return; }
  try{
    var parsed = JSON.parse(raw);
    Object.keys(def).forEach(function(k){ if(!(k in parsed)) parsed[k] = def[k]; });
    state = migrateState(parsed);
  }catch(e){ state = def; }
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); scheduleHabitsBackupPush(); scheduleClientsBackupPush(); }

function renderNav(){
  var html = "";
  NAV_GROUPS.forEach(function(g){
    var groupTabs = TABS.filter(function(t){ return t.group===g; });
    if(!groupTabs.length) return;
    html += '<div class="nav-group-label">'+g+'</div>';
    groupTabs.forEach(function(t){
      html += '<button class="navitem'+(currentTab===t.id?" active":"")+'" onclick="switchTab(\''+t.id+'\')">'+
        '<span class="ico">'+(TAB_ICON_SVG[t.id]||"")+'</span><span>'+t.label+'</span></button>';
    });
  });
  document.getElementById("navwrap").innerHTML = html;
}

  currentTab = id;

}

function renderDashboard(el){
  var todayWd = todayWeekdayIdx();
  var todayTasks = state.tasks.filter(function(t){
    if(t.scope!=="dzien" || t.deletedAt) return false;
    if(t.recurWeekday!=null) return t.recurWeekday===todayWd && !(t.recurCompletions && t.recurCompletions[todayStr()]);
    return !t.done;
  });
  var monthTasks = state.tasks.filter(function(t){ return t.scope==="miesiac" && !t.done && !t.deletedAt; });
  var today = todayStr();
  var weekDates = currentWeekDates();

  var gcalConnected = !!(window.__gcalToken && gcalCalendars);
  if(gcalConnected) ensureGCalDashboardEvents();
  var gcalLoadingDash = gcalConnected && !gcalDashboardCache;
  var eventsSource = gcalConnected && gcalDashboardCache ? gcalDashboardCache.events : state.events;
  var todayEvents = eventsSource.filter(function(e){ return e.date === today; });
  var weekEvents = eventsSource.filter(function(e){ return weekDates.indexOf(e.date) !== -1; });

  var html = '<div class="card weather-hero" id="weatherHero">'+
    '<div id="weatherAnimLayer" class="weather-anim"></div>'+
    '<div class="weather-hero-content"><div class="hero-top-row">'+
    '<div class="hero-greet-block"><p class="hero-greet">Cześć, Damian.</p><div class="hero-date">'+
    new Date().toLocaleDateString("pl-PL",{weekday:"long", day:"numeric", month:"long"})+'</div></div>'+
    renderWeatherWidget()+'</div></div></div>';

  html += '<div class="grid grid-2" style="margin-top:16px">';

  html += '<div class="card"><h3>Zadania na dziś</h3>';
  if(!todayTasks.length){ html += '<div class="empty">Brak zadań na dziś — dobra robota.</div>'; }

function formatFollowerCount(n){
  var sign = n<0 ? "-" : "";
  var abs = Math.abs(n);
  if(abs>=1000000) return sign+(abs/1000000).toFixed(1)+"M";
  if(abs>=1000) return sign+(abs/1000).toFixed(1)+"K";
  return sign+String(abs);
}
function computeSocialTrend(history){
  if(!history || !history.length) return null;
  var sorted = history.slice().sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:0); });
  var latest = sorted[sorted.length-1];
  if(sorted.length===1) return {current:latest.count, delta:null};
  var latestDate = new Date(latest.date+"T00:00:00");
  var weekAgoTarget = new Date(latestDate); weekAgoTarget.setDate(weekAgoTarget.getDate()-7);
  var prev = null;
  for(var i=sorted.length-2; i>=0; i--){
    var d = new Date(sorted[i].date+"T00:00:00");
    if(d <= weekAgoTarget){ prev = sorted[i]; break; }
  }
  if(!prev) prev = sorted[0];
  if(prev===latest) return {current:latest.count, delta:null};
  return {current:latest.count, delta:latest.count-prev.count};
}

function weatherCategory(code, isNight){
  if(code===0) return isNight?"clear-night":"clear-day";
  if(code===1 || code===2) return isNight?"cloudy-night":"clear-day";
  if(code===3) return isNight?"cloudy-night":"cloudy";
  if(code===45 || code===48) return "fog";
  if([51,53,55,56,57,61,63,65,66,67,80,81].indexOf(code)>=0) return "rain";
  if([71,73,75,77,85,86].indexOf(code)>=0) return "snow";
  if([82,95,96,99].indexOf(code)>=0) return "storm";
  return isNight?"clear-night":"clear-day";
}

function buildSnowFlakes(){

function loadWeather(forceRetry){
  var cacheRaw = localStorage.getItem(WEATHER_CACHE_KEY);
  var cache = null;
  try{ cache = cacheRaw ? JSON.parse(cacheRaw) : null; }catch(e){ cache = null; }
  if(cache && !forceRetry){ renderWeatherFromData(cache); }
  if(cache && !forceRetry && (Date.now()-cache.ts) < WEATHER_MAX_AGE_MS) return;
  if(!navigator.geolocation){ if(!cache) renderWeatherError("Twoja przeglądarka nie wspiera geolokalizacji.", false); return; }
  if(!cache) renderWeatherError("Pobieranie lokalizacji…", false);
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    var url = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+
      "&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7";
    fetch(url).then(function(r){ return r.json(); }).then(function(j){
      var place = null;
      fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude="+lat+"&longitude="+lon+"&localityLanguage=pl")
        .then(function(r){ return r.json(); }).then(function(g){
          if(g) place = g.city || g.locality || null;
        }).catch(function(){})
        .finally(function(){
          var data = {
            ts: Date.now(),
            place: place,
            current: {temp: j.current.temperature_2m, code: j.current.weather_code},
            daily: j.daily.time.map(function(date, i){
              return {date: date, tmax: j.daily.temperature_2m_max[i], tmin: j.daily.temperature_2m_min[i], code: j.daily.weather_code[i]};
            })
          };
          localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify(data));
          renderWeatherFromData(data);
        });
    }).catch(function(){
      if(!cache) renderWeatherError("Nie udało się pobrać pogody.", true);
    });
  }, function(err){
    if(!cache) renderWeatherError(err.code===1 ? "Brak zgody na lokalizację — włącz ją w ustawieniach przeglądarki." : "Nie udało się ustalić lokalizacji.", true);
  }, {timeout:10000, maximumAge:600000});
}

      verifyAndStoreGmailToken(resp.access_token);
    }
  });
  client.requestAccessToken({prompt:"", hint: email});
}
function verifyAndStoreGmailToken(token){
  fetch("https://www.googleapis.com/oauth2/v3/userinfo", {headers:{Authorization:"Bearer "+token}})
    .then(function(r){ return r.json(); })
    .then(function(info){
      if(!info.email) throw new Error("no email");
      gmailTokens[info.email] = token;
      delete gmailConnectError[info.email];
      ensureGmailMessages(info.email, true);
    })
    .catch(function(){
      alert("Nie udało się zweryfikować konta Google.");
    });
}
function setGmailFilter(v){ gmailActiveFilter = v; renderAll(); }
function ensureGmailMessages(email, force){
  if(!gmailTokens[email]) return;
  if(!force && gmailCache[email] && (Date.now()-gmailCache[email].fetchedAt) < 120000) return;
  if(gmailLoading[email]) return;
  gmailLoading[email] = true;
  var token = gmailTokens[email];
  fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=12&labelIds=INBOX", {headers:{Authorization:"Bearer "+token}})
    .then(function(r){
      if(r.status===401){ delete gmailTokens[email]; throw new Error("401"); }
      if(!r.ok) throw new Error("list failed");
      return r.json();
    })
    .then(function(data){
      var ids = (data.messages||[]).map(function(m){ return m.id; });
      return Promise.all(ids.map(function(id){
        return fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/"+id+
          "?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date&metadataHeaders=Message-Id&metadataHeaders=References",
          {headers:{Authorization:"Bearer "+token}}).then(function(r){ return r.json(); });
      }));
    })
    .then(function(msgs){
      gmailCache[email] = {
        fetchedAt: Date.now(),
        messages: msgs.map(function(m){
          var headers = {};
          ((m.payload && m.payload.headers) || []).forEach(function(h){ headers[h.name] = h.value; });
          return {
            id: m.id, threadId: m.threadId,
            from: headers["From"]||"", subject: headers["Subject"]||"(bez tematu)",
            date: headers["Date"]||"", messageIdHeader: headers["Message-Id"]||"",
            references: headers["References"]||"",
            snippet: m.snippet||"", unread: (m.labelIds||[]).indexOf("UNREAD")!==-1
          };
        }).sort(function(a,b){ return new Date(b.date) - new Date(a.date); })
      };
      gmailLoading[email] = false;
      renderAll();
    })
    .catch(function(){
      gmailLoading[email] = false;
      gmailConnectError[email] = "Nie udało się pobrać wiadomości.";
      renderAll();
    });
}

function sendGmailReply(email, id){
  var body = document.getElementById("gmailReplyBody").value.trim();
  if(!body) return;
  var msg = gmailCache[email] && gmailCache[email].messages.filter(function(m){ return m.id===id; })[0];
  var token = gmailTokens[email];
  if(!msg || !token) return;
  var fromMatch = msg.from.match(/<([^>]+)>/);
  var replyTo = fromMatch ? fromMatch[1] : msg.from;
  var subj = /^Re:/i.test(msg.subject) ? msg.subject : "Re: "+msg.subject;
  var lines = [
    "To: "+replyTo,
    "Subject: "+subj,
    "In-Reply-To: "+msg.messageIdHeader,
    "References: "+(msg.references ? msg.references+" " : "")+msg.messageIdHeader,
    "Content-Type: text/plain; charset=UTF-8",
    "",
    body
  ];
  var raw = lines.join("\r\n");
  var rawB64 = btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send", {
    method:"POST",
    headers:{Authorization:"Bearer "+token, "Content-Type":"application/json"},
    body: JSON.stringify({raw: rawB64, threadId: msg.threadId})
  }).then(function(r){
    if(!r.ok) throw new Error("send failed");
    closeGmailModal();
    alert("Odpowiedź wysłana.");
  }).catch(function(){
    alert("Nie udało się wysłać odpowiedzi.");
  });
}

  var last = acc.stats[acc.stats.length-1].followers;
  var prev = acc.stats.length>1 ? acc.stats[acc.stats.length-2].followers : last;
  var change = last - prev;
  var goal = milestoneGoal(last);

  html += '<div class="prof-row"><div class="avatar">'+acc.initials+'</div><div>'+
    '<div class="prof-name">'+escapeHtml(platform==="instagram"?acc.handle:acc.name)+'</div>'+

  html += '<div class="kpi-row">'+
    '<div><div class="k-value">'+last+'</div><div class="k-label">Obserwujący (ostatni wpis)</div></div>'+
    '<div><div class="k-value accent">'+(change>=0?"+":"")+change+'</div><div class="k-label">Zmiana od poprzedniego wpisu</div></div>'+
    '<div><div class="k-value">'+acc.stats.length+'</div><div class="k-label">Zapisanych pomiarów</div></div>'+
    '</div>';

  if(needsWeeklyUpdate(acc)){
    html += '<div class="stub-note" style="background:rgba(207,155,74,.14)"><b>Czas zaktualizować obserwujących</b> — ostatni wpis: '+fmtDate(acc.stats[acc.stats.length-1].date)+'. '+
      '<span class="measure-row" style="display:inline-flex; gap:8px; margin-top:8px">'+
      '<input type="date" id="measureDate" value="'+todayStr()+'" style="width:auto">'+
      '<input type="number" id="measureVal" placeholder="Liczba obserw." style="width:120px">'+
      '<button class="btn small" onclick="saveMeasurement(\''+platform+'\')">Zapisz</button></span></div>';
  }

  html += '<div class="progress-label"><span>Postęp do kolejnego kamienia milowego</span><span>'+last+' / '+goal+' obserwujących</span></div>';
  html += '<div class="habit-bar"><div style="width:'+Math.min(100,Math.round(last/goal*100))+'%"></div></div>';

  var enriched = acc.stats.map(function(s,i){
    var prevF = i>0 ? acc.stats[i-1].followers : s.followers;
    return {date:s.date, followers:s.followers, delta:s.followers-prevF};
  });
  html += '<div class="chiprow" style="margin-top:16px">';
  [["tydzien","Tydzień"],["miesiac","Miesiąc"],["kwartal","Kwartał"],["rok","Rok"]].forEach(function(pair){
    html += '<span class="chip'+(socialRange===pair[0]?" active":"")+'" onclick="setSocialRange(\''+pair[0]+'\')">'+pair[1]+'</span>';
  });
  html += '</div>';
  html += lineChart(filterStatsByRange(enriched, socialRange));

  var brand = accBrand(acc);
  var weekDates = currentWeekDates();
  var weekPlan = state.contentCalendar.filter(function(c){ return c.brand===brand && weekDates.indexOf(c.date)!==-1; })
    .sort(function(a,b){ return a.date<b.date?-1:1; });
  html += '<div class="card" style="margin-top:16px"><h3>Plan publikacji w tym tygodniu</h3>';
  if(!weekPlan.length){ html += '<div class="empty">Brak zaplanowanych publikacji w tym tygodniu.</div>'; }
  else{
    weekPlan.forEach(function(c){
      html += '<div class="taskitem"><span class="dot"></span><span class="ttitle"><b>'+fmtDate(c.date)+'</b> ('+escapeHtml(c.day)+') — '+escapeHtml(c.topic)+'</span></div>';
    });
  }
  html += '</div>';

  el.innerHTML = html;
}
function filterStatsByRange(stats, range){
  var days = {tydzien:7, miesiac:31, kwartal:93, rok:366}[range] || 366;
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-days);
  var cutoffStr = cutoff.toISOString().slice(0,10);
  var filtered = stats.filter(function(s){ return s.date >= cutoffStr; });
  return filtered.length ? filtered : stats.slice(-1);
}
function lineChart(stats){
  var w=1200, h=220, pad=10;
  var vals = stats.map(function(s){return s.followers;});
  var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  if(min===max){ min -= 1; max += 1; }
  var stepX = (w-pad*2)/(stats.length-1 || 1);
  var pts = stats.map(function(s,i){
    var x = pad + i*stepX;
    var y = h-pad - ((s.followers-min)/(max-min))*(h-pad*2);
    return [x,y];
  });
  var line = pts.map(function(p,i){ return (i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
  var area = line + " L"+pts[pts.length-1][0].toFixed(1)+","+(h-pad)+" L"+pts[0][0].toFixed(1)+","+(h-pad)+" Z";
  var gid = "grad"+Math.random().toString(36).slice(2,7);
  var last = pts[pts.length-1];
  var dots = stats.map(function(s,i){
    var deltaTxt = (s.delta>=0?"+":"")+s.delta;
    var title = "Tydzień "+fmtDate(s.date)+": "+s.followers+" obserwujących ("+deltaTxt+" vs poprzedni tydzień)";
    return '<circle cx="'+pts[i][0].toFixed(1)+'" cy="'+pts[i][1].toFixed(1)+'" r="9" fill="transparent" stroke="none"><title>'+escapeHtml(title)+'</title></circle>';
  }).join("");
  return '<div class="card" style="padding:20px 20px 6px"><svg viewBox="0 0 '+w+' '+h+'" style="width:100%; height:180px; display:block">'+
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#cf9b4a" stop-opacity="0.35"/><stop offset="100%" stop-color="#cf9b4a" stop-opacity="0"/>'+
    '</linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#'+gid+')" stroke="none"/>'+
    '<path d="'+line+'" fill="none" stroke="#cf9b4a" stroke-width="2.5"/>'+
    '<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="4" fill="#cf9b4a"/>'+
    dots+
    '</svg></div>';
}

  var now = new Date();

    }
    if(scope==="miesiac"){

          '<input type="checkbox" onchange="'+togFn+'(\''+t.id+'\')">'+
          '<span class="dot"></span>'+

          '</div>';
      });

    }
    html += '</div>';
  });

  el.innerHTML = html;

function saveTaskModal(){
  var title = document.getElementById("tmTitle").value.trim();
  if(!title) return;
  var category = document.getElementById("tmCategory").value;
  var isRecur = document.getElementById("tmRecur").checked;
  var ctx = window.__taskModalCtx || {};

  if(isRecur){
    var recurDay = +document.getElementById("tmRecurDay").value;
    if(ctx.id){
      var t = state.tasks.filter(function(x){return x.id===ctx.id;})[0];
      if(t){
        pushZadUndo({type:"edit", id:t.id, prev:{title:t.title, category:t.category, scope:t.scope, createdAt:t.createdAt, completedAt:t.completedAt, recurWeekday:(t.recurWeekday!=null?t.recurWeekday:null)}});
        t.title = title; t.category = category; t.scope = "dzien"; t.recurWeekday = recurDay;
        if(!t.recurCompletions) t.recurCompletions = {};
      }
    } else {
      var newRecurTask = {id:uid("task"), title:title, category:category, scope:"dzien", done:false, createdAt:todayStr(), completedAt:null, recurWeekday:recurDay, recurCompletions:{}};
      state.tasks.unshift(newRecurTask);
      pushZadUndo({type:"add", id:newRecurTask.id});
    }
  } else {
    var scope = document.getElementById("tmScope").value;
    var date = document.getElementById("tmDate").value || todayStr();
    if(ctx.id){
      var t2 = state.tasks.filter(function(x){return x.id===ctx.id;})[0];
      if(t2){
        pushZadUndo({type:"edit", id:t2.id, prev:{title:t2.title, category:t2.category, scope:t2.scope, createdAt:t2.createdAt, completedAt:t2.completedAt, recurWeekday:(t2.recurWeekday!=null?t2.recurWeekday:null)}});
        t2.title = title; t2.category = category; t2.scope = scope; t2.recurWeekday = null;
        if(t2.completedAt) t2.completedAt = date; else t2.createdAt = date;
      }
    } else {
      var newTask = {id:uid("task"), title:title, category:category, scope:scope, done:false, createdAt:date, completedAt:null, recurWeekday:null};
      state.tasks.unshift(newTask);
      pushZadUndo({type:"add", id:newTask.id});
    }
  }
  closeTaskModal();
  save(); renderAll();
}

function deleteTask(id){

  t.deletedAt = todayStr();
  save(); renderAll();
}
function restoreTask(id){

  if(!t) return;
  pushZadUndo({type:"restore", id:id, prevDeletedAt:t.deletedAt||null});
  t.deletedAt = null;
  save(); renderAll();
}
function purgeTaskNow(id){
  if(!confirm("Usunąć na stałe? Tego nie można cofnąć.")) return;
  state.tasks = state.tasks.filter(function(t){return t.id!==id;});
  save(); renderAll();
}
function purgeAllTasksNow(){
  var count = state.tasks.filter(function(t){ return t.deletedAt; }).length;
  if(!count) return;
  if(!confirm("Trwale usunąć wszystkie ("+count+") zadania z kosza? Tego nie można cofnąć.")) return;
  state.tasks = state.tasks.filter(function(t){ return !t.deletedAt; });
  save(); renderAll();
}
function renderZadaniaUsuniete(){
  var now = Date.now();
  var items = state.tasks.filter(function(t){ return t.deletedAt && matchesZadSearch(t); });
  items.sort(function(a,b){ return a.deletedAt < b.deletedAt ? 1 : -1; });

  var html = '<div class="stub-note">Zadania usunięte trafiają tutaj na 30 dni, potem znikają na stałe.</div>';
  if(items.length){
    html += '<div style="text-align:right; margin-bottom:10px"><button class="btn danger small" onclick="purgeAllTasksNow()">Wyczyść wszystkie</button></div>';
  }
  html += '<div class="card"><table><thead><tr><th>Zadanie</th><th>Usunięto</th><th>Zostało dni</th><th></th></tr></thead><tbody>';
  if(!items.length){ html += '<tr><td colspan="4"><div class="empty">Kosz jest pusty.</div></td></tr>'; }
  items.forEach(function(t){
    var daysLeft = Math.max(0, 30 - Math.floor((now - new Date(t.deletedAt+"T00:00:00").getTime())/86400000));
    html += '<tr><td>'+escapeHtml(t.title)+'</td>'+
      '<td>'+fmtDate(t.deletedAt)+'</td>'+
      '<td>'+daysLeft+'</td>'+
      '<td><button class="linklike" onclick="restoreTask(\''+t.id+'\')">Przywróć</button> <button class="linklike danger" onclick="purgeTaskNow(\''+t.id+'\')">Usuń na stałe</button></td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

/* ================= KALENDARZ ================= */
function gcalMonthKey(){ return calYear+"-"+calMonth; }
function ensureGCalCalendars(){
  if(!window.__gcalToken || gcalCalendars || gcalLoading) return;
  gcalLoading = true;
  gcalConnectError = null;
  fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList", {headers:{Authorization:"Bearer "+window.__gcalToken}})
    .then(function(r){ if(r.status===401){ window.__gcalToken=null; throw new Error("401"); } return r.json(); })
    .then(function(j){
      gcalCalendars = (j.items||[]).map(function(it){ return {id:it.id, name:it.summary, color:it.backgroundColor||"#8a8390"}; });
      gcalLoading = false;
      renderAll();
      fetchGCalEventsForVisibleMonth();
    }).catch(function(){
      gcalLoading = false;
      gcalConnectError = "Nie udało się pobrać listy kalendarzy Google.";
      renderAll();
    });
}
function eventDateRange(it){
  var startStr = it.start.date || (it.start.dateTime||"").slice(0,10);
  var endRaw = it.end && (it.end.date || (it.end.dateTime||"").slice(0,10));
  if(!endRaw) return [startStr];
  var start = new Date(startStr+"T00:00:00");
  var end = new Date(endRaw+"T00:00:00");
  if(it.end.date){ end.setDate(end.getDate()-1); } // all-day end date w Google jest wyłączna
  if(end < start) end = new Date(start);
  var dates = [];
  var cur = new Date(start);
  while(cur <= end){
    dates.push(cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0")+"-"+String(cur.getDate()).padStart(2,"0"));
    cur.setDate(cur.getDate()+1);
  }
  return dates.length ? dates : [startStr];
}
function fetchGCalEventsForVisibleMonth(){
  if(!gcalCalendars || !window.__gcalToken) return;
  var key = gcalMonthKey();
  if(gcalEventsCache[key]){ renderAll(); return; }
  var first = new Date(calYear, calMonth, 1);
  var startOffset = (first.getDay()+6)%7;
  var gridStart = new Date(calYear, calMonth, 1-startOffset);
  var gridEnd = new Date(gridStart); gridEnd.setDate(gridStart.getDate()+42);
  var timeMin = gridStart.toISOString(), timeMax = gridEnd.toISOString();
  Promise.all(gcalCalendars.map(function(cal){
    return fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(cal.id)+"/events?timeMin="+encodeURIComponent(timeMin)+"&timeMax="+encodeURIComponent(timeMax)+"&singleEvents=true&orderBy=startTime", {headers:{Authorization:"Bearer "+window.__gcalToken}})
      .then(function(r){ if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); } return r.json(); })
      .then(function(j){
        var out = [];
        (j.items||[]).forEach(function(it){
          if(!it.start) return;
          var dates = eventDateRange(it);
          var t = it.start.dateTime ? it.start.dateTime.slice(11,16) : null;
          var rawStart = it.start.date || (it.start.dateTime||"").slice(0,10);
          var rawEnd = (it.end && (it.end.date || (it.end.dateTime||"").slice(0,10))) || rawStart;
          dates.forEach(function(d){
            out.push({id:it.id, calendarId:cal.id, title: it.summary||"(bez tytułu)", date:d, time:t,
              calendarName:cal.name, calendarColor:cal.color, allDay: !!it.start.date,
              rawStartDate: rawStart, rawEndDate: rawEnd, multiDay: dates.length>1});
          });
        });
        return out;
      }).catch(function(){ return []; });
  })).then(function(results){
    gcalEventsCache[key] = [].concat.apply([], results);
    renderAll();
  });
}
var gcalDashboardCache = null; // {key:"start_end", events:[...]} zakres dziś→koniec tygodnia widoczny na Dashboardzie
function ensureGCalDashboardEvents(){
  if(!window.__gcalToken || !gcalCalendars) return;
  var weekDates = currentWeekDates();
  var key = weekDates[0]+"_"+weekDates[6];
  if(gcalDashboardCache && gcalDashboardCache.key===key) return;
  var timeMin = new Date(weekDates[0]+"T00:00:00").toISOString();
  var lastDay = new Date(weekDates[6]+"T00:00:00"); lastDay.setDate(lastDay.getDate()+1);
  var timeMax = lastDay.toISOString();
  Promise.all(gcalCalendars.map(function(cal){
    return fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(cal.id)+"/events?timeMin="+encodeURIComponent(timeMin)+"&timeMax="+encodeURIComponent(timeMax)+"&singleEvents=true&orderBy=startTime", {headers:{Authorization:"Bearer "+window.__gcalToken}})
      .then(function(r){ if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); } return r.json(); })
      .then(function(j){
        var out = [];
        (j.items||[]).forEach(function(it){
          if(!it.start) return;
          var dates = eventDateRange(it);
          var t = it.start.dateTime ? it.start.dateTime.slice(11,16) : null;
          dates.forEach(function(d){
            out.push({title: it.summary||"(bez tytułu)", date:d, time:t, calendarName:cal.name, calendarColor:cal.color});
          });
        });
        return out;
      }).catch(function(){ return []; });
  })).then(function(results){
    gcalDashboardCache = {key:key, events: [].concat.apply([], results)};
    renderAll();
  });
}
window.onGCalTokenReady = function(){
  gcalCalendars = null; gcalEventsCache = {}; gcalDashboardCache = null; gcalConnectError = null;
  ensureGCalCalendars();
  ensureHabitsBackupSheet();
  scheduleHabitsBackupPush();
  ensureClientsBackupSheet();
  scheduleClientsBackupPush();
};
function renderKalendarz(el){
  var now = new Date();
  if(calMonth===undefined){ calMonth = now.getMonth(); calYear = now.getFullYear(); }
  setTopActions('<button class="btn" onclick="promptAddEvent()">+ Wydarzenie</button>');

  if(window.__gcalToken && !gcalCalendars && !gcalLoading){ ensureGCalCalendars(); }

  var html = '<div id="cmdbox"><input type="text" id="nlpInput" placeholder=\'np. dodaj spotkanie z Martą 10.07. godz. 12:00, Plaza Poznań, kalendarz "wspólny"\'>'+
    '<button class="btn" onclick="submitNlp()">Dodaj</button></div>';

  if(!window.__gcalToken){
    html += '<div class="stub-note">Kalendarz lokalny (dane offline). <a href="#" onclick="window.reconnectGCal(); return false;" style="color:var(--accent)">Połącz z Google Calendar</a>, żeby zobaczyć i dodawać prawdziwe wydarzenia.</div>';
  } else if(gcalLoading || (!gcalCalendars && !gcalConnectError)){
    html += '<div class="stub-note">Łączenie z Google Calendar…</div>';
  } else if(gcalConnectError){
    html += '<div class="stub-note">'+escapeHtml(gcalConnectError)+' <a href="#" onclick="window.reconnectGCal(); return false;" style="color:var(--accent)">Spróbuj ponownie</a></div>';
  } else {
    html += '<div class="stub-note">Połączono z Google Calendar ('+gcalCalendars.map(function(c){return escapeHtml(c.name);}).join(", ")+').</div>';
  }

  var legendSource = gcalCalendars || state.calendars;
  html += '<div class="cal-legend">';
  legendSource.forEach(function(c){
    html += '<span><i style="background:'+c.color+'"></i>'+escapeHtml(c.name)+'</span>';
  });
  html += '</div>';

  html += '<div class="cal-header"><button class="btn secondary small" onclick="calNav(-1)">← Poprzedni</button>'+
    '<h2>'+monthName(calMonth)+' '+calYear+'</h2>'+
    '<button class="btn secondary small" onclick="calNav(1)">Następny →</button></div>';

  var today = todayStr();
  var gcalEvents = gcalCalendars ? (gcalEventsCache[gcalMonthKey()]||null) : null;
  calEventRefs = [];
  var isMobile = window.innerWidth <= 860;

  if(isMobile){
    html += '<div class="cal-agenda">';
    var dim = daysInMonth(calYear, calMonth+1);
    for(var d=1; d<=dim; d++){
      var dstr = calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      var isToday = dstr===today;
      var wd = dowShort(calYear, calMonth+1, d);
      var evs = calEventsForDay(dstr, gcalEvents);
      html += '<div class="cal-agenda-row'+(isToday?" today":"")+'" ondblclick="openEventModal({date:\''+dstr+'\'})">'+
        '<div class="cal-agenda-date"><span class="cal-agenda-dow">'+wd+'</span><span class="cal-agenda-num">'+d+'</span></div>'+
        '<div class="cal-agenda-events">';
      if(!evs.length){ html += '<span style="color:var(--muted); font-size:12px">—</span>'; }
      evs.forEach(function(ev){
        var idx = calEventRefs.length;
        calEventRefs.push(ev.ctx);
        html += '<div class="cal-ev" style="background:'+ev.color+'; white-space:normal; font-size:12px" onclick="event.stopPropagation(); openEventModal(calEventRefs['+idx+'])">'+(ev.time?ev.time+" · ":"")+escapeHtml(ev.title)+'</div>';
      });
      html += '</div></div>';
    }
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  html += '<div class="cal-scroll" id="calScrollBox"><div class="cal-grid">';
  WEEKDAYS_SHORT.forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });

  var first = new Date(calYear, calMonth, 1);
  var startOffset = (first.getDay()+6)%7; // Monday=0
  var gridStart = new Date(calYear, calMonth, 1-startOffset);
  for(var i=0;i<42;i++){
    var gd = new Date(gridStart); gd.setDate(gridStart.getDate()+i);
    var gdstr = gd.getFullYear()+"-"+String(gd.getMonth()+1).padStart(2,"0")+"-"+String(gd.getDate()).padStart(2,"0");
    var inMonth = gd.getMonth()===calMonth;
    var gIsToday = gdstr===today;
    var gEvs = calEventsForDay(gdstr, gcalEvents);
    html += '<div class="cal-cell'+(inMonth?"":" out")+(gIsToday?" today":"")+'" ondblclick="openEventModal({date:\''+gdstr+'\'})"><div class="cal-daynum">'+gd.getDate()+'</div>';
    gEvs.forEach(function(ev){
      var idx = calEventRefs.length;
      calEventRefs.push(ev.ctx);
      html += '<div class="cal-ev" style="background:'+ev.color+'" title="'+escapeHtml(ev.title)+'" onclick="event.stopPropagation(); openEventModal(calEventRefs['+idx+'])">'+escapeHtml(ev.title)+'</div>';
    });
    html += '</div>';
    if(i===41) break;
  }
  html += '</div></div>';

  el.innerHTML = html;
  attachPinchZoom("calScrollBox");
}
function calEventsForDay(dstr, gcalEvents){
  var dayEvents;
  if(gcalEvents!==null){
    dayEvents = gcalEvents.filter(function(e){ return e.date===dstr; });
  } else {
    var dwd = (new Date(dstr+"T00:00:00").getDay()+6)%7;
    dayEvents = state.events.filter(function(e){
      if(e.date===dstr) return true;
      if(e.recurWeekday!=null && e.recurWeekday===dwd && dstr>=e.date) return true;
      return false;
    });
  }
  return dayEvents.map(function(e){
    if(gcalEvents!==null){
      return {
        color: e.calendarColor, title: e.title + (e.multiDay ? " ↔" : ""), time: e.time,
        ctx: {existing:true, source:"gcal", id:e.id, calendarId:e.calendarId, title:e.title, date:dstr, time:e.time,
          calendar:e.calendarName, allDay:e.allDay, rawStartDate:e.rawStartDate, rawEndDate:e.rawEndDate}
      };
    }
    var cal = state.calendars.filter(function(c){return c.name===e.calendar;})[0] || {color:"#8a8390"};
    return {
      color: cal.color, title: e.title, time: e.time,
      ctx: {existing:true, source:"local", id:e.id, title:e.title, date:e.date, time:e.time, calendar:e.calendar}
    };
  });
}
function closeEventModal(){
  var m = document.getElementById("eventModal");
  if(m) m.remove();
  window.__eventModalCtx = null;
}
function openEventModal(opts){
  closeEventModal();
  var isEdit = !!opts.existing;
  var calSource = gcalCalendars || state.calendars;
  var disableCalSelect = isEdit && opts.source==="gcal";
  var calOptions = calSource.map(function(c){
    return '<option value="'+escapeHtml(c.name)+'"'+((opts.calendar||"")===c.name?" selected":"")+'>'+escapeHtml(c.name)+'</option>';
  }).join("");
  var dateLabel = "Data" + (isEdit && opts.rawStartDate && opts.rawEndDate && opts.rawStartDate!==opts.rawEndDate ? " początkowa (wydarzenie trwa kilka dni — przesunięcie zachowa długość)" : "");
  var html = '<div class="modal-overlay" id="eventModal">'+
    '<div class="modal-box card">'+
    '<h3>'+(isEdit?"Edytuj wydarzenie":"Nowe wydarzenie")+'</h3>'+
    '<div class="field"><label>Tytuł</label><input type="text" id="evmTitle" value="'+escapeHtml(opts.title||"")+'"></div>'+
    '<div class="field"><label>'+dateLabel+'</label><input type="date" id="evmDate" value="'+(opts.date||todayStr())+'"></div>'+
    '<div class="field"><label>Godzina (opcjonalnie)</label><input type="time" id="evmTime" value="'+(opts.time||"")+'"></div>'+
    '<div class="field"><label>Kalendarz</label><select id="evmCal"'+(disableCalSelect?" disabled":"")+'>'+calOptions+'</select></div>'+
    (isEdit ? '' : '<div class="field"><label style="display:flex; align-items:center; gap:6px"><input type="checkbox" id="evmRecur" style="width:auto">🔁 Cykliczne — co tydzień, w ten sam dzień tygodnia</label></div>')+
    '<div class="row" style="justify-content:flex-end; gap:8px; margin-top:14px">'+
    (isEdit ? '<button class="btn danger small" onclick="deleteEventModal()">Usuń</button>' : '')+
    '<button class="btn secondary small" onclick="closeEventModal()">Anuluj</button>'+
    '<button class="btn small" onclick="saveEventModal()">Zapisz</button>'+
    '</div></div></div>';
  document.body.insertAdjacentHTML("beforeend", html);
  window.__eventModalCtx = opts;
}
var RRULE_BYDAY = ["MO","TU","WE","TH","FR","SA","SU"]; // 0=Pon..6=Ndz
function saveEventModal(){
  var ctx = window.__eventModalCtx || {};
  var title = document.getElementById("evmTitle").value.trim();
  var date = document.getElementById("evmDate").value;
  var time = document.getElementById("evmTime").value;
  var calName = document.getElementById("evmCal").value;
  if(!title || !date){ alert("Podaj przynajmniej tytuł i datę."); return; }
  var recurEl = document.getElementById("evmRecur");
  var isRecur = !ctx.existing && recurEl && recurEl.checked;

  var useGcal = ctx.source==="gcal" || (!ctx.existing && gcalCalendars && window.__gcalToken);
  if(useGcal){
    var cal = gcalCalendars.filter(function(c){return c.name===calName;})[0] || gcalCalendars[0];
    var targetCalendarId = ctx.existing ? ctx.calendarId : cal.id;
    var body = {summary:title};
    if(ctx.existing && ctx.allDay){
      if(date===ctx.rawStartDate){
        body.start = {date:ctx.rawStartDate};
        body.end = {date:ctx.rawEndDate};
      } else {
        var deltaDays = Math.round((new Date(date+"T00:00:00") - new Date(ctx.rawStartDate+"T00:00:00"))/86400000);
        var endD = new Date(ctx.rawEndDate+"T00:00:00"); endD.setDate(endD.getDate()+deltaDays);
        body.start = {date:date};
        body.end = {date: endD.getFullYear()+"-"+String(endD.getMonth()+1).padStart(2,"0")+"-"+String(endD.getDate()).padStart(2,"0")};
      }
    } else if(time){
      var parts = time.split(":"); var endH = (parseInt(parts[0],10)+1)%24;
      body.start = {dateTime:date+"T"+time+":00", timeZone:"Europe/Warsaw"};
      body.end = {dateTime:date+"T"+String(endH).padStart(2,"0")+":"+parts[1]+":00", timeZone:"Europe/Warsaw"};
    } else {
      body.start = {date:date};
      body.end = {date:date};
    }
    if(isRecur){
      var recurWd = (new Date(date+"T00:00:00").getDay()+6)%7;
      body.recurrence = ["RRULE:FREQ=WEEKLY;BYDAY="+RRULE_BYDAY[recurWd]];
    }
    var url = "https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(targetCalendarId)+"/events"+(ctx.existing?"/"+encodeURIComponent(ctx.id):"");
    fetch(url, {
      method: ctx.existing ? "PATCH" : "POST",
      headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
      body: JSON.stringify(body)
    }).then(function(r){
      if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); }
      if(!r.ok) throw new Error("save failed");
      return r.json();
    }).then(function(){
      closeEventModal();
      delete gcalEventsCache[gcalMonthKey()];
      fetchGCalEventsForVisibleMonth();
    }).catch(function(){
      alert("Nie udało się zapisać wydarzenia w Google Calendar — spróbuj połączyć ponownie.");
    });
  } else {
    if(ctx.existing){
      var t = state.events.filter(function(x){return x.id===ctx.id;})[0];
      if(t){ t.title=title; t.date=date; t.time=time||null; t.calendar=calName; save(); }
    } else {
      var newEv = {id:uid("ev"), title:title, date:date, time:time||null, location:null, calendar:calName};
      if(isRecur){ newEv.recurWeekday = (new Date(date+"T00:00:00").getDay()+6)%7; }
      state.events.push(newEv);
      save();
    }
    closeEventModal();
    renderAll();
  }
}
function deleteEventModal(){
  var ctx = window.__eventModalCtx || {};
  if(!confirm('Usunąć wydarzenie "'+ctx.title+'"?')) return;
  if(ctx.source==="gcal"){
    fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(ctx.calendarId)+"/events/"+encodeURIComponent(ctx.id), {
      method:"DELETE",
      headers:{Authorization:"Bearer "+window.__gcalToken}
    }).then(function(r){
      if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); }
      if(!r.ok && r.status!==410 && r.status!==204) throw new Error("delete failed");
      closeEventModal();
      delete gcalEventsCache[gcalMonthKey()];
      fetchGCalEventsForVisibleMonth();
    }).catch(function(){
      alert("Nie udało się usunąć wydarzenia.");
    });
  } else {
    state.events = state.events.filter(function(x){return x.id!==ctx.id;});
    save();
    closeEventModal();
    renderAll();
  }
}
function calNav(dir){
  calMonth += dir;
  if(calMonth<0){ calMonth=11; calYear--; }
  if(calMonth>11){ calMonth=0; calYear++; }
  if(gcalCalendars) fetchGCalEventsForVisibleMonth();
  renderAll();
}
function parseEventCommand(text){
  var res = {title:null, date:null, time:null, location:null, calendar:"Osobiste"};
  var t = text.trim();
  t = t.replace(/^dodaj\s+(spotkanie|wydarzenie)\s+z\s+/i, "spotkanie z ");
  var dateMatch = t.match(/(\d{1,2})\.(\d{1,2})\.?/);
  if(dateMatch){
    var day = parseInt(dateMatch[1],10), month = parseInt(dateMatch[2],10);
    var year = new Date().getFullYear();
    res.date = year+"-"+String(month).padStart(2,"0")+"-"+String(day).padStart(2,"0");
  }
  var timeMatch = t.match(/godz\.?\s*(\d{1,2}):(\d{2})/i);
  if(timeMatch){ res.time = String(timeMatch[1]).padStart(2,"0")+":"+timeMatch[2]; }
  var calSource = gcalCalendars || state.calendars;
  if(gcalCalendars){
    var wspolny = gcalCalendars.filter(function(c){ return c.name.toLowerCase().indexOf("wspólny")!==-1 || c.name.toLowerCase().indexOf("wspolny")!==-1; })[0];
    res.calendar = wspolny ? wspolny.name : gcalCalendars[0].name;
  }
  var calMatch = t.match(/kalendarz\s+"([^"]+)"/i);
  if(calMatch){
    var name = calMatch[1];
    var found = calSource.filter(function(c){ return c.name.toLowerCase()===name.toLowerCase() || c.name.toLowerCase().indexOf(name.toLowerCase())!==-1; })[0];
    res.calendar = found ? found.name : (gcalCalendars ? gcalCalendars[0].name : (name.charAt(0).toUpperCase()+name.slice(1)));
  }
  var withMatch = t.match(/z\s+([A-ZŻŹĆĄŚĘŁÓŃ][a-ząćęłńóśźż]+(?:\s+[A-ZŻŹĆĄŚĘŁÓŃ][a-ząćęłńóśźż]+)?)/);
  var locMatch = t.match(/,\s*([A-ZŻŹĆĄŚĘŁÓŃ][^,]*?)(?:,\s*kalendarz|$)/);
  if(locMatch){ res.location = locMatch[1].trim(); }

  var titleParts = ["Spotkanie"];
  if(withMatch){ titleParts.push("z "+withMatch[1]); }
  res.title = titleParts.join(" ");
  return res;
}
function insertGCalEvent(parsed){
  var cal = gcalCalendars.filter(function(c){ return c.name===parsed.calendar; })[0] || gcalCalendars[0];
  var body;
  if(parsed.time){
    var parts = parsed.time.split(":");
    var endH = (parseInt(parts[0],10)+1)%24;
    var endTime = String(endH).padStart(2,"0")+":"+parts[1];
    body = {summary:parsed.title, location:parsed.location||undefined,
      start:{dateTime:parsed.date+"T"+parsed.time+":00", timeZone:"Europe/Warsaw"},
      end:{dateTime:parsed.date+"T"+endTime+":00", timeZone:"Europe/Warsaw"}};
  } else {
    body = {summary:parsed.title, location:parsed.location||undefined,
      start:{date:parsed.date}, end:{date:parsed.date}};
  }
  fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(cal.id)+"/events", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify(body)
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); }
    if(!r.ok) throw new Error("insert failed");
    return r.json();
  }).then(function(){
    delete gcalEventsCache[gcalMonthKey()];
    fetchGCalEventsForVisibleMonth();
  }).catch(function(){
    alert("Nie udało się dodać wydarzenia do Google Calendar — spróbuj połączyć ponownie (przycisk w Kalendarzu).");
    renderAll();
  });
}
function submitNlp(){
  var val = document.getElementById("nlpInput").value;
  if(!val.trim()) return;
  var parsed = parseEventCommand(val);
  if(!parsed.date){ alert("Nie udało się rozpoznać daty w komendzie."); return; }
  if(gcalCalendars && window.__gcalToken){
    insertGCalEvent(parsed);
  } else {
    state.events.push({id:uid("ev"), title:parsed.title, date:parsed.date, time:parsed.time, location:parsed.location, calendar:parsed.calendar});
    save();
  }
  document.getElementById("nlpInput").value = "";
  renderAll();
}
function promptAddEvent(){
  var title = prompt("Tytuł wydarzenia:"); if(!title) return;
  var date = prompt("Data (RRRR-MM-DD):", todayStr()); if(!date) return;
  var time = prompt("Godzina (GG:MM), opcjonalnie:", "");
  var calendarName = gcalCalendars ? gcalCalendars[0].name : "Osobiste";
  if(gcalCalendars && gcalCalendars.length>1){
    var pick = prompt("Kalendarz ("+gcalCalendars.map(function(c){return c.name;}).join("/")+"):", calendarName);

function dowShort(y,m,d){ return HABIT_DOW_SHORT[(new Date(y,m-1,d).getDay()+6)%7]; }

var nawykiTab = null; // "YYYY-MM" wybranego miesiąca albo "TOTAL"
var nawykiYear = null;
var nawykiUndoStack = [];
function renderAllKeepScroll(scrollBoxId){
  var box = document.getElementById(scrollBoxId);
  var pos = box ? box.scrollLeft : null;
  renderAll();
  if(pos!=null){
    var box2 = document.getElementById(scrollBoxId);
    if(box2) box2.scrollLeft = pos;
  }
}
var pinchZoomLevels = {nawykiScrollBox:1, klienciScrollBox:1, calScrollBox:1};
function attachPinchZoom(boxId){
  var box = document.getElementById(boxId);
  if(!box) return;
  box.style.zoom = pinchZoomLevels[boxId];
  var startDist = 0, startZoom = 1;
  box.ontouchstart = function(e){
    if(e.touches.length===2){
      startDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      startZoom = pinchZoomLevels[boxId];
    }
  };
  box.ontouchmove = function(e){
    if(e.touches.length===2 && startDist>0){
      e.preventDefault();
      var dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      var scale = startZoom * (dist/startDist);
      scale = Math.max(0.4, Math.min(1.6, scale));
      pinchZoomLevels[boxId] = scale;
      box.style.zoom = scale;
    }
  };
}
function pushNawykiUndo(action){
  nawykiUndoStack.push(action);
  if(nawykiUndoStack.length>50) nawykiUndoStack.shift();
}
function undoNawyki(){
  var a = nawykiUndoStack.pop();
  if(!a) return;
  if(a.type==="toggle"){
    var h = state.habits.filter(function(x){return x.id===a.habitId;})[0];
    if(h){ if(a.prev) h.log[a.dateKey] = true; else delete h.log[a.dateKey]; }
  } else if(a.type==="rename"){
    var h2 = state.habits.filter(function(x){return x.id===a.habitId;})[0];
    if(h2) h2.name = a.prevName;
  } else if(a.type==="delete"){
    state.habits.splice(a.index, 0, a.habit);
  } else if(a.type==="add"){
    state.habits = state.habits.filter(function(h){return h.id!==a.habitId;});
  } else if(a.type==="reportrow-add"){
    var rr1 = state.habitReports[a.ym];
    if(rr1) rr1.splice(a.index,1);
  } else if(a.type==="reportrow-edit"){
    var rr2 = state.habitReports[a.ym];
    if(rr2 && rr2[a.index]) rr2[a.index][a.field] = a.prevValue;
  } else if(a.type==="reportrow-delete"){
    var rr3 = state.habitReports[a.ym];
    if(rr3) rr3.splice(a.index, 0, a.row);
  }
  save(); renderAllKeepScroll("nawykiScrollBox");
}

function updateHabitReportRow(ym, idx, field, val){

  rows[idx][field] = val;

function deleteHabit(id){
  if(!confirm("Na pewno usunąć ten nawyk? Możesz to cofnąć przyciskiem \"Cofnij\".")) return;
  var idx = -1;
  for(var i=0;i<state.habits.length;i++){ if(state.habits[i].id===id){ idx=i; break; } }
  if(idx<0) return;
  var removed = state.habits[idx];
  state.habits.splice(idx,1);
  pushNawykiUndo({type:"delete", habit:removed, index:idx});
  save(); renderAll();
}

/* ---- Kopia zapasowa Nawyków w osobnym arkuszu Google Sheets (nie dotyka arkusza Damiana) ---- */
var habitsBackupSyncTimer = null;
var habitsBackupPending = false;
var habitsBackupCreating = false;
var habitsBackupStatus = "idle"; // idle|ok|error

function ensureHabitsBackupSheet(){
  if(!window.__gcalToken || state.habitsBackupSheetId || habitsBackupCreating) return;
  habitsBackupCreating = true;
  fetch("https://sheets.googleapis.com/v4/spreadsheets", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      properties:{title:"Nawyki — kopia zapasowa (system)"},
      sheets:[{properties:{title:"TOTAL"}},{properties:{title:"RAW"}},{properties:{title:"RAPORTY"}}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    return r.json();
  }).then(function(data){
    habitsBackupCreating = false;
    if(data.spreadsheetId){
      state.habitsBackupSheetId = data.spreadsheetId;
      state.habitsBackupSheetUrl = data.spreadsheetUrl || ("https://docs.google.com/spreadsheets/d/"+data.spreadsheetId+"/edit");
      save();
      renderAll();
    }
  }).catch(function(){ habitsBackupCreating = false; });
}
function scheduleHabitsBackupPush(){
  if(!window.__gcalToken || !state.habitsBackupSheetId) return;
  habitsBackupPending = true;
  if(habitsBackupSyncTimer) clearTimeout(habitsBackupSyncTimer);
  habitsBackupSyncTimer = setTimeout(flushHabitsBackupPush, 1500);
}
function flushHabitsBackupPush(){
  if(!habitsBackupPending) return;
  habitsBackupPending = false;
  if(!window.__gcalToken || !state.habitsBackupSheetId) return;
  var yr = new Date().getFullYear();

  var totalHeader = ["NAWYK","WYKONANIA (ROK)","DNI (ROK)","% ROK"].concat(HABIT_MONTH_ABBR.map(function(mn){return mn.toUpperCase();})).concat(["SUMA"]);
  var totalRows = [totalHeader];
  state.habits.forEach(function(h){
    var ys = habitYearStats(h, String(yr));
    var row = [h.name, ys.done, ys.days, ys.pct+"%"];
    for(var m=1;m<=12;m++){ row.push(habitMonthStats(h, yr+"-"+String(m).padStart(2,"0")).pct+"%"); }
    row.push(ys.done);
    totalRows.push(row);
  });

  var rawRows = [["id","name","log_json"]];
  state.habits.forEach(function(h){ rawRows.push([h.id, h.name, JSON.stringify(h.log||{})]); });

  var reportRows = [["miesiac","dni","raport"]];
  Object.keys(state.habitReports||{}).sort().forEach(function(ym){
    var rows = state.habitReports[ym];
    if(typeof rows === "string"){ reportRows.push([ym, "", rows]); return; }
    (rows||[]).forEach(function(r){ reportRows.push([ym, r.value||"", r.label||""]); });
  });

  fetch("https://sheets.googleapis.com/v4/spreadsheets/"+state.habitsBackupSheetId+"/values:batchUpdate", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      valueInputOption:"RAW",
      data:[
        {range:"TOTAL!A1", values: totalRows},
        {range:"RAW!A1", values: rawRows},
        {range:"RAPORTY!A1", values: reportRows}
      ]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    habitsBackupStatus = r.ok ? "ok" : "error";
  }).catch(function(){ habitsBackupStatus = "error"; });
}

function renderClientFieldInput(ym, r, f){
  var val = r[f.key];

  if(f.type==="select"){
    var opts = f.options.map(function(o){ return '<option value="'+escapeHtml(o)+'"'+(val===o?" selected":"")+'>'+(o||"—")+'</option>'; }).join("");
    return '<select onchange="'+onCh+'" style="min-width:120px">'+opts+'</select>';
  }
  if(f.type==="number"){
    return '<input type="number" value="'+(val||0)+'" onchange="'+onCh+'" style="width:85px">';
  }
  if(f.type==="date" && f.key==="koniecKampanii"){
    var kVal = computeKoniecDate(r);
    var kColor = resolvedDateColor(r, f.key);
    var kstyle = "width:135px; text-align:center; padding:9px 6px; border-radius:8px; border:1px solid "+(kColor||"var(--border)")+
      "; background:"+(kColor||"var(--sidebar-bg)")+"; color:"+(kColor?"#fff":"var(--text)")+"; font-size:13px";
    return '<div class="row" style="gap:4px; flex-wrap:nowrap">'+
      '<div title="Wyliczane automatycznie: Start Współpracy + Okres (dni)" style="'+kstyle+'">'+(kVal||"—")+'</div>'+
      '<span onclick="openColorPicker(\''+ym+'\',\''+r.id+'\',\''+f.key+'\')" title="Zmień kolor" '+
      'style="cursor:pointer; width:15px; height:15px; border-radius:3px; border:1px solid var(--border); background:'+(kColor||"transparent")+'; flex:0 0 15px"></span></div>';
  }
  if(f.type==="date"){
    var color = resolvedDateColor(r, f.key);
    var dstyle = "width:135px"+(color?"; background:"+color+"; color:#fff; border-color:"+color:"");
    return '<div class="row" style="gap:4px; flex-wrap:nowrap">'+
      '<input type="date" value="'+(val||"")+'" onchange="'+onCh+'" style="'+dstyle+'">'+
      '<span onclick="openColorPicker(\''+ym+'\',\''+r.id+'\',\''+f.key+'\')" title="Zmień kolor" '+
      'style="cursor:pointer; width:15px; height:15px; border-radius:3px; border:1px solid var(--border); background:'+(color||"transparent")+'; flex:0 0 15px"></span></div>';
  }
  if(f.key==="notatki"){
    return '<input type="text" value="'+escapeHtml(val||"")+'" onchange="'+onCh+'" style="min-width:240px">';
  }
  return '<input type="text" value="'+escapeHtml(val||"")+'" onchange="'+onCh+'" style="min-width:120px">';
}

      return '<div class="row" style="gap:5px; margin-bottom:5px">'+row.map(function(c){

function applyDateColor(ym, rowId, field, color){
  var rows = state.clientsMonthly[ym]||[];
  var r = rows.filter(function(x){return x.id===rowId;})[0];
  if(!r) return;
  if(!r.dateColors) r.dateColors = {};
  var prev = r.dateColors[field] || null;
  if(prev===color) { closeColorPicker(); return; }
  pushKlienciUndo({type:"dateColor", ym:ym, rowId:rowId, field:field, prevValue:prev});
  r.dateColors[field] = color;
  closeColorPicker();
  save(); renderAllKeepScroll("klienciScrollBox");
}

function renderKlienciTotal(yr){
  var html = '<div class="card"><div style="overflow-x:auto"><table class="nawyki-grid"><thead><tr>'+
    '<th style="position:sticky; left:0; background:var(--bg)">Miesiąc</th><th>Łączna Ilość Klientów</th>'+
    '<th>Nowi Klienci</th><th>Wynagrodzenie</th><th>Cel $</th><th>% Celu</th></tr></thead><tbody>';
  var sumWyn=0, sumCel=0, sumNowi=0;
  for(var m=1;m<=12;m++){
    var ym = yr+"-"+String(m).padStart(2,"0");
    var s = clientMonthSummary(ym);
    var cel = (state.clientsGoals[ym]!=null) ? state.clientsGoals[ym] : 0;
    var pctCelu = cel>0 ? Math.round(s.wynagrodzenia/cel*100)+"%" : "—";
    sumWyn += s.wynagrodzenia; sumCel += cel; sumNowi += s.nowi;
    html += '<tr><td style="position:sticky; left:0; background:var(--bg); font-weight:600">'+monthName(m-1)+'</td>'+
      '<td style="text-align:right">'+s.laczna+'</td>'+
      '<td style="text-align:right">'+s.nowi+'</td>'+
      '<td style="text-align:right; color:var(--accent); font-weight:600">'+fmtPln(s.wynagrodzenia)+'</td>'+
      '<td style="text-align:right"><input type="number" value="'+cel+'" onchange="updateClientGoal(\''+ym+'\',this.value)" style="width:95px; text-align:right"></td>'+
      '<td style="text-align:right; font-weight:700">'+pctCelu+'</td></tr>';
  }
  var pctCeluYear = sumCel>0 ? Math.round(sumWyn/sumCel*100)+"%" : "—";
  html += '<tr style="font-weight:700"><td style="position:sticky; left:0; background:var(--bg)">Wyniki (Rok)</td>'+
    '<td></td>'+
    '<td style="text-align:right">'+sumNowi+'</td>'+
    '<td style="text-align:right; color:var(--accent)">'+fmtPln(sumWyn)+'</td>'+
    '<td style="text-align:right">'+fmtPln(sumCel)+'</td>'+
    '<td style="text-align:right">'+pctCeluYear+'</td></tr>';
  html += '</tbody></table></div></div>';
  return html;
}

function updateClientField(ym, rowId, field, value){
  var rows = state.clientsMonthly[ym]||[];
  var r = rows.filter(function(x){return x.id===rowId;})[0];
  if(!r) return;
  var prev = r[field];
  var isNumeric = typeof prev==="number";
  var val = isNumeric ? (+value||0) : value;
  if(prev===val) return;
  pushKlienciUndo({type:"field", ym:ym, rowId:rowId, field:field, prevValue:prev});
  r[field] = val;
  save(); renderAllKeepScroll("klienciScrollBox");
}
function updateClientGoal(ym, value){
  var prev = state.clientsGoals[ym]||0;
  var val = +value||0;
  if(prev===val) return;
  pushKlienciUndo({type:"goal", ym:ym, prevValue:prev});
  state.clientsGoals[ym] = val;
  save(); renderAll();
}
function addClientRow(){
  if(!klienciTab || klienciTab==="TOTAL") return;
  if(!state.clientsMonthly[klienciTab]) state.clientsMonthly[klienciTab] = [];
  var row = mkClient("","","","",0,0,0,0,"","","","","","");
  state.clientsMonthly[klienciTab].push(row);
  pushKlienciUndo({type:"add", ym:klienciTab, rowId:row.id});
  save(); renderAll();
}
function deleteClientRow(ym, rowId){
  if(!confirm("Na pewno usunąć tego klienta z tego miesiąca? Możesz to cofnąć przyciskiem \"Cofnij\".")) return;
  var rows = state.clientsMonthly[ym]||[];
  var idx = -1;
  for(var i=0;i<rows.length;i++){ if(rows[i].id===rowId){ idx=i; break; } }
  if(idx<0) return;
  var removed = rows[idx];
  rows.splice(idx,1);
  pushKlienciUndo({type:"delete", ym:ym, row:removed, index:idx});
  save(); renderAll();
}

/* ---- Kopia zapasowa Klientów w osobnym arkuszu Google Sheets (nie dotyka Bazy Klientów Agencji 2026) ---- */
var clientsBackupSyncTimer = null;
var clientsBackupPending = false;
var clientsBackupCreating = false;
var clientsBackupStatus = "idle";

function ensureClientsBackupSheet(){
  if(!window.__gcalToken || state.clientsBackupSheetId || clientsBackupCreating) return;
  clientsBackupCreating = true;
  fetch("https://sheets.googleapis.com/v4/spreadsheets", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      properties:{title:"Klienci — kopia zapasowa (system)"},
      sheets:[{properties:{title:"TOTAL"}},{properties:{title:"RAW"}}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    return r.json();
  }).then(function(data){
    clientsBackupCreating = false;
    if(data.spreadsheetId){
      state.clientsBackupSheetId = data.spreadsheetId;
      state.clientsBackupSheetUrl = data.spreadsheetUrl || ("https://docs.google.com/spreadsheets/d/"+data.spreadsheetId+"/edit");
      save(); renderAll();
    }
  }).catch(function(){ clientsBackupCreating = false; });
}
function scheduleClientsBackupPush(){
  if(!window.__gcalToken || !state.clientsBackupSheetId) return;
  clientsBackupPending = true;
  if(clientsBackupSyncTimer) clearTimeout(clientsBackupSyncTimer);
  clientsBackupSyncTimer = setTimeout(flushClientsBackupPush, 1500);
}
function flushClientsBackupPush(){
  if(!clientsBackupPending) return;
  clientsBackupPending = false;
  if(!window.__gcalToken || !state.clientsBackupSheetId) return;
  var yr = new Date().getFullYear();

  var totalRows = [["MIESIĄC","ŁĄCZNA ILOŚĆ KLIENTÓW","NOWI KLIENCI","WYNAGRODZENIE","CEL $","% CELU"]];
  for(var m=1;m<=12;m++){
    var ym = yr+"-"+String(m).padStart(2,"0");
    var s = clientMonthSummary(ym);
    var cel = state.clientsGoals[ym]||0;
    var pctCelu = cel>0 ? Math.round(s.wynagrodzenia/cel*100)+"%" : "";
    totalRows.push([monthName(m-1), s.laczna, s.nowi, s.wynagrodzenia, cel, pctCelu]);
  }

  var rawRows = [["miesiac","id","nazwa","lokalizacja","faktura","statusKlienta","wynagrodzenie","budzetRekl","iloscWsp","okresDni","etapWsp","startKampanii","koniecKampanii","cel","ocenaWsp","notatki"]];
  Object.keys(state.clientsMonthly).sort().forEach(function(ym){
    (state.clientsMonthly[ym]||[]).forEach(function(r){
      rawRows.push([ym, r.id, r.nazwa, r.lokalizacja, r.faktura, r.statusKlienta, r.wynagrodzenie, r.budzetRekl, r.iloscWsp, r.okresDni, r.etapWsp, r.startKampanii, computeKoniecDate(r), r.cel, r.ocenaWsp, r.notatki]);
    });
  });

  fetch("https://sheets.googleapis.com/v4/spreadsheets/"+state.clientsBackupSheetId+"/values:batchUpdate", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      valueInputOption:"RAW",
      data:[{range:"TOTAL!A1", values: totalRows},{range:"RAW!A1", values: rawRows}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    clientsBackupStatus = r.ok ? "ok" : "error";
  }).catch(function(){ clientsBackupStatus = "error"; });
}

/* ================= STATYSTYKI ================= */
function renderStatystyki(el){
  var now = new Date();
  var html = '<div class="chiprow">';
  ["miesiac","rok"].forEach(function(p){
    var labels = {miesiac:"Miesiąc", rok:"Rok"};
    html += '<span class="chip'+(statPeriod===p?" active":"")+'" onclick="setStatPeriod(\''+p+'\')">'+labels[p]+'</span>';
  });
  if(!statMonthVal) statMonthVal = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  if(!statYearVal) statYearVal = String(now.getFullYear());
  html += '</div>';
  if(statPeriod==="miesiac"){
    html += monthYearPickerHtml(statMonthVal, "setStatMonth");
  } else {
    html += '<div class="row" style="gap:6px; margin-bottom:10px; align-items:center">'+
      '<button class="btn secondary small" onclick="changeStatYear(-1)">◀</button>'+
      '<b style="font-size:13px; flex:1; text-align:center">'+statYearVal+'</b>'+
      '<button class="btn secondary small" onclick="changeStatYear(1)">▶</button></div>';
  }

  var cats = ["Wszystko","Cele","Zadania","Nawyki","Finanse","Posty","Instagram","Facebook"];
  html += '<div class="chiprow">';
  cats.forEach(function(c){
    html += '<span class="chip'+(statCats[c]?" active":"")+'" onclick="toggleStatCat(\''+c+'\')">'+c+'</span>';
  });
  html += '</div>';

  var periodKey, rangeLabel, matchesPeriod;
  if(statPeriod==="miesiac"){
    var ym = statMonthVal;
    var parts = ym.split("-"); var y = parseInt(parts[0],10), m = parseInt(parts[1],10);
    var start = y+"-"+String(m).padStart(2,"0")+"-01";
    var lastDay = new Date(y, m, 0).getDate();
    var end = y+"-"+String(m).padStart(2,"0")+"-"+lastDay;
    periodKey = ym;
    rangeLabel = monthName(m-1)+' '+y+'</b> ('+start+' → '+end+')';
    matchesPeriod = function(dateStr){ return dateStr && dateStr.slice(0,7)===ym; };
  } else {
    var yr = statYearVal;
    periodKey = yr;
    rangeLabel = 'Rok '+yr+'</b> ('+yr+'-01-01 → '+yr+'-12-31)';
    matchesPeriod = function(dateStr){ return dateStr && dateStr.slice(0,4)===yr; };
  }
  html += '<div style="color:var(--muted); font-size:12.5px; margin-bottom:16px">Zakres: <b style="color:var(--muted-light)">'+rangeLabel+'</div>';

  var showAll = statCats["Wszystko"];
  html += '<div class="grid grid-2">';

  if(showAll || statCats["Cele"]){
    var ig1 = state.igAccounts[0];
    html += '<div class="card"><h3>Cele</h3>'+goalBar("Instagram "+ig1.handle, ig1.stats[ig1.stats.length-1].followers, ig1.goal)+goalBar("tool4arts — klienci",0,100)+'</div>';
  }
  if(showAll || statCats["Zadania"]){
    var periodTasksCreated = state.tasks.filter(function(t){ return matchesPeriod(t.createdAt); });
    var doneInPeriod = state.tasks.filter(function(t){ return matchesPeriod(t.completedAt); });
    html += '<div class="card"><h3>Zadania</h3><table>'+
      '<tr><td>Ukończone w okresie</td><td style="text-align:right">'+doneInPeriod.length+'</td></tr>'+
      '<tr><td>Utworzone w okresie</td><td style="text-align:right">'+periodTasksCreated.length+'</td></tr>'+
      '<tr><td>Aktualnie otwarte (wszystkie)</td><td style="text-align:right">'+state.tasks.filter(function(t){return !t.done;}).length+'</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Nawyki"]){
    html += '<div class="card"><h3>Nawyki</h3>';
    state.habits.forEach(function(h){
      var pct = statPeriod==="miesiac" ? habitMonthStats(h, periodKey).pct : habitYearStats(h, periodKey).pct;
      html += '<div style="display:flex; justify-content:space-between; padding:6px 0; font-size:13px; color:var(--muted-light)"><span>'+escapeHtml(h.name)+'</span><b>'+pct+'%</b></div>';
    });
    html += '</div>';
  }
  if(showAll || statCats["Finanse"]){
    var finRows = statPeriod==="miesiac"
      ? state.finance.filter(function(f){return f.month===periodKey;})
      : state.finance.filter(function(f){return f.month && f.month.slice(0,4)===periodKey;});
    var fin = finRows.reduce(function(acc,f){
      acc.revenue += f.revenue; acc.bizCost += f.bizCost; acc.personalCost += f.personalCost; acc.target = f.target;
      return acc;
    }, {revenue:0,bizCost:0,personalCost:0,target:20000});
    var income = fin.revenue - fin.bizCost - fin.personalCost;
    html += '<div class="card"><h3>Finanse</h3><table>'+
      '<tr><td>Przychody</td><td style="text-align:right">'+fin.revenue+' zł</td></tr>'+
      '<tr><td>Koszty (biznes + osobiste)</td><td style="text-align:right">'+(fin.bizCost+fin.personalCost)+' zł</td></tr>'+
      '<tr><td>Dochód</td><td style="text-align:right">'+income+' zł</td></tr>'+
      '<tr><td>Cel finansowy'+(statPeriod==="rok"?" (ost. miesiąc)":"")+'</td><td style="text-align:right">'+fin.target.toLocaleString("pl-PL")+' zł</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Posty"]){
    var periodPosts = state.posts.filter(function(p){ return matchesPeriod(p.date); });
    html += '<div class="card"><h3>Posty</h3><table>'+
      '<tr><td>Opublikowane w okresie</td><td style="text-align:right">'+periodPosts.filter(function(p){return p.stage==="opublikowany";}).length+'</td></tr>'+
      '<tr><td>Wszystkie pomysły</td><td style="text-align:right">'+state.posts.filter(function(p){return p.stage==="pomysl";}).length+'</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Instagram"]){
    var ig = state.igAccounts[0];
    html += '<div class="card"><h3>Instagram</h3>'+lineChart(ig.stats)+'</div>';
  }
  if(showAll || statCats["Facebook"]){
    var fb = state.fbAccounts[0];
    html += '<div class="card"><h3>Facebook</h3>'+lineChart(fb.stats)+'</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}
function setStatPeriod(p){ statPeriod = p; renderAll(); }
function toggleStatCat(c){
  if(c==="Wszystko"){ statCats = {Wszystko:true}; }
  else{
    statCats.Wszystko = false;
    statCats[c] = !statCats[c];
  }
  renderAll();
}

  } else if(mode === "denied"){
    gateTitle.textContent = "Ten workspace jest prywatny";
    gateText.textContent = "To konto nie ma dostępu do tego workspace'u.";
    gateBtn.textContent = "Wyloguj i spróbuj innym kontem";
    gateBtn.style.display = "";
    window.__authAction = doSignOut;
  }
}
function hideGate(){ gate.classList.add("hidden"); }

function doSignIn(){
  gateText.textContent = "Otwieram okno logowania Google…";
  signInWithPopup(auth, provider).then(function(result){
    var credential = GoogleAuthProvider.credentialFromResult(result);
    window.__gcalToken = credential && credential.accessToken;
    if(window.onGCalTokenReady) window.onGCalTokenReady();
  }).catch(function(err){
    gateText.textContent = "Logowanie nie powiodło się (" + err.code + "). Spróbuj ponownie.";
  });
}
function doSignOut(){ signOut(auth); }
window.reconnectGCal = doSignIn;

var unsubscribeSnapshot = null;
var pushTimer = null;
var pendingPush = false;

function scheduleFirestorePush(){
  pendingPush = true;
  setSyncStatus("Zapisywanie…");
  if(pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(flushPush, 500);
}
function flushPush(){
  if(!pendingPush) return;
  if(pushTimer){ clearTimeout(pushTimer); pushTimer = null; }
  pendingPush = false;
  var docRef = doc(db, "workspace", "damian");
  setDoc(docRef, window.state).then(function(){
    setSyncStatus("Zsynchronizowano");
  }).catch(function(){
    setSyncStatus("Offline (tylko lokalnie)");
  });
}
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "hidden") flushPush();
});
window.addEventListener("pagehide", flushPush);

function startSync(){
  var originalSave = window.save;
  window.save = function(){
    originalSave();
    scheduleFirestorePush();
  };
  var docRef = doc(db, "workspace", "damian");
  unsubscribeSnapshot = onSnapshot(docRef, function(snap){
    if(snap.exists()){
      var remote = snap.data();
      var def = window.defaultState();
      Object.keys(def).forEach(function(k){ if(!(k in remote)) remote[k] = def[k]; });
      window.state = window.migrateState(remote);
      originalSave();
      window.renderAll();
      setSyncStatus("Zsynchronizowano");
    } else {
      setDoc(docRef, window.state).then(function(){
        setSyncStatus("Zsynchronizowano");
      });
    }
  }, function(){
    setSyncStatus("Offline (tylko lokalnie)");
  });
}

showGate("loading");
onAuthStateChanged(auth, function(user){
  if(!user){
    showGate("signin");
    return;
  }
  if(user.email !== ALLOWED_EMAIL){
    showGate("denied");
    return;
  }
  hideGate();
  setSyncStatus("Łączenie…");
  startSync();
});
</script>
