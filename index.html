function saveTaskModal(){
  var title = document.getElementById("tmTitle").value.trim();
  if(!title) return;
  var category = document.getElementById("tmCategory").value;
  var isRecur = document.getElementById("tmRecur").checked;
  var ctx = window.__taskModalCtx || {};

  if(isRecur){
    var recurDay = +document.getElementById("tmRecurDay").value;
    if(ctx.id){
      var t = state.tasks.filter(function(x){return x.id===ctx.id;})[0];
      if(t){
        pushZadUndo({type:"edit", id:t.id, prev:{title:t.title, category:t.category, scope:t.scope, createdAt:t.createdAt, completedAt:t.completedAt, recurWeekday:(t.recurWeekday!=null?t.recurWeekday:null)}});
        t.title = title; t.category = category; t.scope = "dzien"; t.recurWeekday = recurDay;
        if(!t.recurCompletions) t.recurCompletions = {};
      }
    } else {
      var newRecurTask = {id:uid("task"), title:title, category:category, scope:"dzien", done:false, createdAt:todayStr(), completedAt:null, recurWeekday:recurDay, recurCompletions:{}};
      state.tasks.unshift(newRecurTask);
      pushZadUndo({type:"add", id:newRecurTask.id});
    }
  } else {
    var scope = document.getElementById("tmScope").value;
    var date = document.getElementById("tmDate").value || todayStr();
    if(ctx.id){
      var t2 = state.tasks.filter(function(x){return x.id===ctx.id;})[0];
      if(t2){
        pushZadUndo({type:"edit", id:t2.id, prev:{title:t2.title, category:t2.category, scope:t2.scope, createdAt:t2.createdAt, completedAt:t2.completedAt, recurWeekday:(t2.recurWeekday!=null?t2.recurWeekday:null)}});
        t2.title = title; t2.category = category; t2.scope = scope; t2.recurWeekday = null;
        if(t2.completedAt) t2.completedAt = date; else t2.createdAt = date;
      }
    } else {
      var newTask = {id:uid("task"), title:title, category:category, scope:scope, done:false, createdAt:date, completedAt:null, recurWeekday:null};
      state.tasks.unshift(newTask);
      pushZadUndo({type:"add", id:newTask.id});
    }
  }
  closeTaskModal();
  save(); renderAll();
}
function deleteTaskModal(){
  var ctx = window.__taskModalCtx;
  if(!ctx || !ctx.id) return;
  closeTaskModal();
  deleteTask(ctx.id);
}
function deleteTask(id){
  var t = state.tasks.filter(function(x){return x.id===id;})[0];
  if(!t) return;
  if(!confirm("Usunąć zadanie \""+t.title+"\"? Trafi do „Usunięte” na 30 dni, możesz je stamtąd przywrócić.")) return;
  pushZadUndo({type:"softdelete", id:id, prevDeletedAt:t.deletedAt||null});
  t.deletedAt = todayStr();
  save(); renderAll();
}
function restoreTask(id){
  var t = state.tasks.filter(function(x){return x.id===id;})[0];
  if(!t) return;
  pushZadUndo({type:"restore", id:id, prevDeletedAt:t.deletedAt||null});
  t.deletedAt = null;
  save(); renderAll();
}
function purgeTaskNow(id){
  if(!confirm("Usunąć na stałe? Tego nie można cofnąć.")) return;
  state.tasks = state.tasks.filter(function(t){return t.id!==id;});
  save(); renderAll();
}
function purgeAllTasksNow(){
  var count = state.tasks.filter(function(t){ return t.deletedAt; }).length;
  if(!count) return;
  if(!confirm("Trwale usunąć wszystkie ("+count+") zadania z kosza? Tego nie można cofnąć.")) return;
  state.tasks = state.tasks.filter(function(t){ return !t.deletedAt; });
  save(); renderAll();
}
function renderZadaniaUsuniete(){
  var now = Date.now();
  var items = state.tasks.filter(function(t){ return t.deletedAt && matchesZadSearch(t); });
  items.sort(function(a,b){ return a.deletedAt < b.deletedAt ? 1 : -1; });

  var html = '<div class="stub-note">Zadania usunięte trafiają tutaj na 30 dni, potem znikają na stałe.</div>';
  if(items.length){
    html += '<div style="text-align:right; margin-bottom:10px"><button class="btn danger small" onclick="purgeAllTasksNow()">Wyczyść wszystkie</button></div>';
  }
  html += '<div class="card"><table><thead><tr><th>Zadanie</th><th>Usunięto</th><th>Zostało dni</th><th></th></tr></thead><tbody>';
  if(!items.length){ html += '<tr><td colspan="4"><div class="empty">Kosz jest pusty.</div></td></tr>'; }
  items.forEach(function(t){
    var daysLeft = Math.max(0, 30 - Math.floor((now - new Date(t.deletedAt+"T00:00:00").getTime())/86400000));
    html += '<tr><td>'+escapeHtml(t.title)+'</td>'+
      '<td>'+fmtDate(t.deletedAt)+'</td>'+
      '<td>'+daysLeft+'</td>'+
      '<td><button class="linklike" onclick="restoreTask(\''+t.id+'\')">Przywróć</button> <button class="linklike danger" onclick="purgeTaskNow(\''+t.id+'\')">Usuń na stałe</button></td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

/* ================= KALENDARZ ================= */
function gcalMonthKey(){ return calYear+"-"+calMonth; }
function ensureGCalCalendars(){
  if(!window.__gcalToken || gcalCalendars || gcalLoading) return;
  gcalLoading = true;
  gcalConnectError = null;
  fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList", {headers:{Authorization:"Bearer "+window.__gcalToken}})
    .then(function(r){ if(r.status===401){ window.__gcalToken=null; throw new Error("401"); } return r.json(); })
    .then(function(j){
      gcalCalendars = (j.items||[]).map(function(it){ return {id:it.id, name:it.summary, color:it.backgroundColor||"#8a8390"}; });
      gcalLoading = false;
      renderAll();
      fetchGCalEventsForVisibleMonth();
    }).catch(function(){
      gcalLoading = false;
      gcalConnectError = "Nie udało się pobrać listy kalendarzy Google.";
      renderAll();
    });
}
function calTextColorFor(bgColor){
  var c = (bgColor||"").replace("#","");

function calEventsForDay(dstr, gcalEvents){

      if(e.recurWeekday!=null && e.recurWeekday===dwd && dstr>=e.date) return true;
      return false;
    });
  }
  return dayEvents.map(function(e){
    if(gcalEvents!==null){
      return {
        color: e.calendarColor, title: e.title, time: e.time, multiDay: e.multiDay,
        ctx: {existing:true, source:"gcal", id:e.id, calendarId:e.calendarId, title:e.title, date:dstr, time:e.time, endTime:e.endTime,
          calendar:e.calendarName, allDay:e.allDay, rawStartDate:e.rawStartDate, rawEndDate:e.rawEndDate}

    return {
      color: cal.color, title: e.title, time: e.time,
      ctx: {existing:true, source:"local", id:e.id, title:e.title, date:e.date, time:e.time, calendar:e.calendar}

var RRULE_BYDAY = ["MO","TU","WE","TH","FR","SA","SU"]; // 0=Pon..6=Ndz
function saveEventModal(){

  var date = document.getElementById("evmDate").value;
  var time = document.getElementById("evmTime").value;

  var recurEl = document.getElementById("evmRecur");

      method: ctx.existing ? "PATCH" : "POST",

      fetchGCalEventsForVisibleMonth();

  var calSource = gcalCalendars || state.calendars;
  if(gcalCalendars){
    var wspolny = gcalCalendars.filter(function(c){ return c.name.toLowerCase().indexOf("wspólny")!==-1 || c.name.toLowerCase().indexOf("wspolny")!==-1; })[0];
    res.calendar = wspolny ? wspolny.name : gcalCalendars[0].name;
  }
  var calMatch = t.match(/kalendarz\s+"([^"]+)"/i);
  if(calMatch){
    var name = calMatch[1];
    var found = calSource.filter(function(c){ return c.name.toLowerCase()===name.toLowerCase() || c.name.toLowerCase().indexOf(name.toLowerCase())!==-1; })[0];
    res.calendar = found ? found.name : (gcalCalendars ? gcalCalendars[0].name : (name.charAt(0).toUpperCase()+name.slice(1)));
  }
  var withMatch = t.match(/z\s+([A-ZŻŹĆĄŚĘŁÓŃ][a-ząćęłńóśźż]+(?:\s+[A-ZŻŹĆĄŚĘŁÓŃ][a-ząćęłńóśźż]+)?)/);
  var locMatch = t.match(/,\s*([A-ZŻŹĆĄŚĘŁÓŃ][^,]*?)(?:,\s*kalendarz|$)/);
  if(locMatch){ res.location = locMatch[1].trim(); }

  var titleParts = ["Spotkanie"];
  if(withMatch){ titleParts.push("z "+withMatch[1]); }
  res.title = titleParts.join(" ");
  return res;
}
function insertGCalEvent(parsed){
  var cal = gcalCalendars.filter(function(c){ return c.name===parsed.calendar; })[0] || gcalCalendars[0];
  var body;
  if(parsed.time){
    var parts = parsed.time.split(":");
    var endH = (parseInt(parts[0],10)+1)%24;
    var endTime = String(endH).padStart(2,"0")+":"+parts[1];
    body = {summary:parsed.title, location:parsed.location||undefined,
      start:{dateTime:parsed.date+"T"+parsed.time+":00", timeZone:"Europe/Warsaw"},
      end:{dateTime:parsed.date+"T"+endTime+":00", timeZone:"Europe/Warsaw"}};
  } else {
    body = {summary:parsed.title, location:parsed.location||undefined,
      start:{date:parsed.date}, end:{date:parsed.date}};
  }
  fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(cal.id)+"/events", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify(body)
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); }
    if(!r.ok) throw new Error("insert failed");
    return r.json();
  }).then(function(){
    delete gcalEventsCache[gcalMonthKey()];
    fetchGCalEventsForVisibleMonth();
  }).catch(function(){
    alert("Nie udało się dodać wydarzenia do Google Calendar — spróbuj połączyć ponownie (przycisk w Kalendarzu).");
    renderAll();
  });
}
function submitNlp(){
  var val = document.getElementById("nlpInput").value;
  if(!val.trim()) return;
  var parsed = parseEventCommand(val);
  if(!parsed.date){ alert("Nie udało się rozpoznać daty w komendzie."); return; }
  if(gcalCalendars && window.__gcalToken){
    insertGCalEvent(parsed);
  } else {
    state.events.push({id:uid("ev"), title:parsed.title, date:parsed.date, time:parsed.time, location:parsed.location, calendar:parsed.calendar});
    save();
  }
  document.getElementById("nlpInput").value = "";
  renderAll();
}
function promptAddEvent(){
  var title = prompt("Tytuł wydarzenia:"); if(!title) return;
  var date = prompt("Data (RRRR-MM-DD):", todayStr()); if(!date) return;
  var time = prompt("Godzina (GG:MM), opcjonalnie:", "");

var HABIT_DOW_SHORT = ["PN","WT","ŚR","CZW","PT","SO","NDZ"]; // poniedziałek pierwszy, jak w PL
function dowShort(y,m,d){ return HABIT_DOW_SHORT[(new Date(y,m-1,d).getDay()+6)%7]; }

var nawykiTab = null; // "YYYY-MM" wybranego miesiąca albo "TOTAL"
var nawykiYear = null;
var nawykiUndoStack = [];
function renderAllKeepScroll(scrollBoxId){
  var box = document.getElementById(scrollBoxId);
  var pos = box ? box.scrollLeft : null;
  renderAll();
  if(pos!=null){
    var box2 = document.getElementById(scrollBoxId);
    if(box2) box2.scrollLeft = pos;
  }
}
var pinchZoomLevels = {nawykiScrollBox:1, klienciScrollBox:1, calScrollBox:1};
function attachPinchZoom(boxId){
  var box = document.getElementById(boxId);
  if(!box) return;
  box.style.zoom = pinchZoomLevels[boxId];
  var startDist = 0, startZoom = 1;
  box.ontouchstart = function(e){
    if(e.touches.length===2){
      startDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      startZoom = pinchZoomLevels[boxId];
    }
  };
  box.ontouchmove = function(e){
    if(e.touches.length===2 && startDist>0){
      e.preventDefault();
      var dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      var scale = startZoom * (dist/startDist);
      scale = Math.max(0.4, Math.min(1.6, scale));
      pinchZoomLevels[boxId] = scale;
      box.style.zoom = scale;
    }
  };
}
function pushNawykiUndo(action){
  nawykiUndoStack.push(action);
  if(nawykiUndoStack.length>50) nawykiUndoStack.shift();
}
function undoNawyki(){
  var a = nawykiUndoStack.pop();
  if(!a) return;
  if(a.type==="toggle"){
    var h = state.habits.filter(function(x){return x.id===a.habitId;})[0];
    if(h){ if(a.prev) h.log[a.dateKey] = true; else delete h.log[a.dateKey]; }
  } else if(a.type==="rename"){
    var h2 = state.habits.filter(function(x){return x.id===a.habitId;})[0];
    if(h2) h2.name = a.prevName;
  } else if(a.type==="delete"){
    state.habits.splice(a.index, 0, a.habit);
  } else if(a.type==="add"){
    state.habits = state.habits.filter(function(h){return h.id!==a.habitId;});
  } else if(a.type==="reportrow-add"){
    var rr1 = state.habitReports[a.ym];
    if(rr1) rr1.splice(a.index,1);
  } else if(a.type==="reportrow-edit"){
    var rr2 = state.habitReports[a.ym];
    if(rr2 && rr2[a.index]) rr2[a.index][a.field] = a.prevValue;
  } else if(a.type==="reportrow-delete"){
    var rr3 = state.habitReports[a.ym];
    if(rr3) rr3.splice(a.index, 0, a.row);
  }
  save(); renderAllKeepScroll("nawykiScrollBox");
}

function normalizeHabitReport(ym){

  else if(typeof r === "string"){
    r = r.trim() ? [{value:"", label:r}] : [];
    state.habitReports[ym] = r;
  }
  return r;
}

function addHabitReportRow(ym){
  var rows = normalizeHabitReport(ym);
  rows.push({value:"", label:""});
  pushNawykiUndo({type:"reportrow-add", ym:ym, index:rows.length-1});
  save(); renderAll();
}
function updateHabitReportRow(ym, idx, field, val){
  var rows = normalizeHabitReport(ym);
  if(!rows[idx]) return;
  var prev = rows[idx][field];
  if(prev===val) return;
  pushNawykiUndo({type:"reportrow-edit", ym:ym, index:idx, field:field, prevValue:prev});
  rows[idx][field] = val;
  save();
}
function deleteHabitReportRow(ym, idx){
  var rows = normalizeHabitReport(ym);
  if(!rows[idx]) return;
  var removed = rows[idx];
  pushNawykiUndo({type:"reportrow-delete", ym:ym, index:idx, row:removed});
  rows.splice(idx,1);
  save(); renderAll();
}

function toggleHabitDay(id, dateKey){
  var h = state.habits.filter(function(x){return x.id===id;})[0];
  if(!h) return;
  var prev = !!h.log[dateKey];
  pushNawykiUndo({type:"toggle", habitId:id, dateKey:dateKey, prev:prev});
  if(prev) delete h.log[dateKey]; else h.log[dateKey] = true;
  save(); renderAllKeepScroll("nawykiScrollBox");
}
function renameHabit(id){
  var h = state.habits.filter(function(x){return x.id===id;})[0];
  if(!h) return;
  var name = prompt("Nowa nazwa nawyku:", h.name);
  if(!name || name===h.name) return;
  pushNawykiUndo({type:"rename", habitId:id, prevName:h.name});
  h.name = name;
  save(); renderAllKeepScroll("nawykiScrollBox");
}
function setHabitReps(id){
  var h = state.habits.filter(function(x){return x.id===id;})[0];
  if(!h) return;
  var repsStr = prompt('Ile powtórzeń dziennie robisz przy tym nawyku (dla raportu miesiąca, np. "20")? Zostaw puste, żeby wyłączyć.', h.repsPerDay||"");
  if(repsStr===null) return;
  repsStr = repsStr.trim();
  if(!repsStr){ h.repsPerDay = null; h.repsUnit = null; save(); renderAllKeepScroll("nawykiScrollBox"); return; }
  var reps = parseInt(repsStr, 10);
  if(!reps || reps<=0){ alert("Podaj liczbę większą od zera."); return; }
  var unit = prompt('Jak nazwać sumę w raporcie (np. "brzuszków", "pompek", "łącznie")?', h.repsUnit||"razy");
  h.repsPerDay = reps;
  h.repsUnit = (unit||"razy").trim();
  save(); renderAllKeepScroll("nawykiScrollBox");
}
function addHabit(){
  var name = prompt("Nazwa nawyku:");
  if(!name) return;
  var newHabit = {id:uid("hab"), name:name, log:{}};
  state.habits.push(newHabit);
  pushNawykiUndo({type:"add", habitId:newHabit.id});
  save(); renderAll();
}
function deleteHabit(id){
  if(!confirm("Na pewno usunąć ten nawyk? Możesz to cofnąć przyciskiem \"Cofnij\".")) return;
  var idx = -1;
  for(var i=0;i<state.habits.length;i++){ if(state.habits[i].id===id){ idx=i; break; } }
  if(idx<0) return;
  var removed = state.habits[idx];
  state.habits.splice(idx,1);
  pushNawykiUndo({type:"delete", habit:removed, index:idx});
  save(); renderAll();
}

/* ---- Kopia zapasowa Nawyków w osobnym arkuszu Google Sheets (nie dotyka arkusza Damiana) ---- */
var habitsBackupSyncTimer = null;
var habitsBackupPending = false;
var habitsBackupCreating = false;
var habitsBackupStatus = "idle"; // idle|ok|error

function ensureHabitsBackupSheet(){
  if(!window.__gcalToken || state.habitsBackupSheetId || habitsBackupCreating) return;
  habitsBackupCreating = true;
  fetch("https://sheets.googleapis.com/v4/spreadsheets", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      properties:{title:"Nawyki — kopia zapasowa (system)"},
      sheets:[{properties:{title:"TOTAL"}},{properties:{title:"RAW"}},{properties:{title:"RAPORTY"}}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    return r.json();
  }).then(function(data){
    habitsBackupCreating = false;
    if(data.spreadsheetId){
      state.habitsBackupSheetId = data.spreadsheetId;
      state.habitsBackupSheetUrl = data.spreadsheetUrl || ("https://docs.google.com/spreadsheets/d/"+data.spreadsheetId+"/edit");
      save();
      renderAll();
    }
  }).catch(function(){ habitsBackupCreating = false; });
}
function scheduleHabitsBackupPush(){
  if(!window.__gcalToken || !state.habitsBackupSheetId) return;
  habitsBackupPending = true;
  if(habitsBackupSyncTimer) clearTimeout(habitsBackupSyncTimer);
  habitsBackupSyncTimer = setTimeout(flushHabitsBackupPush, 1500);
}
function flushHabitsBackupPush(){
  if(!habitsBackupPending) return;
  habitsBackupPending = false;
  if(!window.__gcalToken || !state.habitsBackupSheetId) return;
  var yr = new Date().getFullYear();

  var totalHeader = ["NAWYK","WYKONANIA (ROK)","DNI (ROK)","% ROK"].concat(HABIT_MONTH_ABBR.map(function(mn){return mn.toUpperCase();})).concat(["SUMA"]);
  var totalRows = [totalHeader];
  state.habits.forEach(function(h){
    var ys = habitYearStats(h, String(yr));
    var row = [h.name, ys.done, ys.days, ys.pct+"%"];
    for(var m=1;m<=12;m++){ row.push(habitMonthStats(h, yr+"-"+String(m).padStart(2,"0")).pct+"%"); }
    row.push(ys.done);
    totalRows.push(row);
  });

  var rawRows = [["id","name","log_json"]];
  state.habits.forEach(function(h){ rawRows.push([h.id, h.name, JSON.stringify(h.log||{})]); });

  var reportRows = [["miesiac","dni","raport"]];
  Object.keys(state.habitReports||{}).sort().forEach(function(ym){
    var rows = state.habitReports[ym];
    if(typeof rows === "string"){ reportRows.push([ym, "", rows]); return; }
    (rows||[]).forEach(function(r){ reportRows.push([ym, r.value||"", r.label||""]); });
  });

  fetch("https://sheets.googleapis.com/v4/spreadsheets/"+state.habitsBackupSheetId+"/values:batchUpdate", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      valueInputOption:"RAW",
      data:[
        {range:"TOTAL!A1", values: totalRows},
        {range:"RAW!A1", values: rawRows},
        {range:"RAPORTY!A1", values: reportRows}
      ]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    habitsBackupStatus = r.ok ? "ok" : "error";
  }).catch(function(){ habitsBackupStatus = "error"; });
}

function updateClientOpsField(id, field, value){
  var c = state.clientOps.clients.filter(function(x){return x.id===id;})[0];
  if(!c) return;
  var prev = c[field];
  var val = (field==="okresDni") ? (+value||0) : (field==="obslugaKampanii") ? !!value : value;
  if(prev===val) return;
  pushClientOpsUndo({type:"field", id:id, field:field, prevValue:prev});
  c[field] = val;
  save(); renderAll();
}
function deleteClientOpsClient(id){
  if(!confirm("Na pewno usunąć tego klienta wraz z jego zadaniami? Historia screenshotów zostanie (dane w Storage), ale zniknie z widoku. Można cofnąć przyciskiem \"Cofnij\".")) return;
  var idx = state.clientOps.clients.findIndex(function(x){return x.id===id;});
  if(idx===-1) return;
  var client = state.clientOps.clients[idx];
  var tasks = state.clientOps.tasks.filter(function(t){ return t.clientId===id; });
  state.clientOps.clients.splice(idx,1);
  state.clientOps.tasks = state.clientOps.tasks.filter(function(t){ return t.clientId!==id; });
  pushClientOpsUndo({type:"deleteClient", index:idx, client:client, tasks:tasks});
  if(clientOpsExpandedId===id) clientOpsExpandedId=null;
  save(); renderAll();
}
function toggleClientOpsExpand(id){ clientOpsExpandedId = (clientOpsExpandedId===id) ? null : id; renderAll(); }
function addClientOpsTask(clientId){
  var titleEl = document.getElementById("coNewTaskTitle_"+clientId);
  var freqEl = document.getElementById("coNewTaskFreq_"+clientId);
  var daysEl = document.getElementById("coNewTaskDays_"+clientId);
  var title = titleEl ? titleEl.value.trim() : "";
  if(!title) return;
  var freq = freqEl ? freqEl.value : "once";
  var customDays = freq==="custom" ? Math.max(1, +((daysEl&&daysEl.value)||1)) : null;
  var t = {id:uid("cot"), clientId:clientId, title:title, freq:freq, customDays:customDays, nextDue:todayStr(), done:false, lastDoneAt:null, createdAt:todayStr()};
  state.clientOps.tasks.push(t);
  pushClientOpsUndo({type:"addTask", id:t.id});
  save(); renderAll();
}
function toggleClientOpsTask(id){
  var t = state.clientOps.tasks.filter(function(x){return x.id===id;})[0];
  if(!t) return;
  var prevNextDue = t.nextDue, prevDone = t.done, prevLastDoneAt = t.lastDoneAt;
  if(t.freq==="once"){
    t.done = !t.done;
  } else {
    var d = new Date();
    if(t.freq==="weekly") d.setDate(d.getDate()+7);
    else if(t.freq==="monthly") d.setMonth(d.getMonth()+1);
    else d.setDate(d.getDate()+Math.max(1, t.customDays||1));
    t.nextDue = isoLocal(d);
    t.lastDoneAt = todayStr();
  }
  pushClientOpsUndo({type:"toggleTask", id:id, prevNextDue:prevNextDue, prevDone:prevDone, prevLastDoneAt:prevLastDoneAt});
  save(); renderAll();
}
function deleteClientOpsTask(id){
  var idx = state.clientOps.tasks.findIndex(function(x){return x.id===id;});
  if(idx===-1) return;
  var task = state.clientOps.tasks[idx];
  state.clientOps.tasks.splice(idx,1);
  pushClientOpsUndo({type:"deleteTask", index:idx, task:task});
  save(); renderAll();
}
function fileToBase64(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(){ resolve(reader.result.split(",")[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  if(!window.uploadClientScreenshot){
    if(statusEl) statusEl.textContent = "Błąd: brak połączenia z Firebase Storage.";
    return;
  }
  var shotId = uid("shot");
  var ext = (file.type.split("/")[1]||"jpg").replace(/[^a-z0-9]/gi,"");
  var path = "clientScreens/"+clientId+"/"+shotId+"."+ext;
  window.uploadClientScreenshot(file, path).then(function(url){
    var rec = {id:shotId, clientId:clientId, storagePath:path, url:url, uploadedAt:new Date().toISOString(), analysis:"", analysisStatus:"pending"};
    state.clientOps.screenshots.push(rec);
    save(); renderAll();
    fileToBase64(file).then(function(b64){
      return analyzeClientScreenshot(b64, file.type||"image/jpeg");
    }).then(function(text){
      rec.analysis = text;
      rec.analysisStatus = "ok";
      save(); renderAll();
    }).catch(function(err){
      rec.analysis = (err && err.message) ? err.message : "Nie udało się przeanalizować screenshota.";
      rec.analysisStatus = "error";
      save(); renderAll();
    });
  }).catch(function(){
    if(statusEl) statusEl.textContent = "Błąd wgrywania do Firebase Storage.";
  });
  inputEl.value = "";
}
function analyzeClientScreenshot(base64, mediaType){
  var key = localStorage.getItem("mdgtal_anthropic_key");
  if(!key) return Promise.reject(new Error("Brak klucza API Anthropic — ustaw go w Ustawieniach AI."));
  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "x-api-key": key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
      "content-type":"application/json"
    },
    body: JSON.stringify({
      model:"claude-sonnet-4-5",
      max_tokens:500,
      messages:[{role:"user", content:[
        {type:"image", source:{type:"base64", media_type:mediaType, data:base64}},
        {type:"text", text: CLIENT_SHOT_PROMPT}
      ]}]
    })
  }).then(function(r){
    if(!r.ok){
      return r.json().catch(function(){return null;}).then(function(errBody){
        var msg = (errBody && errBody.error && errBody.error.message) || ("HTTP "+r.status);
        throw new Error("Anthropic API: "+msg);
      });
    }
    return r.json();
  }).then(function(data){
    var text = (data.content||[]).map(function(b){ return b.text||""; }).join("\n").trim();
    return text || "Brak odpowiedzi od modelu.";
  });
}

function ceoCharLevelInfo(){
  var xp = ceoTotalXp();
  var perLevel = 1000;
  return {level: Math.floor(xp/perLevel)+1, xp:xp, xpInLevel: xp%perLevel, xpForNext: perLevel};
}
function ceoMilestoneAchieved(m){
  if(m.type==="manual") return !!m.done;
  if(m.type==="financeAvgRevenue"){
    var months = (state.finance||[]).slice(-m.months);
    if(months.length<m.months) return false;
    var avg = months.reduce(function(s,f){return s+(f.revenue||0);},0)/months.length;
    return avg>=m.target;
  }
  if(m.type==="financeField"){
    return (state.ceo.finance[m.field]||0) >= m.target;
  }
  if(m.type==="financePositiveMonths"){
    var months2 = (state.finance||[]).slice(-m.months);
    if(months2.length<m.months) return false;
    return months2.every(function(f){ return (f.revenue||0)-(f.bizCost||0)-(f.personalCost||0) > 0; });
  }
  if(m.type==="postsPublished"){
    return state.posts.filter(function(p){return p.stage==="opublikowany" && !p.deletedAt;}).length >= m.target;
  }
  if(m.type==="agentDone"){
    return state.agentRequests.filter(function(r){return r.status==="gotowe";}).length >= m.target;
  }
  if(m.type==="habitYearPct"){
    var yr = String(new Date().getFullYear());
    var habit = state.habits.filter(function(h){return ceoHabitMapping(h.name).skill===m.matchSkill;})[0];
    if(!habit) return false;
    return habitYearStats(habit, yr).pct >= m.target;
  }
  return false;
}
function ceoSkillMilestoneLevel(key){
  var list = state.ceo.skillMilestones[key] || [];
  var lvl = 0;
  list.forEach(function(m){ if(ceoMilestoneAchieved(m) && m.level>lvl) lvl = m.level; });
  return Math.min(100, lvl);
}
function ceoSkillLevelInfo(key){
  var xp = state.ceo.skills[key]||0;
  return {level: ceoSkillMilestoneLevel(key), xp:xp, maxLevel:100};
}
function ceoRank(level){

  ceoSkillChallengesOpen[key] = !ceoSkillChallengesOpen[key];
  renderAll();
}
function renderCeoSkillChallenges(key){
  var list = (state.ceo.skillMilestones[key]||[]).slice().sort(function(a,b){return a.level-b.level;});
  var html = '<div class="ceo-challenge-list">';
  if(!list.length){ html += '<div class="empty" style="padding:4px 0">Brak wyzwań.</div>'; }
  list.forEach(function(m){
    var achieved = ceoMilestoneAchieved(m);
    var clickable = m.type==="manual";
    html += '<div class="ceo-challenge-item'+(achieved?" done":"")+'">'+
      '<span'+(clickable?' onclick="toggleCeoMilestoneManual(\''+key+'\',\''+m.id+'\')" style="cursor:pointer"':'')+'>'+
        (achieved?"✅":"⬜")+' Lv.'+m.level+' — '+escapeHtml(m.label)+(!clickable?' <span class="ceo-challenge-auto">(auto)</span>':'')+
      '</span>'+
      '<span style="white-space:nowrap"><button class="linklike" onclick="editCeoMilestone(\''+key+'\',\''+m.id+'\')">✎</button> <button class="linklike danger" onclick="deleteCeoMilestone(\''+key+'\',\''+m.id+'\')">✕</button></span>'+
    '</div>';
  });
  html += '<button class="linklike" style="margin-top:4px" onclick="addCeoMilestone(\''+key+'\')">+ Dodaj wyzwanie</button>';
  html += '</div>';
  return html;
}
function toggleCeoMilestoneManual(key, id){
  var m = (state.ceo.skillMilestones[key]||[]).filter(function(x){return x.id===id;})[0];
  if(!m || m.type!=="manual") return;
  m.done = !m.done;
  save(); renderAll();
}
function addCeoMilestone(key){
  var level = parseInt(prompt("Na jaki poziom (1-100) wskoczy ta umiejętność po zaliczeniu?","25"),10);
  if(!level || level<1 || level>100) return;
  var label = prompt("Opis wyzwania:");
  if(!label) return;
  if(!state.ceo.skillMilestones[key]) state.ceo.skillMilestones[key] = [];
  state.ceo.skillMilestones[key].push({id:uid("ms"), level:level, label:label, type:"manual", done:false});
  ceoSkillChallengesOpen[key] = true;
  save(); renderAll();
}
function editCeoMilestone(key, id){
  var m = (state.ceo.skillMilestones[key]||[]).filter(function(x){return x.id===id;})[0];
  if(!m) return;
  var label = prompt("Opis wyzwania:", m.label);
  if(label===null) return;
  var level = parseInt(prompt("Poziom (1-100):", m.level),10);
  m.label = label;
  if(level>=1 && level<=100) m.level = level;
  ceoSkillChallengesOpen[key] = true;
  save(); renderAll();
}
function deleteCeoMilestone(key, id){
  if(!confirm("Usunąć to wyzwanie?")) return;
  state.ceo.skillMilestones[key] = (state.ceo.skillMilestones[key]||[]).filter(function(m){return m.id!==id;});
  ceoSkillChallengesOpen[key] = true;
  save(); renderAll();
}

function renderCeoBoss(){
  var boss = ceoCurrentBoss();
  var totalProgress = 0;
  boss.conditions.forEach(function(c){ totalProgress += ceoConditionProgress(c); });
  var pct = Math.round((totalProgress/boss.conditions.length)*100);
  if(pct>=100 && !boss.defeated){ boss.defeated = true; addCeoXp("strategie", 500); }
  var hpRemaining = 100 - Math.min(100,pct);
  var html = '<div class="card ceo-boss-card" style="margin-top:16px">'+
    '<div class="row" style="justify-content:space-between; align-items:center">'+
      '<h3 style="margin:0">👹 '+escapeHtml(boss.name)+'</h3>'+
      (boss.defeated ? '<span class="tag tag-stage-opublikowany">Pokonany 🎉</span>' : '')+
    '</div>'+
    '<div class="ceo-hpbar"><div class="ceo-hpbar-fill" style="width:'+hpRemaining+'%"></div></div>'+
    '<div style="font-size:12px; color:var(--muted); margin:4px 0 10px">HP bossa: '+hpRemaining+'% (Twój postęp: '+Math.min(100,pct)+'%)</div>';
  boss.conditions.forEach(function(c){
    var cpct = Math.round(ceoConditionProgress(c)*100);
    html += '<div class="ceo-quest-item"><span>'+(cpct>=100?"✅":"⬜")+' '+escapeHtml(c.label)+'</span>';
    if(c.type==="manual-counter"){
      html += '<span class="ceo-quest-xp">'+(c.current||0)+' / '+c.target+' <button class="linklike" onclick="ceoBossCounterAdd(\''+c.id+'\')">+1</button></span>';
    } else if(c.type==="manual-check"){
      html += '<button class="linklike" onclick="ceoBossToggleManual(\''+c.id+'\')">'+(c.manualDone?"Cofnij":"Odhacz")+'</button>';
    } else {
      html += '<span class="ceo-quest-xp">'+cpct+'%</span>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function ceoWeakestSkill(){
  var weakest = null, min = Infinity;
  Object.keys(CEO_SKILL_DEFS).forEach(function(k){
    var lvl = ceoSkillMilestoneLevel(k);
    if(lvl<min){ min=lvl; weakest=k; }
  });
  return weakest;
}
function ceoMentorInsight(){
  var lines = [];
  var todayS = todayStr();
  var mainItems = state.tasks.filter(function(t){return t.scope==="dzien" && !t.deletedAt;});
  var doneToday = mainItems.filter(function(t){return t.done;}).length;
  if(mainItems.length>0){
    lines.push('Dziś odhaczone '+doneToday+' / '+mainItems.length+' zadań głównych.'+(doneToday<mainItems.length ? ' Zostało jeszcze '+(mainItems.length-doneToday)+' do zrobienia.' : ' Wszystko zrobione — dobra robota!'));
  }
  var weakest = ceoWeakestSkill();
  if(weakest){
    lines.push('Najsłabsza umiejętność to '+CEO_SKILL_DEFS[weakest].icon+' '+CEO_SKILL_DEFS[weakest].label+' — warto tam dorzucić trochę uwagi.');
  }
  var months = Object.keys(state.ceo.monthlyXpHistory).sort();
  if(months.length>=2){
    var diff = state.ceo.monthlyXpHistory[months[months.length-1]] - state.ceo.monthlyXpHistory[months[months.length-2]];
    if(diff>0) lines.push('Ten miesiąc idzie lepiej niż poprzedni o '+diff+' XP.');
  }
  if(state.ceo.streak>=3) lines.push('Streak '+state.ceo.streak+' dni z rzędu — nie przerywaj! 🔥');
  return lines;
}
function renderCeoMentor(){
  var lines = ceoMentorInsight();
  var html = '<div class="card ceo-mentor" style="margin-top:16px"><h3 style="margin-top:0">🤖 AI Mentor</h3>'+
    '<div style="font-size:11px; color:var(--muted); margin-bottom:10px">Podpowiedzi liczone na bieżąco z Twoich prawdziwych danych w aplikacji (nie live-analiza Claude — to może przyjść później).</div>';
  if(!lines.length){ html += '<div class="empty">Brak jeszcze danych do analizy.</div>'; }
  lines.forEach(function(l){ html += '<div class="ceo-mentor-line">'+escapeHtml(l)+'</div>'; });
  html += '</div>';
  return html;
}

function renderCeoTalentTree(){
  var html = '<div class="card" style="margin-top:16px"><h3 style="margin-top:0">Drzewko talentów</h3>';
  Object.keys(state.ceo.talentTree).forEach(function(group){
    var nodes = state.ceo.talentTree[group];
    html += '<div class="ceo-talent-group"><div class="ceo-talent-title">'+(CEO_TALENT_GROUP_LABEL[group]||group)+'</div>';
    nodes.forEach(function(node, i){
      var key = group+"|"+node;
      var unlocked = !!state.ceo.talentUnlocked[key];
      var branch = (i===nodes.length-1) ? "└──" : "├──";
      html += '<div class="ceo-talent-node'+(unlocked?" unlocked":"")+'" onclick="toggleCeoTalent(\''+group+'\',\''+jsAttrStr(node)+'\')">'+
        '<span class="ceo-talent-branch">'+branch+'</span>'+(unlocked?"✅":"⬜")+' '+escapeHtml(node)+'</div>';
    });
    html += '</div>';
  });
  html += '<button class="linklike" style="margin-top:6px" onclick="addCeoTalentNode()">+ Dodaj węzeł</button>';
  html += '</div>';
  return html;
}
function toggleCeoTalent(group, node){
  var key = group+"|"+node;
  var wasUnlocked = !!state.ceo.talentUnlocked[key];
  state.ceo.talentUnlocked[key] = !wasUnlocked;
  addCeoXp(CEO_TALENT_GROUP_SKILL[group]||"strategie", wasUnlocked?-10:10);
  renderAll();
}
function addCeoTalentNode(){
  var groups = Object.keys(state.ceo.talentTree);
  var groupList = groups.map(function(g,i){return (i+1)+"="+(CEO_TALENT_GROUP_LABEL[g]||g);}).join(", ");
  var idx = parseInt(prompt("Do której gałęzi dodać? "+groupList,"1"),10)-1;
  var group = groups[idx];
  if(!group) return;
  var label = prompt("Nazwa nowego węzła:");
  if(!label) return;
  state.ceo.talentTree[group].push(label);
  save(); renderAll();
}

function cycleCeoFactionStatus(id){
  var f = state.ceo.factions.filter(function(x){return x.id===id;})[0];
  if(!f) return;
  var order = ["Locked","Neutral","Friendly"];
  var idx = order.indexOf(f.status);
  f.status = order[(idx+1)%order.length];
  save(); renderAll();
}

function editCeoKpiField(key){
  var val = prompt("Nowa wartość:", state.ceo.kpiManual[key]);
  if(val===null) return;
  var num = parseFloat(val.replace(",","."));
  if(isNaN(num)) return;
  state.ceo.kpiManual[key] = num;
  save(); renderAll();
}
function renderCeoTimeline(){
  var items = state.ceo.timeline.slice().sort(function(a,b){return a.year<b.year?-1:(a.year>b.year?1:0);});
  var html = '<div class="card" style="margin-top:16px"><h3 style="margin-top:0">📜 Historia</h3>';
  items.forEach(function(t){
    html += '<div class="ceo-quest-item"><span><b>'+escapeHtml(t.year)+'</b> — '+escapeHtml(t.label)+'</span><button class="linklike danger" onclick="removeCeoTimelineItem(\''+t.id+'\')">✕</button></div>';
  });
  html += '<button class="linklike" onclick="addCeoTimelineItem()">+ Dodaj kamień milowy</button>';
  html += '</div>';
  return html;
}
function addCeoTimelineItem(){
  var year = prompt("Rok:", String(new Date().getFullYear()));
  if(!year) return;
  var label = prompt("Wydarzenie:");
  if(!label) return;
  state.ceo.timeline.push({id:uid("tl"), year:year, label:label});
  save(); renderAll();
}
function removeCeoTimelineItem(id){
  state.ceo.timeline = state.ceo.timeline.filter(function(t){return t.id!==id;});
  save(); renderAll();
}
function renderCeoRanking(){
  var months = Object.keys(state.ceo.monthlyXpHistory).sort();
  var best = null, bestVal = -1;
  months.forEach(function(m){ if(state.ceo.monthlyXpHistory[m]>bestVal){ bestVal=state.ceo.monthlyXpHistory[m]; best=m; } });
  var html = '<div class="card" style="margin-top:16px"><h3 style="margin-top:0">📈 Ranking — Ty vs Ty</h3>';
  if(!months.length){ html += '<div class="empty">Za mało danych.</div></div>'; return html; }
  html += '<table><thead><tr><th>Miesiąc</th><th>XP</th></tr></thead><tbody>';
  months.forEach(function(m){
    var label = monthName(+m.split("-")[1]-1)+" "+m.split("-")[0];
    html += '<tr'+(m===best?' style="color:var(--accent); font-weight:700"':'')+'><td>'+label+(m===best?' 🏆 najlepszy':'')+'</td><td>'+state.ceo.monthlyXpHistory[m].toLocaleString("pl-PL")+'</td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}
var CEO_PRESTIGE_THRESHOLD = 20000;
function renderCeoPrestige(lvl){
  var canPrestige = lvl.xp >= CEO_PRESTIGE_THRESHOLD;
  var html = '<div class="card" style="margin-top:16px"><h3 style="margin-top:0">✨ Prestige</h3>'+
    '<div style="font-size:12px; color:var(--muted-light); margin-bottom:10px">Po osiągnięciu ogromnego celu ('+CEO_PRESTIGE_THRESHOLD.toLocaleString("pl-PL")+' XP łącznie) możesz zrobić reset poziomu — jak w Diablo. Poziom i XP umiejętności wracają do zera, ale zostaje trwały bonus +5% do Gold za każdy poziom Prestige (obecnie: Prestige '+state.ceo.prestige+', +'+(state.ceo.prestige*5)+'% Gold).</div>'+
    '<button class="btn'+(canPrestige?"":" secondary")+'"'+(canPrestige?"":" disabled")+' onclick="doCeoPrestige()">'+(canPrestige?"Wykonaj Prestige":"Zbierz "+(CEO_PRESTIGE_THRESHOLD-lvl.xp).toLocaleString("pl-PL")+" XP więcej")+'</button>'+
  '</div>';
  return html;
}
function doCeoPrestige(){
  if(ceoTotalXp() < CEO_PRESTIGE_THRESHOLD) return;
  if(!confirm("Na pewno? Twój poziom i XP umiejętności wrócą do zera, ale zyskujesz trwały bonus +5% do Gold.")) return;
  Object.keys(CEO_SKILL_DEFS).forEach(function(k){ state.ceo.skills[k] = 0; });
  state.ceo.prestige = (state.ceo.prestige||0)+1;
  save(); renderAll();
}

var AGENT_STATUS_LABEL = {nowe:"Nowe", wtoku:"W realizacji", gotowe:"Gotowe"};
var AGENT_STATUS_NEXT = {nowe:"wtoku", wtoku:"gotowe", gotowe:"nowe"};
function renderAgentAI(el){
  setTopActions('');
  var html = '<div class="stub-note">Wpisz czego potrzebujesz (np. "przygotuj 5 postów na przyszły tydzień dla MediaDGtal") i wyślij zlecenie. Odbieram je w sesjach Claude Code — piszę teksty (hooki, opisy, CTA), generuję grafiki w Twojej Canvie do przejrzenia/edycji, a po Twojej akceptacji wrzucam gotowe posty do zakładki Szkic albo Zaplanowane. Publikację na platformach robisz Ty sam.</div>';

  html += '<div class="card" style="margin-bottom:16px">'+
    '<div class="field"><label>Nowe zlecenie</label><textarea id="agentRequestText" rows="3" placeholder="np. Przygotuj 5 postów na przyszły tydzień dla MediaDGtal, temat: powrót do treningów po wakacjach"></textarea></div>'+
    '<div class="row" style="gap:10px; align-items:flex-end; flex-wrap:wrap">'+
      '<div class="field" style="flex:0 0 auto; margin-bottom:0"><label>Marka</label><select id="agentRequestBrand">'+
        state.brands.map(function(b){ return '<option value="'+escapeHtml(b)+'"'+(b===postyFilter?" selected":"")+'>'+escapeHtml(b)+'</option>'; }).join("")+
      '</select></div>'+
      '<button class="btn" onclick="addAgentRequest()">Wyślij do agenta</button>'+
    '</div></div>';

  var items = state.agentRequests.slice().sort(function(a,b){ return a.createdAt<b.createdAt?1:-1; });
  html += '<div class="card"><h3 style="margin:0 0 10px">Zlecenia</h3>';
  if(!items.length){ html += '<div class="empty">Brak zleceń.</div>'; }
  else {
    html += '<div style="overflow-x:auto"><table><thead><tr><th>Zlecenie</th><th>Marka</th><th>Data</th><th>Status</th><th></th></tr></thead><tbody>';
    items.forEach(function(r){
      html += '<tr>'+
        '<td style="max-width:340px; white-space:pre-wrap">'+escapeHtml(r.text)+(r.note?'<div style="color:var(--muted-light); font-size:12px; margin-top:4px">Notatka: '+escapeHtml(r.note)+'</div>':'')+'</td>'+
        '<td><span class="tag tag-'+r.brand.replace(/[^a-zA-Z0-9]/g,"")+'">'+escapeHtml(r.brand)+'</span></td>'+
        '<td>'+fmtDate(r.createdAt)+'</td>'+
        '<td><span class="tag tag-stage-'+(r.status==="gotowe"?"opublikowany":r.status==="wtoku"?"zaplanowany":"szkic")+'" style="cursor:pointer" onclick="cycleAgentStatus(\''+r.id+'\')" title="Kliknij żeby zmienić status">'+AGENT_STATUS_LABEL[r.status]+'</span></td>'+
        '<td style="white-space:nowrap"><button class="linklike" onclick="setAgentNote(\''+r.id+'\')">Notatka</button> <button class="linklike danger" onclick="deleteAgentRequest(\''+r.id+'\')">Usuń</button></td>'+
        '</tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}
function addAgentRequest(){
  var textEl = document.getElementById("agentRequestText");
  var text = textEl.value.trim();
  if(!text) return;
  var brand = document.getElementById("agentRequestBrand").value;
  state.agentRequests.unshift({id:uid("areq"), text:text, brand:brand, status:"nowe", createdAt:todayStr(), note:null});
  save(); renderAll();
}
function cycleAgentStatus(id){
  var r = state.agentRequests.filter(function(x){return x.id===id;})[0];
  if(!r) return;
  r.status = AGENT_STATUS_NEXT[r.status] || "nowe";
  save(); renderAll();
}
function setAgentNote(id){
  var r = state.agentRequests.filter(function(x){return x.id===id;})[0];
  if(!r) return;
  var note = prompt("Notatka (np. co zostało zrobione):", r.note||"");
  if(note===null) return;
  r.note = note.trim() || null;
  save(); renderAll();
}
function deleteAgentRequest(id){
  if(!confirm("Usunąć to zlecenie?")) return;
  state.agentRequests = state.agentRequests.filter(function(r){return r.id!==id;});
  save(); renderAll();
}

function clientMapGroupedByCity(){

  ensureCitiesGeocoded(entries.map(function(e){ return e.city; }).filter(Boolean));
  var groups = {}; var order = [];
  var stillLocating = 0, notFound = 0, noCity = 0;
  entries.forEach(function(e){

function updateClientField(ym, rowId, field, value){
  var rows = state.clientsMonthly[ym]||[];
  var r = rows.filter(function(x){return x.id===rowId;})[0];
  if(!r) return;
  var prev = r[field];
  var isNumeric = typeof prev==="number";
  var val = isNumeric ? (+value||0) : value;
  if(prev===val) return;
  pushKlienciUndo({type:"field", ym:ym, rowId:rowId, field:field, prevValue:prev});
  r[field] = val;
  if((field==="nazwa"||field==="lokalizacja") && r.nazwa) registerClientMapPin(r.nazwa, r.lokalizacja, null, "app");
  save(); renderAllKeepScroll("klienciScrollBox");
}
function updateClientGoal(ym, value){
  var prev = state.clientsGoals[ym]||0;
  var val = +value||0;
  if(prev===val) return;
  pushKlienciUndo({type:"goal", ym:ym, prevValue:prev});
  state.clientsGoals[ym] = val;
  save(); renderAll();
}
function addClientRow(){
  if(!klienciTab || klienciTab==="TOTAL") return;
  if(!state.clientsMonthly[klienciTab]) state.clientsMonthly[klienciTab] = [];
  var row = mkClient("","","","",0,0,0,0,"","","","","","");
  state.clientsMonthly[klienciTab].push(row);
  pushKlienciUndo({type:"add", ym:klienciTab, rowId:row.id});
  save(); renderAll();
}
function advanceClientToNextMonth(ym, rowId){
  var rows = state.clientsMonthly[ym]||[];
  var r = rows.filter(function(x){ return x.id===rowId; })[0];
  if(!r) return;
  var nextYm = nextMonthKey(ym);
  // "Ilość Wsp." = liczba miesięcy współpracy — jeden okres rozliczeniowy (Okres w dniach / 30) to tyle miesięcy doliczamy.
  var monthsForPeriod = Math.max(1, Math.round((+r.okresDni||30)/30));
  var newIloscWsp = (+r.iloscWsp||0) + monthsForPeriod;
  var newStart = computeKoniecDate(r) || (nextYm+"-01");
  var newRow = mkClient(
    r.nazwa, r.lokalizacja, "", "Kontynuacja",
    r.wynagrodzenie, r.budzetRekl, newIloscWsp, r.okresDni,
    "Start", newStart, "", r.cel||"", r.ocenaWsp||"", r.notatki||""
  );
  if(!state.clientsMonthly[nextYm]) state.clientsMonthly[nextYm] = [];
  state.clientsMonthly[nextYm].push(newRow);
  pushKlienciUndo({type:"add", ym:nextYm, rowId:newRow.id});
  klienciTab = nextYm;
  save(); renderAll();
}
function deleteClientRow(ym, rowId){
  if(!confirm("Na pewno usunąć tego klienta z tego miesiąca? Możesz to cofnąć przyciskiem \"Cofnij\".")) return;
  var rows = state.clientsMonthly[ym]||[];
  var idx = -1;
  for(var i=0;i<rows.length;i++){ if(rows[i].id===rowId){ idx=i; break; } }
  if(idx<0) return;
  var removed = rows[idx];
  rows.splice(idx,1);
  pushKlienciUndo({type:"delete", ym:ym, row:removed, index:idx});
  save(); renderAll();
}

/* ---- Kopia zapasowa Klientów w osobnym arkuszu Google Sheets (nie dotyka Bazy Klientów Agencji 2026) ---- */
var clientsBackupSyncTimer = null;
var clientsBackupPending = false;
var clientsBackupCreating = false;
var clientsBackupStatus = "idle";

function ensureClientsBackupSheet(){
  if(!window.__gcalToken || state.clientsBackupSheetId || clientsBackupCreating) return;
  clientsBackupCreating = true;
  fetch("https://sheets.googleapis.com/v4/spreadsheets", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      properties:{title:"Klienci — kopia zapasowa (system)"},
      sheets:[{properties:{title:"TOTAL"}},{properties:{title:"RAW"}}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    return r.json();
  }).then(function(data){
    clientsBackupCreating = false;
    if(data.spreadsheetId){
      state.clientsBackupSheetId = data.spreadsheetId;
      state.clientsBackupSheetUrl = data.spreadsheetUrl || ("https://docs.google.com/spreadsheets/d/"+data.spreadsheetId+"/edit");
      save(); renderAll();
    }
  }).catch(function(){ clientsBackupCreating = false; });
}
function scheduleClientsBackupPush(){
  if(!window.__gcalToken || !state.clientsBackupSheetId) return;
  clientsBackupPending = true;
  if(clientsBackupSyncTimer) clearTimeout(clientsBackupSyncTimer);
  clientsBackupSyncTimer = setTimeout(flushClientsBackupPush, 1500);
}
function flushClientsBackupPush(){
  if(!clientsBackupPending) return;
  clientsBackupPending = false;
  if(!window.__gcalToken || !state.clientsBackupSheetId) return;
  var yr = new Date().getFullYear();

  var totalRows = [["MIESIĄC","ŁĄCZNA ILOŚĆ KLIENTÓW","NOWI KLIENCI","WYNAGRODZENIE","CEL $","% CELU"]];
  for(var m=1;m<=12;m++){
    var ym = yr+"-"+String(m).padStart(2,"0");
    var s = clientMonthSummary(ym);
    var cel = state.clientsGoals[ym]||0;
    var pctCelu = cel>0 ? Math.round(s.wynagrodzenia/cel*100)+"%" : "";
    totalRows.push([monthName(m-1), s.laczna, s.nowi, s.wynagrodzenia, cel, pctCelu]);
  }

  var rawRows = [["miesiac","id","nazwa","lokalizacja","faktura","statusKlienta","wynagrodzenie","budzetRekl","iloscWsp","okresDni","etapWsp","startKampanii","koniecKampanii","cel","ocenaWsp","notatki"]];
  Object.keys(state.clientsMonthly).sort().forEach(function(ym){
    (state.clientsMonthly[ym]||[]).forEach(function(r){
      rawRows.push([ym, r.id, r.nazwa, r.lokalizacja, r.faktura, r.statusKlienta, r.wynagrodzenie, r.budzetRekl, r.iloscWsp, r.okresDni, r.etapWsp, r.startKampanii, computeKoniecDate(r), r.cel, r.ocenaWsp, r.notatki]);
    });
  });

  fetch("https://sheets.googleapis.com/v4/spreadsheets/"+state.clientsBackupSheetId+"/values:batchUpdate", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      valueInputOption:"RAW",
      data:[{range:"TOTAL!A1", values: totalRows},{range:"RAW!A1", values: rawRows}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    clientsBackupStatus = r.ok ? "ok" : "error";
  }).catch(function(){ clientsBackupStatus = "error"; });
}

        var targetRow = blankIdx>-1 ? blankIdx+2 : names.length+2;
        crmAppendT4ARow(c, targetRow);

function crmAppendT4ARow(c, targetRow){

function crmPushT4ARow(c){
  crmT4ASyncStatus[c.id] = "syncing";
  var base = "https://sheets.googleapis.com/v4/spreadsheets/"+T4A_SHEET_ID;
  var headers = {Authorization:"Bearer "+window.__gcalToken};
  var rn = c.t4aSheetRow;
  fetch(base+"/values/"+encodeURIComponent(T4A_SHEET_TAB+"!A"+rn), {headers:headers})
    .then(function(r){
      if(r.status===401){ window.__gcalToken=null; throw new Error("401"); }
      if(!r.ok) throw new Error("http"+r.status);
      return r.json();
    }).then(function(data){
      var cell = ((data.values && data.values[0] && data.values[0][0]) || "").toString().trim().toLowerCase();
      var expected = (c.name||"").trim().toLowerCase();
      if(cell !== expected){
        c.t4aSheetRow = null;
        crmSyncT4ARow(c);
        return;
      }
      crmPushT4ARowActual(c, rn);
    }).catch(function(){ crmT4ASyncStatus[c.id] = "error"; renderAll(); crmRefreshT4ABlock(c.id); });
}
function crmPushT4ARowActual(c, rn){
  var base = "https://sheets.googleapis.com/v4/spreadsheets/"+T4A_SHEET_ID;
  var headers = {Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"};
  fetch(base+"/values:batchUpdate", {
    method:"POST", headers:headers,
    body: JSON.stringify({valueInputOption:"USER_ENTERED", data:[
      {range:T4A_SHEET_TAB+"!A"+rn+":H"+rn, values:[t4aBlockA_H(c)]},
      {range:T4A_SHEET_TAB+"!J"+rn+":P"+rn, values:[t4aBlockJ_P(c)]},
      {range:T4A_SHEET_TAB+"!Q"+rn+":R"+rn, values:[t4aBlockQ_R(c)]}
    ]})
  }).then(function(resp){
    if(resp.status===401){ window.__gcalToken=null; throw new Error("401"); }
    if(!resp.ok) throw new Error("http"+resp.status);
    c.t4aDirty = false; save();
    crmT4ASyncStatus[c.id] = "ok"; renderAll(); crmRefreshT4ABlock(c.id);
  }).catch(function(){ crmT4ASyncStatus[c.id] = "error"; renderAll(); crmRefreshT4ABlock(c.id); });
}

function crmPullT4AStatuses(){
  if(!window.__gcalToken) return;
  var linked = state.crmContacts.filter(function(c){ return c.t4aSheetRow && !c.t4aDirty; });
  if(!linked.length) return;
  var base = "https://sheets.googleapis.com/v4/spreadsheets/"+T4A_SHEET_ID;
  var headers = {Authorization:"Bearer "+window.__gcalToken};
  var params = linked.map(function(c){ return "ranges="+encodeURIComponent(T4A_SHEET_TAB+"!K"+c.t4aSheetRow+":O"+c.t4aSheetRow); }).join("&");
  fetch(base+"/values:batchGet?"+params, {headers:headers})
    .then(function(r){
      if(r.status===401){ window.__gcalToken=null; throw new Error("401"); }
      if(!r.ok) throw new Error("http"+r.status);
      return r.json();
    }).then(function(data){
      var changed = false;
      (data.valueRanges||[]).forEach(function(vr, i){
        var c = linked[i];
        var row = (vr.values && vr.values[0]) || [];
        var t = crmGetT4A(c);
        var next = {sent:crmT4ABoolify(row[0]), offer:crmT4ABoolify(row[1]), decision:crmT4ABoolify(row[2]), listed:crmT4ABoolify(row[3]), client:crmT4ABoolify(row[4])};
        if(next.sent!==t.sent || next.offer!==t.offer || next.decision!==t.decision || next.listed!==t.listed || next.client!==t.client){
          t.sent=next.sent; t.offer=next.offer; t.decision=next.decision; t.listed=next.listed; t.client=next.client;
          changed = true;
        }
      });
      if(changed){ save(); renderAll(); }
    }).catch(function(){});
}

function crmAutoAssignCategories(){
  var candidates = crmActiveContacts().filter(function(c){ return !c.category; });
  if(!candidates.length){ alert("Wszystkie kontakty mają już przypisaną kategorię."); return; }
  var changes = [];
  candidates.forEach(function(c){
    var guess = crmGuessCategory(c.name);
    if(guess){
      changes.push({id:c.id, prevCategory:c.category});
      if(state.crmCategories.indexOf(guess)===-1) state.crmCategories.push(guess);
      c.category = guess;
    }
  });
  if(changes.length) pushCrmUndo({type:"bulkcategory", changes:changes});
  save(); renderAll();
  alert("Przypisano kategorię automatycznie dla "+changes.length+" z "+candidates.length+" kontaktów bez kategorii (na podstawie nazwy). Sprawdź w zakładce Baza i popraw ręcznie, jeśli coś trafiło źle.");

function pushCrmUndo(a){ crmUndoStack.push(a); if(crmUndoStack.length>50) crmUndoStack.shift(); }
function crmUndo(){
  var a = crmUndoStack.pop();
  if(!a) return;
  if(a.type==="add"){
    state.crmContacts = state.crmContacts.filter(function(c){ return c.id!==a.id; });
  } else if(a.type==="edit"){
    var c = state.crmContacts.filter(function(x){ return x.id===a.id; })[0];
    if(c){ c.name=a.prev.name; c.city=a.prev.city; c.ig=a.prev.ig; c.fb=a.prev.fb; c.website=a.prev.website; c.email=a.prev.email; c.phone=a.prev.phone; c.notes=a.prev.notes; c.category=a.prev.category; c.system=a.prev.system; c.statusT4A=a.prev.statusT4A; if(a.prev.status!==undefined) c.status=a.prev.status; if(a.prev.hot!==undefined) c.hot=a.prev.hot; }
  } else if(a.type==="softdelete" || a.type==="restore"){
    var c2 = state.crmContacts.filter(function(x){ return x.id===a.id; })[0];
    if(c2) c2.deletedAt = a.prevDeletedAt;
  } else if(a.type==="bulkcategory"){
    a.changes.forEach(function(ch){
      var c3 = state.crmContacts.filter(function(x){ return x.id===ch.id; })[0];
      if(c3) c3.category = ch.prevCategory;
    });
  }
  save(); renderAll();
}

function crmNormHeader(h){
  return (h||"").toString().trim().toLowerCase()
    .replace(/ą/g,"a").replace(/ć/g,"c").replace(/ę/g,"e").replace(/ł/g,"l").replace(/ń/g,"n")
    .replace(/ó/g,"o").replace(/ś/g,"s").replace(/ź/g,"z").replace(/ż/g,"z");
}
function crmParseCSV(text){
  if(text.charCodeAt(0)===0xFEFF) text = text.slice(1);
  var firstLine = text.split("\n")[0] || "";
  var delim = (firstLine.split(";").length > firstLine.split(",").length) ? ";" : ",";
  var rows = []; var row = []; var field = ""; var inQuotes = false;
  for(var i=0;i<text.length;i++){
    var ch = text[i];
    if(inQuotes){
      if(ch === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else {
      if(ch === '"') inQuotes = true;
      else if(ch === delim){ row.push(field); field = ""; }
      else if(ch === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(ch === '\r'){ /* skip */ }
      else field += ch;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(function(r){ return r.some(function(f){ return f && f.trim() !== ""; }); });
}
function crmMapColumns(headerRow){
  var map = {};
  var norm = headerRow.map(crmNormHeader);
  Object.keys(CRM_COL_ALIASES).forEach(function(field){
    var aliases = CRM_COL_ALIASES[field].map(crmNormHeader);
    for(var i=0;i<norm.length;i++){
      if(aliases.indexOf(norm[i]) > -1){ map[field] = i; return; }
    }
  });
  if(map.name === undefined) map.name = 0;
  return map;
}
function crmHandleFile(ev){
  var file = ev.target.files && ev.target.files[0];
  if(!file) return;
  var isExcel = /\.xlsx?$/i.test(file.name);
  var reader = new FileReader();
  reader.onload = function(e){
    if(isExcel){
      if(typeof XLSX === "undefined"){
        crmImportPending = null; crmImportWorkbook = null;
        alert("Biblioteka do czytania plików Excela jeszcze się nie załadowała — odśwież stronę i spróbuj ponownie.");
        renderAll();
        return;
      }
      var wb = XLSX.read(e.target.result, {type:"array"});
      crmImportWorkbook = {wb:wb, fileName:file.name};
      crmImportPending = null;
    } else {
      var rows = crmParseCSV(String(e.target.result || ""));
      crmImportWorkbook = null;
      if(!rows.length){ crmImportPending = null; renderAll(); return; }
      var headerRow = rows[0];
      var dataRows = rows.slice(1);
      crmImportPending = {headerRow:headerRow, dataRows:dataRows, map:crmMapColumns(headerRow), fileName:file.name};
    }
    renderAll();
  };
  if(isExcel) reader.readAsArrayBuffer(file); else reader.readAsText(file, "UTF-8");
  ev.target.value = "";
}
function crmCancelSheetPick(){ crmImportWorkbook = null; renderAll(); }
function crmPickSheet(sheetName){
  if(!crmImportWorkbook) return;
  var ws = crmImportWorkbook.wb.Sheets[sheetName];
  var fileLabel = crmImportWorkbook.fileName + " — " + sheetName;
  if(!ws || !ws['!ref']){ crmImportWorkbook = null; renderAll(); return; }
  var range = XLSX.utils.decode_range(ws['!ref']);
  var rows = [];
  for(var R=range.s.r; R<=range.e.r; R++){
    var row = []; var anyVal = false;
    for(var C=range.s.c; C<=range.e.c; C++){
      var cell = ws[XLSX.utils.encode_cell({r:R,c:C})];
      var val = "";
      if(cell){
        if(cell.l && cell.l.Target) val = cell.l.Target;
        else if(cell.v!=null) val = String(cell.v);
        if(val && val.trim()!=="") anyVal = true;
      }
      row.push(val);
    }
    if(anyVal) rows.push(row);
  }
  crmImportWorkbook = null;
  if(!rows.length){ crmImportPending = null; renderAll(); return; }
  var headerRow = rows[0];
  var dataRows = rows.slice(1);
  crmImportPending = {headerRow:headerRow, dataRows:dataRows, map:crmMapColumns(headerRow), fileName:fileLabel};
  renderAll();
}

function crmFilterMatch(c, filter){
  if(!c || c.deletedAt) return false;
  if(filter==="all") return true;
  if(filter==="untagged") return !c.status;
  return c.status === filter;
}
function crmFindIndex(fromIndex, dir, filter){
  var list = state.crmContacts;
  var n = list.length;
  if(!n) return -1;
  var i = fromIndex;
  for(var steps=0; steps<n; steps++){
    i += dir;
    if(i<0) i = n-1;
    if(i>=n) i = 0;
    if(crmFilterMatch(list[i], filter)) return i;
  }
  return crmFilterMatch(list[fromIndex], filter) ? fromIndex : -1;
}
function crmSetFilter(f){
  state.crmMeta.filter = f;
  if(!crmFilterMatch(state.crmContacts[state.crmMeta.reviewIndex], f)){
    var idx = crmFindIndex(state.crmMeta.reviewIndex, 1, f);
    if(idx > -1) state.crmMeta.reviewIndex = idx;
  }
  save(); renderAll();
}

function crmUrl(v, kind){
  v = (v||"").trim();
  if(!v) return "";
  if(/^(link|brak|-|n\/a|nd|brak danych)$/i.test(v)) return "";
  if(/^https?:\/\//i.test(v)) return v;
  if(kind==="ig") return "https://instagram.com/"+encodeURIComponent(v.replace(/^@/,""));
  if(kind==="fb") return "https://facebook.com/"+encodeURIComponent(v);
  if(kind==="website"){
    if(/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(v)) return "https://"+v.replace(/^\/+/, "");
    return "";
  }
  return v;
}

function crmDaysSince(c){
  var base = c.lastContact || c.taggedAt || c.importedAt;
  if(!base) return Infinity;
  var d = new Date(base+"T00:00:00");
  if(isNaN(d)) return Infinity;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}
function crmPriorityBuckets(){
  var buckets = {hot:[], reaktywacja:[], followup:[], nowe:[]};
  crmActiveContacts().forEach(function(c){
    if(c.status==="klient" || c.status==="odrzucili") return;
    if(c.hot){ buckets.hot.push(c); return; }
    if(!c.status){ buckets.nowe.push(c); return; }
    if(c.status==="w_rozmowie"){ buckets.followup.push(c); return; }
    if(c.status==="ucichlo" || c.status==="brak_odpowiedzi"){ buckets.reaktywacja.push(c); return; }
  });
  buckets.nowe.sort(function(a,b){ return (a.importedAt||"").localeCompare(b.importedAt||"") || a.name.localeCompare(b.name); });
  buckets.followup.sort(function(a,b){ return crmDaysSince(b) - crmDaysSince(a); });
  buckets.hot.sort(function(a,b){ return crmDaysSince(b) - crmDaysSince(a); });
  buckets.reaktywacja.sort(function(a,b){
    var rank = {ucichlo:0, brak_odpowiedzi:1};
    var ra = rank[a.status], rb = rank[b.status];
    if(ra !== rb) return ra - rb;
    return crmDaysSince(b) - crmDaysSince(a);
  });
  return buckets;
}

function crmDailyBriefing(){
  var items = [];
  crmActiveContacts().forEach(function(c){
    if(c.status==="klient" || c.status==="odrzucili") return;
    var days = crmDaysSince(c);
    if(c.hot && days>=2){
      items.push({tier:0, days:days, id:c.id, text:'🔥 <b style="color:#fff">'+escapeHtml(c.name)+'</b> — blisko zamknięcia, cisza od '+days+' dni. Zadzwoń albo napisz do niego dziś.'});
    } else if(c.status==="w_rozmowie" && days>=4){
      items.push({tier:1, days:days, id:c.id, text:'<b style="color:#fff">'+escapeHtml(c.name)+'</b> — zrób follow-up: rozmowa w toku, cisza od '+days+' dni.'});
    } else if(c.status==="ucichlo" && days>=10){
      items.push({tier:2, days:days, id:c.id, text:'<b style="color:#fff">'+escapeHtml(c.name)+'</b> — reaktywuj: odpisali, ale ucichło już '+days+' dni temu.'});
    } else if(c.status==="brak_odpowiedzi" && days>=5){
      items.push({tier:2, days:days, id:c.id, text:'<b style="color:#fff">'+escapeHtml(c.name)+'</b> — ponów kontakt: brak odpowiedzi od '+days+' dni.'});
    }
  });
  items.sort(function(a,b){ return (a.tier-b.tier) || (b.days-a.days); });
  return {items:items, noweCount:crmPriorityBuckets().nowe.length};
}

  ["miesiac","rok"].forEach(function(p){
    var labels = {miesiac:"Miesiąc", rok:"Rok"};
    html += '<span class="chip'+(statPeriod===p?" active":"")+'" onclick="setStatPeriod(\''+p+'\')">'+labels[p]+'</span>';
  });
  if(!statMonthVal) statMonthVal = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  if(!statYearVal) statYearVal = String(now.getFullYear());
  html += '</div>';
  if(statPeriod==="miesiac"){
    html += monthYearPickerHtml(statMonthVal, "setStatMonth");
  } else {
    html += '<div class="row" style="gap:6px; margin-bottom:10px; align-items:center">'+
      '<button class="btn secondary small" onclick="changeStatYear(-1)">◀</button>'+
      '<b style="font-size:13px; flex:1; text-align:center">'+statYearVal+'</b>'+
      '<button class="btn secondary small" onclick="changeStatYear(1)">▶</button></div>';
  }

  var cats = ["Wszystko","Cele","Zadania","Nawyki","Finanse","Posty","Instagram","Facebook"];
  html += '<div class="chiprow">';
  cats.forEach(function(c){
    html += '<span class="chip'+(statCats[c]?" active":"")+'" onclick="toggleStatCat(\''+c+'\')">'+c+'</span>';
  });
  html += '</div>';

  var periodKey, rangeLabel, matchesPeriod;
  if(statPeriod==="miesiac"){
    var ym = statMonthVal;
    var parts = ym.split("-"); var y = parseInt(parts[0],10), m = parseInt(parts[1],10);
    var start = y+"-"+String(m).padStart(2,"0")+"-01";
    var lastDay = new Date(y, m, 0).getDate();
    var end = y+"-"+String(m).padStart(2,"0")+"-"+lastDay;
    periodKey = ym;
    rangeLabel = monthName(m-1)+' '+y+'</b> ('+start+' → '+end+')';
    matchesPeriod = function(dateStr){ return dateStr && dateStr.slice(0,7)===ym; };
  } else {
    var yr = statYearVal;
    periodKey = yr;
    rangeLabel = 'Rok '+yr+'</b> ('+yr+'-01-01 → '+yr+'-12-31)';
    matchesPeriod = function(dateStr){ return dateStr && dateStr.slice(0,4)===yr; };
  }
  html += '<div style="color:var(--muted); font-size:12.5px; margin-bottom:16px">Zakres: <b style="color:var(--muted-light)">'+rangeLabel+'</div>';

  var showAll = statCats["Wszystko"];
  html += '<div class="grid grid-2">';

  if(showAll || statCats["Cele"]){
    var ig1 = state.igAccounts[0];
    html += '<div class="card"><h3>Cele</h3>'+goalBar("Instagram "+ig1.handle, ig1.stats[ig1.stats.length-1].followers, ig1.goal)+goalBar("tool4arts — klienci",0,100)+'</div>';
  }
  if(showAll || statCats["Zadania"]){
    var periodTasksCreated = state.tasks.filter(function(t){ return matchesPeriod(t.createdAt); });
    var doneInPeriod = state.tasks.filter(function(t){ return matchesPeriod(t.completedAt); });
    html += '<div class="card"><h3>Zadania</h3><table>'+
      '<tr><td>Ukończone w okresie</td><td style="text-align:right">'+doneInPeriod.length+'</td></tr>'+
      '<tr><td>Utworzone w okresie</td><td style="text-align:right">'+periodTasksCreated.length+'</td></tr>'+
      '<tr><td>Aktualnie otwarte (wszystkie)</td><td style="text-align:right">'+state.tasks.filter(function(t){return !t.done;}).length+'</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Nawyki"]){
    html += '<div class="card"><h3>Nawyki</h3>';
    state.habits.forEach(function(h){
      var pct = statPeriod==="miesiac" ? habitMonthStats(h, periodKey).pct : habitYearStats(h, periodKey).pct;
      html += '<div style="display:flex; justify-content:space-between; padding:6px 0; font-size:13px; color:var(--muted-light)"><span>'+escapeHtml(h.name)+'</span><b>'+pct+'%</b></div>';
    });
    html += '</div>';
  }
  if(showAll || statCats["Finanse"]){
    var finRows = statPeriod==="miesiac"
      ? state.finance.filter(function(f){return f.month===periodKey;})
      : state.finance.filter(function(f){return f.month && f.month.slice(0,4)===periodKey;});
    var fin = finRows.reduce(function(acc,f){
      acc.revenue += f.revenue; acc.bizCost += f.bizCost; acc.personalCost += f.personalCost; acc.target = f.target;
      return acc;
    }, {revenue:0,bizCost:0,personalCost:0,target:20000});
    var income = fin.revenue - fin.bizCost - fin.personalCost;
    html += '<div class="card"><h3>Finanse</h3><table>'+
      '<tr><td>Przychody</td><td style="text-align:right">'+fin.revenue+' zł</td></tr>'+
      '<tr><td>Koszty (biznes + osobiste)</td><td style="text-align:right">'+(fin.bizCost+fin.personalCost)+' zł</td></tr>'+
      '<tr><td>Dochód</td><td style="text-align:right">'+income+' zł</td></tr>'+
      '<tr><td>Cel finansowy'+(statPeriod==="rok"?" (ost. miesiąc)":"")+'</td><td style="text-align:right">'+fin.target.toLocaleString("pl-PL")+' zł</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Posty"]){
    var periodPosts = state.posts.filter(function(p){ return !p.deletedAt && matchesPeriod(p.date); });
    html += '<div class="card"><h3>Posty</h3><table>'+
      '<tr><td>Opublikowane w okresie</td><td style="text-align:right">'+periodPosts.filter(function(p){return p.stage==="opublikowany";}).length+'</td></tr>'+
      '<tr><td>Wszystkie pomysły</td><td style="text-align:right">'+state.posts.filter(function(p){return !p.deletedAt && p.stage==="pomysl";}).length+'</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Instagram"]){
    var ig = state.igAccounts[0];
    html += '<div class="card"><h3>Instagram</h3>'+lineChart(buildChartSeries(ig.stats, statPeriod))+'</div>';
  }
  if(showAll || statCats["Facebook"]){
    var fb = state.fbAccounts[0];
    html += '<div class="card"><h3>Facebook</h3>'+lineChart(buildChartSeries(fb.stats, statPeriod))+'</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}
function setStatPeriod(p){ statPeriod = p; renderAll(); }
function toggleStatCat(c){
  if(c==="Wszystko"){ statCats = {Wszystko:true}; }
  else{
    statCats.Wszystko = false;
    statCats[c] = !statCats[c];
  }
  renderAll();
}

<script>
/* ================= FACEBOOK / INSTAGRAM LOGIN (Faza 4) ================= */
var FB_APP_ID = "1573841530817653";
var FB_GRAPH_VERSION = "v21.0";
window.__fbToken = null;
window.__fbPagesData = null;
var fbPagesLoading = false;

window.fbAsyncInit = function(){
  FB.init({ appId: FB_APP_ID, cookie: true, xfbml: false, version: FB_GRAPH_VERSION });
  FB.getLoginStatus(function(response){
    if(response && response.status === "connected"){
      window.__fbToken = response.authResponse.accessToken;
      maybeAutoSyncSocial();
    }
  });
};

function doFbSignIn(){
  if(typeof FB === "undefined"){
    alert("Facebook SDK jeszcze się nie załadował — spróbuj ponownie za chwilę.");
    return;
  }
  FB.login(function(response){
    if(response && response.authResponse){
      window.__fbToken = response.authResponse.accessToken;
      ensureFbPages(function(){ renderAll(); });
    }
  }, {scope:"pages_show_list,pages_read_engagement,business_management,instagram_basic,instagram_manage_insights"});
}
window.reconnectFb = doFbSignIn;

function ensureFbPages(cb){
  if(!window.__fbToken){ if(cb) cb(); return; }
  if(fbPagesLoading) return;
  fbPagesLoading = true;
  fetch("https://graph.facebook.com/"+FB_GRAPH_VERSION+"/me/accounts?fields=name,id,fan_count,about,picture{url},instagram_business_account{id,username,followers_count,follows_count,media_count,biography,profile_picture_url}", {
    headers:{Authorization:"Bearer "+window.__fbToken}
  }).then(function(r){
    if(r.status===401){ window.__fbToken=null; throw new Error("401"); }
    return r.json();
  }).then(function(json){
    window.__fbPagesData = json.data || [];
    fbPagesLoading = false;
    if(cb) cb();
  }).catch(function(){
    fbPagesLoading = false;
    if(cb) cb();
  });
}

/* Ciche odświeżenie raz dziennie przy pierwszym wejściu — tylko gdy sesja Facebooka jest już aktywna (bez pytania o zgodę ponownie). */
function maybeAutoSyncSocial(retries){
  retries = retries || 0;
  if(typeof state === "undefined" || !state){
    if(retries < 20) setTimeout(function(){ maybeAutoSyncSocial(retries+1); }, 500);
    return;
  }
  if(state._socialAutoSyncDate === todayStr()) return;
  autoSyncAllAccounts();
}
function autoSyncAllAccounts(){
  if(!window.__fbToken || typeof state === "undefined" || !state) return;
  ensureFbPages(function(){
    if(!window.__fbPagesData) return;
    state.igAccounts.forEach(function(acc){ applyFbRefreshAcc("instagram", acc, {silent:true}); });
    state.fbAccounts.forEach(function(acc){ applyFbRefreshAcc("facebook", acc, {silent:true}); });
    state._socialAutoSyncDate = todayStr();
    save();
    if(typeof renderAll === "function") renderAll();
  });
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

var firebaseConfig = {
  apiKey: "AIzaSyD7vHSihsO2MYO-mNycfq5Tt6Zxf92ZbGs",
  authDomain: "mediadgtal-workspace.firebaseapp.com",
  projectId: "mediadgtal-workspace",
  storageBucket: "mediadgtal-workspace.firebasestorage.app",
  messagingSenderId: "720090374015",
  appId: "1:720090374015:web:09275e24f63f93980f844a"
};
var ALLOWED_EMAIL = "kontakt.mediadgtal@gmail.com";

var app = initializeApp(firebaseConfig);
var auth = getAuth(app);
var db = getFirestore(app);
var storage = getStorage(app);
window.uploadClientScreenshot = function(file, path){
  var r = ref(storage, path);
  return uploadBytes(r, file).then(function(){ return getDownloadURL(r); });
};
var provider = new GoogleAuthProvider();
provider.addScope('https://www.googleapis.com/auth/calendar');
provider.addScope('https://www.googleapis.com/auth/spreadsheets');
provider.addScope('https://www.googleapis.com/auth/drive.readonly');

var gate = document.getElementById("authGate");
var gateTitle = document.getElementById("gateTitle");
var gateText = document.getElementById("gateText");
var gateBtn = document.getElementById("gateBtn");
var gateLogo = document.getElementById("gateLogo");
var syncStatusEl = document.getElementById("syncStatus");

function setSyncStatus(text){ if(syncStatusEl) syncStatusEl.textContent = text; }

function showGate(mode){
  gate.classList.remove("hidden");
  gateLogo.style.display = "";
  gateLogo.src = "data:image/png;base64," + (window.LOGO_B64 || "");
  if(mode === "loading"){
    gateTitle.textContent = "Sprawdzanie logowania…";
    gateText.textContent = "Chwileczkę.";
    gateBtn.style.display = "none";
  } else if(mode === "signin"){
    gateTitle.textContent = "MediaDGtal — Workspace";
    gateText.textContent = "To prywatny workspace Damiana. Zaloguj się przez Google, żeby wejść.";
    gateBtn.textContent = "Zaloguj się przez Google";
    gateBtn.style.display = "";
    window.__authAction = doSignIn;
  } else if(mode === "denied"){
    gateTitle.textContent = "Ten workspace jest prywatny";
    gateText.textContent = "To konto nie ma dostępu do tego workspace'u.";
    gateBtn.textContent = "Wyloguj i spróbuj innym kontem";
    gateBtn.style.display = "";
    window.__authAction = doSignOut;
  }
}
function hideGate(){ gate.classList.add("hidden"); }

function doSignIn(){
  gateText.textContent = "Otwieram okno logowania Google…";
  signInWithPopup(auth, provider).then(function(result){
    var credential = GoogleAuthProvider.credentialFromResult(result);
    window.__gcalToken = credential && credential.accessToken;
    window.__gcalBannerDismissed = false;
    if(window.renderGcalBanner) window.renderGcalBanner();
    if(window.onGCalTokenReady) window.onGCalTokenReady();
  }).catch(function(err){
    gateText.textContent = "Logowanie nie powiodło się (" + err.code + "). Spróbuj ponownie.";
  });
}
function doSignOut(){ signOut(auth); }
window.reconnectGCal = doSignIn;

var unsubscribeSnapshot = null;
var pushTimer = null;
var pendingPush = false;

function scheduleFirestorePush(){
  pendingPush = true;
  setSyncStatus("Zapisywanie…");
  if(pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(flushPush, 500);
}
function flushPush(){
  if(!pendingPush) return;
  if(pushTimer){ clearTimeout(pushTimer); pushTimer = null; }
  pendingPush = false;
  var docRef = doc(db, "workspace", "damian");
  setDoc(docRef, window.state).then(function(){
    setSyncStatus("Zsynchronizowano");
  }).catch(function(){
    setSyncStatus("Offline (tylko lokalnie)");
  });
}
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "hidden") flushPush();
});
window.addEventListener("pagehide", flushPush);

function startSync(){
  var originalSave = window.save;
  window.save = function(){
    originalSave();
    scheduleFirestorePush();
  };
  var docRef = doc(db, "workspace", "damian");
  unsubscribeSnapshot = onSnapshot(docRef, function(snap){
    if(snap.exists()){
      var remote = snap.data();
      if((remote._updatedAt||0) < (window.state._updatedAt||0)){
        // Serwer ma starszą wersję niż to, co jest lokalnie (np. odświeżenie strony
        // tuż po zapisie, zanim push zdążył dojść) — nie nadpisuj świeższych lokalnych
        // danych, tylko dopchnij je ponownie do serwera.
        scheduleFirestorePush();
        return;
      }
      var def = window.defaultState();
      Object.keys(def).forEach(function(k){ if(!(k in remote)) remote[k] = def[k]; });
      window.state = window.migrateState(remote);
      originalSave();
      window.renderAll();
      setSyncStatus("Zsynchronizowano");
    } else {
      setDoc(docRef, window.state).then(function(){
        setSyncStatus("Zsynchronizowano");
      });
    }
  }, function(){
    setSyncStatus("Offline (tylko lokalnie)");
  });
}

showGate("loading");
onAuthStateChanged(auth, function(user){
  if(!user){
    showGate("signin");
    return;
  }
  if(user.email !== ALLOWED_EMAIL){
    showGate("denied");
    return;
  }
  hideGate();
  setSyncStatus("Łączenie…");
  startSync();
});
</script>
