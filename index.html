<style>
  :root{
    --sidebar-bg:#16151a; --bg:#1e1c22; --active-bg:#25232c;
    --accent:#cf9b4a; --accent-2:#d9914e; --accent-dim:#8a6a35;
    --pink:#c77398; --pink-bg:#33222a;
    --tool4arts-bg:#342c1f; --tool4arts-text:#cf9b4a;
    --rozwoj-bg:#322419; --rozwoj-text:#e0954a;
    --admin-text:#837a82; --admin-bg:#2a2830;
    --muted:#8a8390; --muted-light:#c5bec3;
    --danger:#d1636f; --success:#7fb88a;
    --border:#2a2830; --text:#f0eef2;
    --radius:12px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); display:flex; min-height:100vh; overflow-x:hidden;
    font-size:14px;
  }
  a{color:inherit}
  button{font-family:inherit; cursor:pointer}
  input,select,textarea{font-family:inherit; font-size:13.5px}

  /* ---- Sidebar ---- */
  #sidebar{
    width:230px; flex:0 0 230px; background:var(--sidebar-bg); color:var(--muted-light);
    display:flex; flex-direction:column; padding:20px 14px; gap:4px; border-right:1px solid var(--border);
  }
  #sidebar .brand{ padding:2px 4px 22px 4px; }
  #sidebar .brand img{ width:100%; height:auto; display:block; }
  .navitem{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:9px;
    color:var(--muted-light); text-decoration:none; font-size:13.5px; border:none; background:transparent; width:100%; text-align:left;
  }
  .navitem:hover{background:rgba(255,255,255,.04); color:#fff}
  .navitem.active{background:var(--active-bg); color:#fff; font-weight:600}

  .wx-bg-cloudy-night{background:linear-gradient(180deg,#232c38,#3a4550 60%,#4c5964)}
  .wx-bg-rain{background:linear-gradient(180deg,#3a4652,#57636e 60%,#71808c)}
  .wx-bg-snow{background:linear-gradient(180deg,#7c8b9c,#aab7c4 60%,#d4dde3)}
  .wx-bg-storm{background:linear-gradient(180deg,#20242c,#333b46 60%,#454e59)}

  .wx-sun{position:absolute; top:22px; right:34px; width:60px; height:60px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff7d6, #ffdd66 55%, #ffb347 100%);
    box-shadow:0 0 40px 12px rgba(255,210,110,.5); animation:sunPulse 6s ease-in-out infinite}
  .wx-moon{position:absolute; top:24px; right:38px; width:44px; height:44px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fdfdf5, #d9d9c8 60%, #a9a998 100%);
    box-shadow:0 0 26px 6px rgba(255,255,240,.3)}
  @keyframes sunPulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.06)}}

  .wx-cloud{position:absolute; background:rgba(255,255,255,.85); border-radius:50px}
  .wx-cloud:before, .wx-cloud:after{content:""; position:absolute; background:inherit; border-radius:50%}
  .wx-cloud.c1{width:90px; height:28px; top:26px; left:-150px; animation:driftCloud 32s linear infinite}
  .wx-cloud.c1:before{width:42px; height:42px; top:-20px; left:10px}
  .wx-cloud.c1:after{width:32px; height:32px; top:-14px; left:44px}
  .wx-cloud.c2{width:66px; height:22px; top:78px; left:-120px; opacity:.7; animation:driftCloud 44s linear infinite; animation-delay:-12s}
  .wx-cloud.c2:before{width:32px; height:32px; top:-15px; left:8px}
  .wx-cloud.c2:after{width:24px; height:24px; top:-11px; left:32px}
  .wx-cloud.c3{width:104px; height:32px; top:128px; left:-160px; opacity:.55; animation:driftCloud 56s linear infinite; animation-delay:-26s}
  .wx-cloud.c3:before{width:48px; height:48px; top:-22px; left:14px}
  .wx-cloud.c3:after{width:36px; height:36px; top:-16px; left:54px}
  @keyframes driftCloud{from{left:-160px} to{left:100%}}

  .wx-rain, .wx-snow{position:absolute; inset:0; overflow:hidden}
  .wx-drop{position:absolute; top:-20px; width:2px; height:16px;
    background:linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,.75));
    animation-name:fallRain; animation-timing-function:linear; animation-iteration-count:infinite}
  @keyframes fallRain{to{transform:translateY(260px)}}
  .wx-flake{position:absolute; top:-10px; border-radius:50%; background:#fff; opacity:.9;
    animation-name:fallSnow; animation-timing-function:linear; animation-iteration-count:infinite}
  @keyframes fallSnow{to{transform:translate(var(--drift,10px),260px)}}
  .wx-flash{position:absolute; inset:0; background:#fff; opacity:0; animation:flash 7s ease-in-out infinite}
  @keyframes flash{0%,93%,100%{opacity:0} 94%{opacity:.45} 95%{opacity:0} 96%{opacity:.3} 97%{opacity:0}}
  .row-flash{animation:rowFlash 2.5s ease-out}
  @keyframes rowFlash{0%{background:rgba(207,155,74,.35)} 100%{background:transparent}}

  @media(max-width:480px){
    #topbar h1{font-size:17px}

    .hero-greet{font-size:21px}
  }

function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function seedHistoricalLog(habitName, log){
  var hist = HABIT_HISTORY_2026[habitName];
  if(!hist) return;
  Object.keys(hist).forEach(function(ym){
    var parts = ym.split("-"), y = +parts[0], m = +parts[1];
    var dim = daysInMonth(y,m);
    var doneCount = Math.round(hist[ym]/100*dim);
    for(var d=1; d<=doneCount; d++){ log[ym+"-"+String(d).padStart(2,"0")] = true; }
  });
}
function habitMonthStats(h, ym){
  var parts = ym.split("-"), y = +parts[0], m = +parts[1];
  var dim = daysInMonth(y,m);
  var done = 0;
  for(var d=1; d<=dim; d++){
    if(h.log && h.log[ym+"-"+String(d).padStart(2,"0")]) done++;
  }
  return {done: done, days: dim, pct: dim ? Math.round(done/dim*100) : 0};
}
function habitYearStats(h, yr){
  var totalDone=0, totalDays=0;
  for(var m=1;m<=12;m++){
    var st = habitMonthStats(h, yr+"-"+String(m).padStart(2,"0"));
    totalDone += st.done; totalDays += st.days;
  }
  return {done: totalDone, days: totalDays, pct: totalDays ? Math.round(totalDone/totalDays*100) : 0};
}

h. Brak konkretu w BIO. Brak szybkiej odpowiedzi."}, {"hook": "Tak wygląda rozmowa, która sprzedaje zajęcia", "opis": "Pokaż zrzut ekranu rozmowy z DM (zanonimizowany) — konkretny przykład rozmowy, która realnie sprzedaje zajęcia."}, {"hook": "Nie rób takich rolek", "opis": "Pokaż przykład słabego, cringe contentu i powiedz wprost dlaczego on nie działa."}, {"hook": "Ile naprawdę zarabia studio pole dance?", "opis": "Pokaż konkretne liczby — Twoje wyliczenia. Ten format robi duży zasięg."}, {"hook": "Masz pełne zajęcia tylko w styczniu?", "opis": "Sezonowość i brak systemu — dlaczego grafik pełny jest tylko przez chwilę w roku, a potem wraca pustka."}, {"hook": "To zabija Twój zapis w 5 sekund", "opis": "Chaos w BIO — pokaż jak bałagan w bio odstrasza potencjalną klientkę w kilka sekund."}, {"hook": "Jeśli ktoś pisze 'ile kosztuje' i znika — robisz to źle", "opis": "Pokaż złą odpowiedź na pytanie o cenę zestawioną z poprawną odpowiedzią, która utrzymuje rozmowę."}, {"hook": "Nie potrzebujesz strony www", "opis": "Wystarczy Instagram, DM i prosty system. Kontrowersyjna teza, ale właśnie to robi zasięg."}, {"hook": "Najlepszy sposób na pierwszych klientów do studia", "opis": "Prosty schemat: rolka → DM → zapis."}, {"hook": "Dlaczego boostowanie postów NIE działa", "opis": "Wyjaśnij dlaczego samo boostowanie postów nie przynosi zapisów i co robić zamiast tego."}, {"hook": "Instruktorki pole dance robią ten błąd", "opis": "Brak personal brandu — dlaczego instruktorki tracą przez to zapisy i pieniądze."}, {"hook": "Masz 1000 obserwujących i 0 zapisów?", "opis": "Rozbij to logicznie — dlaczego sama liczba obserwujących nic nie znaczy bez systemu sprzedaży."}, {"hook": "Tak wygląda studio, które zarabia", "opis": "Pokaż w formie checklisty jak wygląda studio, które realnie zarabia."}, {"hook": "Jak w 7 dni zdobyć pierwsze zapisy", "opis": "Szybki, konkretny plan działania na 7 dni."}, {"hook": "To jedno pytanie zamyka klienta", "opis": "Pokaż konkretne pytanie do DM, które est miejsce dla mnie.' I właśnie straciłeś potencjalną klientkę.\n\nNajlepszy marketing studia nie imponuje branży. On uspokaja kobietę, która boi się zacząć."}, {"hook": "Największym konkurentem studia nie jest inne studio. Jest wstyd klientki.", "opis": "Kobiety często NIE boją się zajęć. Boją się tego jak będą ocenione.\n\nMyśli przed pierwszym wejściem: 'wszyscy będą lepsi', 'będę sztywna', 'ośmieszę się', 'nie mam formy', 'jestem za gruba', 'jestem za stara'.\n\nI teraz najważniejsze: większość studiów kompletnie nie adresuje tych emocji w contencie.\n\nZamiast bezpieczeństwa pokazują idealne ciała, trudne figury, profesjonalne choreografie. Czyli dokładnie to, czego boi się początkująca osoba.\n\nStudio które nauczy się redukować strach klientki, wygra tę branżę."}, {"hook": "Instagram zniszczył percepcję branży pole dance.", "opis": "Social media zrobiły branży pole dance jednocześnie ogromną reklamę… i ogromny problem.\n\nBo dziewczyny widzą perfekcyjne ciała, perfekcyjne figury, perfekcyjne choreografie. Ale nie widzą początku, bólu, wstydu, procesu.\n\nEfekt? Setki kobiet myślą: 'To nie jest dla mnie.'\n\nParadoksalnie wiele studiów odstrasza swoje idealne klientki próbując wyglądać zbyt profesjonalnie.\n\nPoczątkująca kobieta nie chce zobaczyć perfekcji. Chce zobaczyć, że też może zacząć."}, {"hook": "Właścicielki studiów są często zakładniczkami własnego biznesu.", "opis": "Marzeniem było własne studio. A potem studio zaczęło kontrolować całe życie.\n\nBrak wolnego. Telefon non stop. Odpisywanie po nocach. Wieczne gaszenie problemów.\n\nI najgorsze: im więcej klientek, tym często większy chaos. Bo biznes urósł szybciej niż system.\n\nWiele studiów działa dzisiaj bardziej na heroizmie właścicielki niż na procesach.\n\nBiznes nie powinien potrzebować Twojego stresu żeby działać."}, {"hook": "Niektóre studia mają świetne zajęcia i fatalny pierwszy kontakt.", "opis": "Możesz mieć najlepsze zajęcia w mieście. I dalej przegrywać z gorszym studiem.\n\nBo klientka ocenia Cię zanim wejdzie na salę.\n\nA większość pierwszych kontaktów wygląda tak: odpowiedź po 7 godzinach, sucha wiadomość, brak energii, brak prowadzenia rozmowy.\n\nDziewczyna która chce zacząć pole dance często potrzebuje emocjonalnego poprowadzenia. Nie tylko cennika.\n\nSprzedaż w tej branży zaczyna się od poczucia komfortu."}, {"hook": "Nie każda klientka chce zostać pole dancerką. I to jest OK.", "opis": "Ogromny błąd branży? Próba robienia z każdej dziewczyny 'pole girl'.\n\nCzęść kobiet chce po prostu wyjść z domu, poczuć się lepiej, poruszać się, poznać ludzi.\n\nI to są często najlepsze klientki: regularne, lojalne, bez dram, zostające na lata.\n\nNie każda klientka marzy o zawodach, exoticu i figurach na poziomie PRO.\n\nStudio powinno umieć sprzedawać także NORMALNOŚĆ. Nie tylko aspirację."}, {"hook": "Najbardziej niedoceniana rzecz w studiu? Atmosfera.", "opis": "Wiele kobiet nie pamięta po roku jakie robiły figury. Ale pamięta jak się czuły.\n\nPamiętają czy ktoś je przywitał, czy czuły się oceniane, czy mogły popełniać błędy, czy miały stres przed zajęciami.\n\nAtmosfera to nie dodatek do zajęć. To część produktu.\n\nI właśnie dlatego słabsze technicznie studia czasem wygrywają, a świetne technicznie studia tracą klientki.\n\nLudzie wracają tam, gdzie czują się bezpiecznie."}, {"hook": "Twoje studio nie ma problemu z brakiem klientek. Ma problem z marketingiem.", "opis": "Większość studiów tańca i pole dance NIE ma problemu z małą liczbą kobiet zainteresowanych zajęciami.\n\nMa problem z nijakim Instagramem, chaotycznym contentem, słabą komunikacją, brakiem systemu sprzedaży.\n\nCodziennie setki kobiet myślą: 'chciałabym spróbować pole dance', 'muszę wrócić do ruchu', 'chcę zrobić coś dla siebie'. Ale trafiają na profil studia i… nic ich nie przekonuje, wręcz odstrasza.\n\nNajczęstsze błędy profili: wrzucanie dojebanych filmów z choreografii, brak pokazania atmosfery, brak CTA, BIO które nic nie tłumaczy, brak procesu zapisu, chaos komunikacyjny.\n\nInstagram studia powinien robić 3 rzeczy: przyciągać uwagę, budować zaufanie, zamieniać obserwatorki w zapisy. Większość robi tylko punkt 1.\n\nJeśli chcesz checklistę: '10 rzeczy które odstraszają klientki od zapisów' — napisz w komentarzu: START"}, {"hook": "Dlaczego Twoje rolki mają wyświetlenia, ale nie zapisują ludzi?", "opis": "100k wyświetleń i 0 nowych klientek? To częstsze niż myślisz.\n\nBo viral ≠ sprzedaż. Dziewczyny oglądają tricki, exotic, przejścia, szpagaty. Ale to jeszcze nie oznacza, że zapiszą się na zajęcia.\n\nBrakuje emocji początkującej osoby, poczucia bezpieczeństwa, procesu, wyjaśnienia 'jak zacząć'.\n\nTreści które SPRZEDAJĄ zajęcia: 'bałam się przyjść', 'nie miałam siły', 'myślałam że się nie nadaję', 'tak wygląda pierwszy miesiąc'. To identyfikacja sprzedaje.\n\nJeśli chcesz listę 20 rolek które realnie przyciągają nowe kursantki — napisz: ROLKI"}, {"hook": "Największy problem studiów? Właściciel robi wszystko sam.", "opis": "Studio nie rośnie, bo jesteś instruktorką + recepcją + marketingiem + sprzedażą + montażystką.\n\nWiększość właścicielek działa w trybie: 'wrzucić coś szybko żeby profil nie umarł'. To nie strategia. To gaszenie pożarów.\n\nEfekt? Brak regularności, chaos, brak lejka, brak follow-upu, wypalenie.\n\nStudio zaczyna rosnąć dopiero wtedy, gdy pojawia się SYSTEM: contentu, reklam, odpowiedzi, zapisów, obsługi klienta.\n\nChcesz zobaczyć jak wygląda prosty system pozyskiwania klientek dla studia? Komentarz: SYSTEM"}, {"hook": "BIO które odstrasza klientki od zapisów", "opis": "90% BIO studiów wygląda praktycznie tak samo. I prawie żadne nie sprzedaje.\n\nPrzykład złego BIO: 'Pole Dance | Exotic | Stretching', 'Zapraszamy ❤️'. To nie mówi klientce NIC.\n\nBIO powinno odpowiadać na: dla kogo są zajęcia, jaki efekt dają, jak zacząć, co zrobić teraz.\n\nLepszy przykład: 'Pole Dance od podstaw dla kobiet z Poznania. Kameralne grupy. Pierwsze zajęcia bez doświadczenia ↓'\n\nNapisz 'BIO' a wyślę Ci schemat BIO które zwiększa ilość zapisów."}, {"hook": "Dlaczego reklamy NIE działają większości studiów", "opis": "'Puściliśmy reklamy i nic z tego nie było.' Problem? Najczęściej reklamy nie były problemem.\n\nNajczęstszy scenariusz: słaba rolka, brak oferty, brak procesu DM, brak follow-upu, odpis po 10 godzinach.\n\nReklama nie naprawia chaosu. Reklama go przyspiesza.\n\nDobra reklama działa dopiero gdy profil wzbudza zaufanie, wiadomości są dobrze prowadzone, klientka wie co zrobić, ktoś potrafi zamknąć zapis.\n\nJeśli chcesz zobaczyć jak wygląda DOBRY proces od reklamy do zapisu — napisz: ADS"}, {"hook": "Instruktorki tracą ogromne pieniądze przez jeden błąd", "opis": "Największy błąd instruktorek? Budują tylko konto studia. Nie budują własnej marki.\n\nDziewczyny zapisują się do ludzi. Nie do logotypów.\n\nMarka osobista instruktorki daje: większe zaufanie, więcej zapisów, lepsze stawki, łatwiejszą sprzedaż online, większą rozpoznawalność.\n\nInstruktorka z mocnym profilem może: sprzedawać warsztaty, prowadzić online, robić mentoring, budować własny biznes.\n\nChcesz listę contentu dla instruktorki pole dance? Napisz: MARKA"}, {"hook": "Studio nie potrzebuje codziennych postów", "opis": "Nie musisz publikować codziennie. Musisz publikować MĄDRZE.\n\nLepsze są 3 mocne treści tygodniowo, niż 7 przypadkowych rolek.\n\nKażdy content powinien robić minimum jedną rzecz: budować zaufanie, edukować, obalać obawy, pokazywać efekt, generować DM.\n\nWiększość studiów tworzy content dla innych instruktorek. Nie dla klientek. I to ogromny problem.\n\nChcesz mój schemat contentu dla studiów? Komentarz: CONTENT"}, {"hook": "Klientka nie kupuje zajęć. Kupuje emocję.", "opis": "Kobiety nie zapisują się na rurkę. Zapisują się po emocję.\n\nKupują pewność siebie, kobiecość, ludzi, atmosferę, odskocznię od życia, poczucie progresu.\n\nDlatego najlepsze treści NIE pokazują tylko tricków. Pokazują historię, przemianę, emocje, relacje.\n\nIm szybciej studio to zrozumie, tym szybciej zacznie przyciągać właściwe klientki.\n\nNapisz 'EMOCJE' jeśli chcesz przykłady rolek które budują emocjonalną sprzedaż."}, {"hook": "Za 2-3 lata studia bez systemów będą miały ogromny problem", "opis": "Branża tańca zaczyna się profesjonalizować. I wiele studiów kompletnie nie jest na to gotowych.\n\nJeszcze niedawno wystarczało: wrzucić zdjęcie, zrobić stories, odpisać czasem na DM. To się kończy.\n\nWygrywać będą studia które mają: system marketingu, reklamy, automatyzacje, CRM, proces sprzedaży, markę.\n\nTalent instruktorski już nie wystarcza. Potrzebny jest też biznes.\n\nObserwuj jeśli chcesz budować studio nowoczesne, a nie tylko 'ładny profil na IG'."}, {"hook": "Masz studio pole dance i dalej masz wolne miejsca? To nie wina algorytmu.", "opis": "90% studiów robi ładne rolki… ale nikt z nich nie mówi ludziom CO MAJĄ ZROBIĆ dalej.\n\nBrak CTA. Brak sprzedaży w DM. Brak systemu.\n\nI potem zdziwienie, że nikt się nie zapisuje.\n\nNapisz 'GRUPY' – wyślę Ci dokładnie co zmienić, żeby mieć więcej zapisów."}, {"hook": "Zapisują się na pole dance… i nie przychodzą?", "opis": "To nie jest problem ceny. To nie jest problem zajęć.\n\nTo jest problem tego, że NIKT do nich nie pisze po zapisie.\n\nBrak przypomnienia. Brak kontaktu. Brak relacji.\n\nOne po prostu… zapominają albo się stresują.\n\nNapisz 'DM' – pokażę Ci dokładnie co pisać, żeby przyszły na pierwsze zajęcia."}, {"hook": "To jedno zdanie zwiększa zapisy na zajęcia pole dance.", "opis": "Większość studiów odpowiada tak: 'karnet kosztuje 180 zł'. I klient znika.\n\nZamiast tego napisz: 'Super, który poziom Cię interesuje i kiedy chcesz zacząć?'\n\nI nagle rozmowa idzie dalej.\n\nNapisz 'SPRZEDAŻ' – dam Ci więcej takich tekstów."}, {"hook": "Masz 1000 obserwujących i dalej zero klientów?", "opis": "Bo obserwujący NIE kupują. Kupują ludzie, z którymi rozmawiasz.\n\nJeśli nie masz rozmów w DM, systemu odpowiedzi, konkretnego zaproszenia — to możesz mieć i 10k followersów i dalej 0 zapisów.\n\nNapisz 'SYSTEM' – pokażę Ci jak zamieniać obserwujących w klientki."}, {"hook": "Multisport zniszczył szkoły tańca", "opis": "Karty benefitowe miały pomóc, miały przyciągać klientów, a w praktyce często rozwalają biznes od środka — kursanci płacą grosze, są bardziej roszczeniowi i mniej zaangażowani. Traktują zajęcia jak dobrą zabawę, zajawkę 'na chwilę'. A kiedy im się nie chce, to nie przyjdą, logiczne.\n\nEfekt? Czasem masz pełne sale, czasem puste. Czasem hajs się zgadza, czasem czekasz na 20-sty jak na gwóźdź do trumny Twojego biznesu.\n\nNajgorsze? Ciężko z tego wyjść. Bo jak zabierzesz multisporta to połowa osób zniknie. I właściciel zostaje z problemem — masz podobnie u siebie?\n\nJeśli tak, napisz w komentarzu 'MULTI' a wyślę Ci rozwiązanie, które pomogło moim klientom pozbyć się benefitów."}, {"hook": "Największy problem Studiów Tańca i Pole Dance to nie marketing", "opis": "Większość właścicieli z którymi rozmawiałem uważa, że jeśli nie ma zapełnionego grafiku to potrzebuje marketingu i dostarczenia nowych klientów. A prawda jest taka, że nie mają systemu do zapisów i opłacania zajęć, nie mają kontroli nad grafikiem, wszystkim zajmuje się właściciel 'przy okazji' wolnego czasu. Jeden wielki chaos.\n\nI nawet jak przyjdą nowi kursanci to robi się jeszcze większy chaos. Marketing bez ogarniętych podstaw to tylko przyspieszenie Twoich problemów.\n\nTrafiłem w sedno? Skomentuj 'SYSTEM' a podrzucę Ci checklistę procesów, które powinny być ogarnięte zanim ruszysz z kampanią."}, {"hook": "Dlaczego reklamy nie działają szkołom tańca", "opis": "Bo próbują sprzedawać wszystkim, zamiast konkretnej osobie, konkretnego poziomu, konkretnej godziny.\n\nReklama typu 'pole dance Wrocław' nie działa tak dobrze jak 'środa 18:00 – start od zera – 3 miejsca'.\n\nLudzie chcą konkretu.\n\nRobisz reklamy ogólne czy pod konkretne grupy?"}, {"hook": "To najbardziej wkurwia właścicieli", "opis": "Zapisuje się. Nie przychodzi. Chce odrabiać. Przyprowadza koleżankę na multisporcie. I jeszcze ma pretensje, że nie może wejść.\n\nBranża taneczna to trochę jak praca z dziećmi — tylko że dorośli.\n\nKto to zna z życia?"}, {"hook": "Jak zapełnić grupę z 2 osób", "opis": "Nie robisz ogólnej reklamy, tylko pokazujesz konkretną grupę, konkretny dzień, konkretny vibe — i mówisz: 'zostały 3 miejsca'.\n\nLudzie kupują decyzję, nie ofertę.\n\nMasz takie puste grupy u siebie?"}, {"hook": "Instruktorki robią ten błąd na IG", "opis": "Wrzucają wszystko — pole dance, życie, wakacje, koty — i chcą sprzedawać jedną rzecz. Ale ludzie nie wiedzą po co mają je obserwować.\n\nProfil = jeden kierunek.\n\nMasz jeden kierunek czy wszystko naraz?"}, {"hook": "Ostatnio gadałem z instruktorką z Warszawy…", "opis": "Chce robić zajęcia online, ma pomysły, ma potencjał, ale nie wie jak to poukładać. I to jest mega częsty przypadek — dużo umiejętności, zero strategii.\n\nA wystarczy dobrze to poukładać i można to skalować.\n\nMasz pomysł ale nie wiesz jak ruszyć?"}, {"hook": "Dlaczego szkoły tańca nie rosną", "opis": "Dochodzą do momentu: grafik pełny → stop. Brak kolejnego kroku, brak skalowania, i właściciel stoi w miejscu.\n\nAlbo robi drugą lokalizację… i zaczynają się problemy.\n\nMasz już ten moment u siebie?"}, {"hook": "Nie potrzebujesz więcej klientów", "opis": "Potrzebujesz lepszego systemu zapisów, lepszego domykania.\n\nBo często ludzie piszą… i nic z tego nie wynika. To tam uciekają pieniądze.\n\nOdpisujesz szybko czy po kilku godzinach?"}, {"hook": "Tak wygląda marketing który działa", "opis": "Rolki, emocje → wiadomość → szybka odpowiedź → zapis.\n\nBez stron, bez kombinowania. Prosty system.\n\nUżywasz DM czy formularzy?"}, {"hook": "Jak wygląda moja praca w tej branży", "opis": "Ludzie myślą że marketing to reklamy, a 80% roboty to rozmowy, analiza, poprawianie chaosu. Reklamy to tylko narzędzie.\n\nTeż tak to widzisz czy inaczej?"}, {"hook": "POV: klient z multisportem", "opis": "Scenka / tekst: 'mam multisporta, więc mogę wszystko?'\n\nNie mów że nie masz takich."}, {"hook": "Najwięcej pieniędzy ucieka Ci w wiadomościach", "opis": "Ktoś pisze: 'hej, ile kosztuje?' I co się dzieje? Odpis po 5 godzinach, albo: 'cennik w linku' — i klient znika.\n\nA prawda jest taka, że zapis robi się w rozmowie, nie w reklamie.\n\nOdpisujesz od razu czy po czasie?"}, {"hook": "Zanim wydasz złotówkę na reklamę — sprawdź te 5 rzeczy", "opis": "Dla właścicielek, które wydają pieniądze na reklamy z desperacji, nie wiedząc co robią.\n\nTo moment największego bólu finansowego — właścicielka która już przepaliła budżet i nie wie dlaczego, kliknie w to natychmiast.\n\nSłowo-klucz: REKLAMA"}, {"hook": "7 rzeczy które musi mieć nowe studio tańca zanim wyda złotówkę na marketing", "opis": "Dla nowych studiów, które chcą wybić się ponad konkurencję.\n\nNowe studia to bardzo konkretna grupa, która szuka gotowej listy rzeczy do zrobienia. Checklista jest formatem, który się zapisuje i wraca się do niego wielokrotnie.\n\nSłowo-klucz: START"}, {"hook": "Jak komunikować pole dance w małej miejscowości żeby zapisy szły mimo stereotypów", "opis": "Dla studiów w małych miastach, gdzie pole dance kojarzy się źle.\n\nTen problem jest bardzo specyficzny i bardzo bolesny. Właścicielka z małego miasta, która to zobaczy, poczuje że mówisz dokładnie do niej — bo nikt inny o tym nie mówi.\n\nSłowo-klucz: MIASTO"}, {"hook": "Multisport zniszczył więcej szkół tańca niż jakikolwiek inny kryzys.", "opis": "Z pozoru to właściwie świetna sprawa, nie? Karta Multisport, Medicover czy inny benefit, ludzie przychodzą, sala Ci się zapełnia i wszystko wygląda cacy. Tylko jest jeden haczyk, o którym każdy wie, ale mało kto o nim mówi.\n\nWeźmy na przykład ten Multisport. Klient z Multisportu nie jest Twoim klientem. On jest klientem Multisportu. Przychodzi do Ciebie na zajęcia bo ma to w pakiecie swojej karty, a nie dlatego, że wybrał właśnie Twoje studio, bo masz lux atmosferkę, czyste kible i cudownych instruktorów, za którymi szaleje całe miasto.\n\nW momencie, kiedy znajdzie inne zajęcia, bliżej siebie, o lepszej godzinie w tej samej ofercie swojego Mulciaka — znika bez słowa.\n\nNie zbudujesz lojalności na kimś, kto nie zapłacił Ci ani złotówki z własnej kieszeni. Brutalne, ale prawdziwe. No bo chyba nie muszę przypominać Ci, ile Multisport wypłaci Ci za odbicie Gangu Mulciaków.\n\nI tak — łatwo mówić, kiedy wszyscy wokół honorują karty benefitowe, a Ty po prostu nie chcesz zostać w tyle. Nie mówię, że masz rezygnować z Mulciaków tu i teraz. Ale nie buduj na nich całego biznesu. Bo jak oni zmienią warunki — a jak wiemy zmienią, bo why not — to zostajesz z pustą salą i kursantami, którzy nigdy nie byli Twoi.\n\nWprowadzaj stopniowo ofertę, która będzie zbudowana na karnetach i pakietach. W ten sposób zbudujesz swoją, lojalną bazę klientów.\n\nSwoją drogą… 'honorując karty benefitowe' nie honorujesz idei swojego biznesu."}, {"hook": "Jeśli mówisz 'u nas panuje rodzinna atmosfera' to brzmisz jak HR z korpo i serio bardziej odstraszasz niż przyciągasz.", "opis": "Pomyśl o tym z perspektywy kogoś, kto nigdy nie był u Ciebie w studiu. Co oznacza 'rodzinna atmosfera' dla obcej osoby? Bo ja rozumiem to tak: wszyscy się tu znają, są zgrani, mają swoje paczki, które trzymają się razem od lat.\n\nA teraz wyobraź sobie, że jesteś nowa, nieśmiała, boisz się, że nie dasz rady, obawiasz się oceny itd. Czytasz 'rodzinna atmosfera' i myślisz: kurde, czy oni będą mnie chcieć w tej rodzinie?\n\nDlatego zamiast tego napisz coś, co mówi wprost do niej. Np. — każda z nas też kiedyś zaczynała od zera, nikt Cię nie będzie oceniał, pierwsze zajęcia są po to żeby się oswoić, sprawdzić, nie żeby komuś zaimponować.\n\nTo przyciąga. 'Rodzinna atmosfera' — no nie."}, {"hook": "'Pomyślę i się odezwę.' Jeśli to słyszysz od swojej potencjalnej kursantki to w 90% przypadków już jej nie zobaczysz. Chyba że powiesz to jedno zdanie.", "opis": "Bo 'pomyślę i się odezwę' prawie nigdy nie znaczy, że ona naprawdę pomyśli. Oznacza to, że coś ją blokuje, ale nie chce Ci o tym powiedzieć. Najczęściej po prostu boi się, że nie da rady, że jest za gruba, za stara, za mało sprawna. I zamiast to powiedzieć wprost, ucieka w grzeczne 'pomyślę i się odezwę'.\n\nWięc nie odpuszczaj jej w tym momencie. Zapytaj wprost, ale ciepło: 'Jasne, daj sobie czas. Powiedz mi tylko szczerze, czy jest coś co Cię powstrzymuje, bo może mogę pomóc Ci to rozwiać.'\n\nTo jedno zdanie otwiera prawdziwą rozmowę. Często okazuje się, że ona po prostu potrzebowała usłyszeć, że jej obawa jest normalna. I że każda z Was na początku tak miała.\n\nNie naciskaj na sprzedaż. Naciskaj na to, żeby zrozumieć czego się boi. Bo najczęstsze obawy to: finanse, czas rozpoczęcia zajęć, albo po prostu coś jej się nie spodobało podczas Waszej rozmowy i nie do końca to jeszcze rozumie.\n\nDopytaj, uwierz mi — działa."}, {"hook": "Masz pełne grupy i nadal ledwo spinasz miesiąc? To nie przypadek. I nie brak klientów jest Twoim problemem.", "opis": "Bo pełna grupa wygląda zajebiście na Instagramie, ale to nie znaczy że zajebiście zarabiasz. Niestety są studia z kompletem na każdych zajęciach, a i tak na koniec miesiąca są pod kreską.\n\nPolicz to sobie na spokojnie. Wynajem sali, prąd, instruktorzy, marketing, sprzęt, twoja własna praca, której często w ogóle nie wliczasz. A teraz zestaw to z ceną karnetu i liczbą osób, która faktycznie płaci pełną stawkę, bo jak wiemy część jest na Multisporcie, część na jakichś zniżkach, część zalega z wpłatami.\n\nI nagle się okazuje, że ta piękna pełna grupa ledwo wychodzi na zero.\n\nUwaga! Więcej kursantek nie rozwiąże tego problemu. Więcej kursantek tylko go pogłębi. Problem rozwiąże dopiero moment, w którym usiądziesz i policzysz ile naprawdę zarabiasz na jednym miejscu w grupie. Bo dopiero wtedy wiesz, czy w ogóle masz biznes, czy drogie hobby."}, {"hook": "Prowadzisz Studio Pole Dance w małym mieście? To grasz w zupełnie inną grę niż Studia z dużych miast.", "opis": "Prawdopodobnie większość porad marketingowych w ogóle do Ciebie nie pasuje.\n\nBo w Warszawie czy Katowicach masz tysiące potencjalnych kursantek. Robisz reklamę, trafiasz do nowych ludzi, grupa się zapełnia. Proste.\n\nW małym mieście rynek jest po prostu mniejszy. Na pewno znasz to uczucie — przerobiłaś już chyba wszystkich zainteresowanych, a do tego Pole Dance ciągle komuś się kojarzy… wiadomo z czym. A Exotic?\n\nWięc w małym mieście nie wygrywasz zasięgiem. Wygrywasz reputacją i edukacją. Twoim zadaniem nie jest krzyczeć 'hej! Zapisz się' do tysięcy obcych. Twoim zadaniem jest cierpliwie zmieniać to, jak ludzie myślą o Pole Dance, i pokazywać że to jest sport, siła, że to są kobiety w każdym wieku o każdej figurze.\n\nInaczej, Grażynka z klatki obok nadal będzie myślała, że u Ciebie dziewczyny po zajęciach robią drugi etat… nocny."}, {"hook": "Powiem Ci szczerze z kim chcę pracować, a z kim nie wezmę współpracy nawet za podwójną stawkę.", "opis": "Nie biorę już klientów którzy traktują marketing jak automat z napojami. Wrzucam kasę, wypada wynik. Płacę - wymagam. Tak to nie działa i działać nie będzie.\n\nMój idealny klient to właściciel lub właścicielka, która rozumie jedną rzecz: ja dostarczam zainteresowane osoby pod drzwi, ale to oni muszą je wpuścić do środka. Czyli co? Odpisać na wiadomość tego samego dnia, a nie po tygodniu. Przyjść na spotkanie jeśli umawiamy się z tygodniowym wyprzedzeniem. Powiedzieć mi czego potrzebuje jeśli pytam, a nie nie odzywać się 2 tygodnie.\n\nSerio, to się zdarza. Z kimś takim ja cudów nie zdziałam. Bo to nie jest realna współpraca, tylko zlecenie, które ktoś rzucił i zapomniał.\n\nWięc jeśli szukasz magika, który sam wszystko zrobi, a Ty będziesz tylko liczyć kasę — to spokojnie, znajdzie się ktoś, kto Ci to obieca. Ja Tobie tego nie mogę obiecać.\n\nA jeśli jest to dla Ciebie absurdem, tak jak dla mnie, to prawdopodobnie się dogadamy."}, {"hook": "Jak masz mało zapisów i pierwsze co Ci przychodzi do głowy to obniżyć cenę, to gratuluję, właśnie zaczęłaś zamykać swoje Studio.", "opis": "Niska cena nie przyciąga lepszych klientów. Przyciąga tylko tych najgorszych. Tych, którzy odejdą do następnego studia, gdy tamto da promocję o dziesięć złotych niższą.\n\nA do tego psujesz rynek sobie i wszystkim wokół. Bo gdy Ty zejdziesz z ceny, konkurencja wpadnie na genialny pomysł żeby zejść jeszcze niżej, i nagle cała branża w mieście uczy ludzi, że taniec jest taniuśki. I potem się dziwicie, że nikt nie chce płacić normalnej stawki.\n\nJak masz mało zapisów, problemem prawie nigdy nie jest cena. Problemem jest to, że nie pokazałaś wartości, za którą warto zapłacić. Napraw komunikację, nie cennik.\n\nTanio może każdy. Sztuką jest sprawić, żeby ktoś zapłacił więcej i był szczęśliwy, że to zrobił."}, {"hook": "Marketer wśród kobiet na szpilkach - i co z tego wynika", "opis": "Większość marketerów obsługuje siłownie, restauracje albo sklepy internetowe.\n\nJa obsługuję Studia Pole Dance i Tańca.\n\nNie narzekam.\n\nJeśli chcesz wiedzieć jak pozyskiwać klientki przez Instagram bez płacenia za każde kliknięcie — obserwuj."}, {"hook": "Co robią studia pole dance które stale mają pełny grafik?", "opis": "Są studia, które zawsze mają wolne miejsca. I takie, które mają listę oczekujących. Co robią inaczej?\n\nNie mają lepszej lokalizacji ani niższych cen. Mają lepszą komunikację. Ich Instagram odpowiada na pytania zanim klientka je zada.\n\nPublikują regularnie, nie codziennie, ale konsekwentnie. Pokazują ludzi, atmosferę, postępy kursantek. Nie tylko profesjonalne nagrania. Właśnie dlatego przyszła klientka czuje, że 'to jest dla mnie'.\n\nSzybko odpowiadają na wiadomości. Mają gotową odpowiedź na 'ile kosztuje' i 'jak zacząć'. Nie zostawiają nikogo bez odpowiedzi przez dobę.\n\nKtóre z tych trzech rzeczy jest u Ciebie najsłabsze? Napisz w komentarzu, bez oceniania, to pytanie do przemyślenia."}, {"hook": "Jeden konkretny pomysł na post dla Studia Tańca", "opis": "Jeśli nie wiesz co dziś wrzucić na Instagram — nagraj 30 sekund odpowiedzi na to pytanie: 'Czego się bałaś zanim zaczęłaś tańczyć?'\n\nZapytaj o to swoją kursantkę. Albo odpowiedz sama.\n\nTo jest content, który zatrzymuje przewijanie. Bo każda kobieta, która ogląda Twój profil i myśli 'czy dam radę', zobaczy siebie w tej odpowiedzi.\n\nCo tydzień będę tu wrzucał jeden konkretny pomysł na post dla Studia Tańca lub Pole Dance. Obserwuj, żeby nie przegapić."}, {"hook": "Kiedy tłumaczę rodzinie czym zajmuje się mój biznes — i dlaczego to nie jest łatwe", "opis": "'Co robisz w pracy?'\n\nPomagam Studiom Tańca i Pole Dance pozyskiwać klientki przez Instagram.\n\nCisza.\n\n'To znaczy, że tańczysz?'\n\nNie, mamo. Prowadzę reklamy i uczę właścicielki jak komunikować się z klientkami w internecie.\n\nKolejna cisza.\n\n'I z tego się żyje?'\n\n[zez do kamery]\n\nJeśli też prowadzisz studio i zastanawiasz się czy marketing przez Instagram ma sens — wiesz już kogo zapytać, a kogo nie."}, {"hook": "Tracisz pół niedzieli na IG studia?", "opis": "Spędzasz pół niedzieli próbując ogarnąć Instagram swojego studia i i tak kończysz wrzucając cokolwiek? Mam dla Ciebie coś za darmo.\n\nZnam to od moich klientek na pamięć. Cały tydzień mówisz sobie 'w weekend ogarnę Instagram'. Przychodzi niedziela, siadasz, nie wiesz od czego zacząć, szukasz muzyki przez pół godziny, męczysz się z hasztagami i w końcu wrzucasz byle co — albo nic.\n\nA potem zastanawiasz się czemu z tego Instagrama nie ma żadnych zapisów.\n\nProblem nie leży w tym, że nie masz czasu. Leży w tym, że za każdym razem zaczynasz od zera, bez planu.\n\nDlatego przygotowałem gotowy plan contentu na cały miesiąc — zbudowany wyłącznie z nagrań, które już masz na telefonie. Zero Canvy, zero szukania muzyki, zero zaczynania od pustej kartki. Jedna niedziela z tym planem i masz spokój na cztery tygodnie.\n\nJak chcesz go dostać za darmo — napisz w komentarzu słowo CONTENT. Wyślę Ci go od razu w wiadomości."}, {"hook": "3 błędy przez które Twój IG nie sprzedaje", "opis": "Jeśli prowadzisz studio tańca albo pole dance i Twój Instagram nie przynosi zapisów — robisz prawdopodobnie jeden z tych trzech błędów.\n\nPierwszy: publikujesz tylko dla tych które już u Ciebie tańczą. Piękne rolki z zaawansowanymi figurami zachwycają Twoje kursantki, ale przerażają nową osobę, która nigdy nie tańczyła. A to właśnie ona miała się zapisać.\n\nDrugi: Twoje BIO mówi o Tobie, a nie do niej. 'Tańczymy od 2015 roku' nikogo nie obchodzi. 'Zacznij nawet jeśli nigdy wcześniej nie tańczyłaś' — to już co innego.\n\nTrzeci: odpowiadasz na wiadomości za późno. Osoba, która pisze w poniedziałek i dostaje odpowiedź w czwartek, w piątek tańczy już gdzie indziej.\n\nSłuchaj — pomagam studiom tańca i pole dance w całej Polsce naprawiać dokładnie te rzeczy. Wrzucam tu konkretne, gotowe do użycia wskazówki. Bez marketingowego pierdolenia, z perspektywy kogoś, kto sam uczy tańca od dwunastu lat.\n\nWejdź na profil, zobacz sam i zostań na dłużej, jeśli Ci się spodoba."}];

function computeKoniecDate(r){
  if(!r.startKampanii || !r.okresDni) return r.koniecKampanii||"";
  var d = new Date(r.startKampanii+"T00:00:00");
  d.setDate(d.getDate()+(+r.okresDni||0));
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function campaignAutoColor(r){
  var koniec = computeKoniecDate(r);
  if(!koniec) return {startKampanii:null, koniecKampanii:null};
  var end = new Date(koniec+"T00:00:00");
  var today = new Date(todayStr()+"T00:00:00");
  var diffDays = Math.round((end-today)/86400000);
  if(isNaN(diffDays)) return {startKampanii:null, koniecKampanii:null};
  if(diffDays < 0) return {startKampanii:"var(--muted)", koniecKampanii:"var(--muted)"};
  if(diffDays <= 3) return {startKampanii:null, koniecKampanii:"var(--danger)"};

}

function pushZadUndo(a){ zadUndoStack.push(a); if(zadUndoStack.length>50) zadUndoStack.shift(); }
function undoZad(){
  var a = zadUndoStack.pop();
  if(!a) return;
  if(a.type==="toggle"){
    var t = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t){ t.done = a.prevDone; t.completedAt = a.prevCompletedAt; }
  } else if(a.type==="add"){
    state.tasks = state.tasks.filter(function(t){return t.id!==a.id;});
  } else if(a.type==="edit"){
    var t2 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t2){ t2.title=a.prev.title; t2.category=a.prev.category; t2.scope=a.prev.scope; t2.createdAt=a.prev.createdAt; t2.completedAt=a.prev.completedAt; t2.recurWeekday=a.prev.recurWeekday; }
  } else if(a.type==="softdelete" || a.type==="restore"){
    var t3 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t3) t3.deletedAt = a.prevDeletedAt;
  } else if(a.type==="recurtoggle"){
    var t4 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t4){
      if(!t4.recurCompletions) t4.recurCompletions = {};
      if(a.prev) t4.recurCompletions[a.dateKey] = true; else delete t4.recurCompletions[a.dateKey];
    }
  }
  save(); renderAll();
}
function toggleRecurTaskToday(id){
  var t = state.tasks.filter(function(x){return x.id===id;})[0];
  if(!t) return;
  if(!t.recurCompletions) t.recurCompletions = {};
  var key = todayStr();
  var prev = !!t.recurCompletions[key];
  pushZadUndo({type:"recurtoggle", id:id, dateKey:key, prev:prev});
  if(prev) delete t.recurCompletions[key]; else t.recurCompletions[key] = true;
  save(); renderAll();
}

function load(){
  var raw = localStorage.getItem(STORAGE_KEY);
  var def = defaultState();
  if(!raw){ state = def; save(); return; }
  try{
    var parsed = JSON.parse(raw);
    Object.keys(def).forEach(function(k){ if(!(k in parsed)) parsed[k] = def[k]; });
    state = migrateState(parsed);
  }catch(e){ state = def; }
}

function formatFollowerCount(n){
  var sign = n<0 ? "-" : "";
  var abs = Math.abs(n);
  if(abs>=1000000) return sign+(abs/1000000).toFixed(1)+"M";
  if(abs>=1000) return sign+(abs/1000).toFixed(1)+"K";
  return sign+String(abs);
}
function computeSocialTrend(history){
  if(!history || !history.length) return null;
  var sorted = history.slice().sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:0); });
  var latest = sorted[sorted.length-1];
  if(sorted.length===1) return {current:latest.count, delta:null};
  var latestDate = new Date(latest.date+"T00:00:00");
  var weekAgoTarget = new Date(latestDate); weekAgoTarget.setDate(weekAgoTarget.getDate()-7);
  var prev = null;
  for(var i=sorted.length-2; i>=0; i--){
    var d = new Date(sorted[i].date+"T00:00:00");
    if(d <= weekAgoTarget){ prev = sorted[i]; break; }
  }
  if(!prev) prev = sorted[0];
  if(prev===latest) return {current:latest.count, delta:null};
  return {current:latest.count, delta:latest.count-prev.count};
}

  if(input===null) return;
  var n = parseInt(String(input).replace(/[^0-9]/g,""), 10);
  if(isNaN(n)) return;
  if(!state.socialStats[dashSocialAccount]) state.socialStats[dashSocialAccount] = {};
  if(!state.socialStats[dashSocialAccount][platform]) state.socialStats[dashSocialAccount][platform] = {history:[]};
  var h = state.socialStats[dashSocialAccount][platform].history;

  var todayEntry = null;
  for(var i=0;i<h.length;i++){ if(h[i].date===today){ todayEntry=h[i]; break; } }

function isoLocal(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function currentWeekDates(){
  var d = new Date();
  var day = d.getDay(); // 0=niedziela
  var mondayOffset = day===0 ? -6 : 1-day;
  var monday = new Date(d); monday.setDate(d.getDate()+mondayOffset);
  var out = [];
  for(var i=0;i<7;i++){
    var dd = new Date(monday); dd.setDate(monday.getDate()+i);
    out.push(isoLocal(dd));
  }
  return out;
}

    var dur = (0.6+Math.random()*0.5).toFixed(2);
    var delay = (Math.random()*1.2).toFixed(2);
    html += '<div class="wx-drop" style="left:'+left+'%; animation-duration:'+dur+'s; animation-delay:-'+delay+'s"></div>';
  }
  return html;
}
function buildSnowFlakes(){
  var html = "";
  for(var i=0;i<22;i++){
    var left = Math.round(Math.random()*100);
    var size = (2+Math.random()*3).toFixed(1);
    var dur = (4+Math.random()*4).toFixed(2);
    var delay = (Math.random()*5).toFixed(2);
    var drift = Math.round((Math.random()*40)-20);
    html += '<div class="wx-flake" style="left:'+left+'%; width:'+size+'px; height:'+size+'px; animation-duration:'+dur+'s; animation-delay:-'+delay+'s; --drift:'+drift+'px"></div>';
  }
  return html;
}
function buildWeatherAnim(code){
  var hour = new Date().getHours();
  var isNight = hour < 6 || hour >= 21;
  var cat = weatherCategory(code, isNight);
  var html = '<div class="wx-bg-'+cat+'" style="position:absolute; inset:0">';
  if(cat==="clear-day"){
    html += '<div class="wx-sun"></div>';
  } else if(cat==="clear-night"){
    html += '<div class="wx-moon"></div>';
  } else if(cat==="cloudy" || cat==="cloudy-night" || cat==="fog"){
    if(cat==="cloudy-night") html += '<div class="wx-moon" style="opacity:.5"></div>';
    html += '<div class="wx-cloud c1"></div><div class="wx-cloud c2"></div><div class="wx-cloud c3"></div>';
  } else if(cat==="rain"){
    html += '<div class="wx-cloud c1"></div><div class="wx-cloud c3"></div>'+
      '<div class="wx-rain">'+buildRainDrops()+'</div>';
  } else if(cat==="snow"){
    html += '<div class="wx-cloud c1"></div><div class="wx-cloud c3"></div>'+
      '<div class="wx-snow">'+buildSnowFlakes()+'</div>';
  } else if(cat==="storm"){
    html += '<div class="wx-cloud c1"></div><div class="wx-cloud c3"></div>'+
      '<div class="wx-rain">'+buildRainDrops()+'</div><div class="wx-flash"></div>';
  }
  html += '</div>';
  return html;
}

    });

function renderWeatherError(msg, showRetry){
  var el = document.getElementById("weatherWidget");
  if(!el) return;
  el.innerHTML = '<div class="empty">'+escapeHtml(msg)+(showRetry ? ' <a href="#" onclick="loadWeather(true); return false;" style="color:var(--accent)">Spróbuj ponownie</a>' : '')+'</div>';
}
function loadWeather(forceRetry){
  var cacheRaw = localStorage.getItem(WEATHER_CACHE_KEY);
  var cache = null;
  try{ cache = cacheRaw ? JSON.parse(cacheRaw) : null; }catch(e){ cache = null; }
  if(cache && !forceRetry){ renderWeatherFromData(cache); }
  if(cache && !forceRetry && (Date.now()-cache.ts) < WEATHER_MAX_AGE_MS) return;
  if(!navigator.geolocation){ if(!cache) renderWeatherError("Twoja przeglądarka nie wspiera geolokalizacji.", false); return; }
  if(!cache) renderWeatherError("Pobieranie lokalizacji…", false);
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    var url = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+
      "&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7";
    fetch(url).then(function(r){ return r.json(); }).then(function(j){
      var place = null;
      fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude="+lat+"&longitude="+lon+"&localityLanguage=pl")
        .then(function(r){ return r.json(); }).then(function(g){
          if(g) place = g.city || g.locality || null;
        }).catch(function(){})
        .finally(function(){
          var data = {
            ts: Date.now(),
            place: place,
            current: {temp: j.current.temperature_2m, code: j.current.weather_code},
            daily: j.daily.time.map(function(date, i){
              return {date: date, tmax: j.daily.temperature_2m_max[i], tmin: j.daily.temperature_2m_min[i], code: j.daily.weather_code[i]};
            })
          };
          localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify(data));
          renderWeatherFromData(data);
        });
    }).catch(function(){
      if(!cache) renderWeatherError("Nie udało się pobrać pogody.", true);
    });
  }, function(err){
    if(!cache) renderWeatherError(err.code===1 ? "Brak zgody na lokalizację — włącz ją w ustawieniach przeglądarki." : "Nie udało się ustalić lokalizacji.", true);
  }, {timeout:10000, maximumAge:600000});
}

  WEEKDAYS_SHORT.forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });
  var first = new Date(zapYear, zapMonth, 1);
  var startOffset = (first.getDay()+6)%7;
  var gridStart = new Date(zapYear, zapMonth, 1-startOffset);
  var todayS = todayStr();
  for(var i=0;i<42;i++){
    var gd = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate()+i);
    var dstr = gd.getFullYear()+"-"+String(gd.getMonth()+1).padStart(2,"0")+"-"+String(gd.getDate()).padStart(2,"0");
    var inMonth = gd.getMonth()===zapMonth;
    var isToday = dstr===todayS;
    html += '<div class="cal-cell'+(inMonth?"":" out")+(isToday?" today":"")+'" ondblclick="openPostModal({brand:\''+jsAttrStr(postyFilter)+'\', date:\''+dstr+'\', stage:\'zaplanowany\'})"><div class="cal-daynum">'+gd.getDate()+'</div>';
    (byDate[dstr]||[]).forEach(function(p){
      var bg = p.platform==="tiktok" ? "#c9c9c9" : p.platform==="youtube" ? "#e0a19d" : "#c8b8f0";
      html += '<div class="cal-ev" style="background:'+bg+'; color:'+calTextColorFor(bg)+'" onclick="event.stopPropagation(); openPostPreview(\''+p.id+'\')">'+
        (p.platform?POST_PLATFORM_ICON[p.platform]+" ":"")+escapeHtml(p.title)+'</div>';
    });
    html += '</div>';
  }
  html += '</div></div></div>';
  return html;
}
function zapMonthKey(){
  var now = new Date();
  var y = zapYear===undefined ? now.getFullYear() : zapYear;
  var m = zapMonth===undefined ? now.getMonth() : zapMonth;
  return y+"-"+String(m+1).padStart(2,"0");
}
function renderDriveImportPanel(){

  }
  var ym = zapMonthKey();

  return '<div class="card" style="margin-bottom:16px">'+

      '<button class="btn secondary small" onclick="importDriveMonthFolder()" id="driveImportBtn">Zaciągnij z Dysku</button>'+

    '<div id="driveImportStatus" style="font-size:12.5px; color:var(--muted-light); margin-top:8px"></div>'+

function extractDriveFolderId(url){
  var m = (url||"").match(/\/folders\/([a-zA-Z0-9_-]+)/);
  if(m) return m[1];
  m = (url||"").match(/[?&]id=([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}
function extractDateFromFolderName(name, year){
  var m = name.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1]+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[3]).padStart(2,"0");
  m = name.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m) return m[3]+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[1]).padStart(2,"0");
  m = name.match(/(\d{1,2})\.(\d{1,2})(?!\d)/);
  if(m) return year+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[1]).padStart(2,"0");
  return null;
}
function driveApiListChildren(folderId){
  var q = "'"+folderId+"' in parents and trashed=false";
  var url = "https://www.googleapis.com/drive/v3/files?q="+encodeURIComponent(q)+"&fields="+encodeURIComponent("files(id,name,mimeType)")+"&pageSize=1000";
  return fetch(url, {headers:{Authorization:"Bearer "+window.__gcalToken}}).then(function(r){
    if(r.status===401){ window.__gcalToken=null; throw new Error("401"); }
    return r.json();
  }).then(function(j){ return j.files||[]; });
}
function driveFetchTextContent(file){
  var url = file.mimeType==="application/vnd.google-apps.document"
    ? "https://www.googleapis.com/drive/v3/files/"+file.id+"/export?mimeType=text/plain"
    : "https://www.googleapis.com/drive/v3/files/"+file.id+"?alt=media";
  return fetch(url, {headers:{Authorization:"Bearer "+window.__gcalToken}}).then(function(r){ return r.text(); });
}
function importDriveMonthFolder(){
  var input = document.getElementById("driveMonthFolderUrl");
  var statusEl = document.getElementById("driveImportStatus");
  var btn = document.getElementById("driveImportBtn");
  var url = input.value.trim();
  var folderId = extractDriveFolderId(url);
  if(!folderId){ statusEl.textContent = "To nie wygląda na link do folderu Google Drive."; return; }
  var ym = zapMonthKey();
  var year = ym.split("-")[0];
  if(!state.driveMonthFolders[postyFilter]) state.driveMonthFolders[postyFilter] = {};
  state.driveMonthFolders[postyFilter][ym] = url;
  save();
  btn.disabled = true;
  statusEl.textContent = "Wczytywanie listy podfolderów...";
  driveApiListChildren(folderId).then(function(children){
    var subfolders = children.filter(function(f){ return f.mimeType==="application/vnd.google-apps.folder"; });
    if(!subfolders.length){ statusEl.textContent = "Brak podfolderów w tym folderze."; btn.disabled=false; return; }
    statusEl.textContent = "Znaleziono "+subfolders.length+" podfolderów, wczytuję zawartość...";
    var matched = [], unmatched = [];
    subfolders.forEach(function(f){
      var date = extractDateFromFolderName(f.name, year);
      if(date) matched.push({folder:f, date:date}); else unmatched.push(f.name);
    });
    Promise.all(matched.map(function(m){
      return driveApiListChildren(m.folder.id).then(function(files){
        var images = files.filter(function(f){ return f.mimeType.indexOf("image/")===0; })
          .sort(function(a,b){ return a.name<b.name?-1:(a.name>b.name?1:0); })
          .map(function(f){ return "https://drive.google.com/uc?export=view&id="+f.id; });
        var videoFile = files.filter(function(f){ return f.mimeType.indexOf("video/")===0; })[0];
        var textFiles = files.filter(function(f){ return f.mimeType==="text/plain" || f.mimeType==="application/vnd.google-apps.document" || /\.txt$/i.test(f.name); });
        var fbFile = textFiles.filter(function(f){ return /fb|facebook/i.test(f.name); })[0];
        var igFile = textFiles.filter(function(f){ return /ig|insta/i.test(f.name); })[0];
        var soloFile = (!fbFile && !igFile) ? textFiles[0] : null;
        var textPromises = [];
        if(fbFile) textPromises.push(driveFetchTextContent(fbFile).then(function(t){ m.captionFb = t; }));
        if(igFile) textPromises.push(driveFetchTextContent(igFile).then(function(t){ m.captionIg = t; }));
        if(soloFile) textPromises.push(driveFetchTextContent(soloFile).then(function(t){ m.captionFb = t; m.captionIg = t; }));
        return Promise.all(textPromises).then(function(){
          m.images = images;
          m.video = videoFile ? "https://drive.google.com/uc?export=view&id="+videoFile.id : null;
          m.folderName = m.folder.name;
        });
      });
    })).then(function(){
      var created = 0, updated = 0;
      matched.forEach(function(m){
        var post = state.posts.filter(function(p){ return !p.deletedAt && p.brand===postyFilter && p.date===m.date; })[0];
        if(!post){
          post = {id:uid("post"), title:m.folderName, brand:postyFilter, stage:"zaplanowany", category:null, date:m.date, platform:"fbig", isCarousel:m.images.length>1, fbImage:"", captionFb:"", captionIg:""};
          state.posts.unshift(post);
          created++;
        } else {
          updated++;
        }
        post.images = m.images;
        if(m.video) post.video = m.video;
        if(post.platform==="fbig") post.isCarousel = m.images.length>1;
        if(m.captionFb!=null && !post.captionFb) post.captionFb = m.captionFb;
        if(m.captionIg!=null && !post.captionIg) post.captionIg = m.captionIg;
      });
      save(); renderAll();
      var msg = "Gotowe — dopasowano "+matched.length+" ("+created+" nowych, "+updated+" zaktualizowanych).";
      if(unmatched.length) msg += " Bez daty w nazwie (pominięte): "+unmatched.join(", ")+".";
      var el2 = document.getElementById("driveImportStatus");
      if(el2) el2.textContent = msg;
      var btn2 = document.getElementById("driveImportBtn");
      if(btn2) btn2.disabled = false;
    });
  }).catch(function(e){
    statusEl.textContent = e.message==="401" ? "Sesja Google wygasła — kliknij ponownie \"Połącz z Google\" i spróbuj jeszcze raz." : "Coś poszło nie tak przy wczytywaniu z Dysku.";
    btn.disabled = false;
  });
}

function normalizeImageUrl(url){
  url = (url||"").trim();
  if(!url) return url;
  var m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(!m) m = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
  if(!m) m = url.match(/drive\.google\.com\/uc\?(?:export=[a-zA-Z]+&)?id=([a-zA-Z0-9_-]+)/);
  if(m) return "https://drive.google.com/uc?export=view&id="+m[1];
  return url;
}

function videoFormatBytes(bytes){

  var units = ["B","KB","MB","GB"];
  var i = Math.min(units.length-1, Math.floor(Math.log(bytes)/Math.log(1024)));
  return (bytes/Math.pow(1024,i)).toFixed(i===0?0:1)+" "+units[i];
}

function videoPatchedFfmpegWorkerUrl(ffmpegBaseURL){
  // ffmpeg.wasm's worker.js imports "./const.js" and "./errors.js" as relative specifiers.
  // Constructing the worker itself needs a same-origin (blob) URL, but a blob URL has no
  // path to resolve relative imports against — so those two imports must be rewritten to
  // absolute CDN URLs (jsDelivr sends open CORS headers, so cross-origin *module imports*
  // — as opposed to cross-origin *Worker construction*, which browsers block — work fine).
  return fetch(ffmpegBaseURL+"/worker.js").then(function(r){ return r.text(); }).then(function(text){
    text = text.replace('"./const.js"', '"'+ffmpegBaseURL+'/const.js"')
                .replace('"./errors.js"', '"'+ffmpegBaseURL+'/errors.js"');
    return URL.createObjectURL(new Blob([text], {type:"text/javascript"}));
  });
}
function ensureFfmpeg(){
  if(__ffmpegInstance) return Promise.resolve(__ffmpegInstance);
  return import("https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/esm/index.js").then(function(ffmpegMod){
    return import("https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.2/dist/esm/index.js").then(function(utilMod){
      var ffmpeg = new ffmpegMod.FFmpeg();
      ffmpeg.on("log", function(e){ __ffmpegLogBuffer.push(e.message); });
      var ffmpegBaseURL = "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/esm";
      var coreBaseURL = "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/esm";
      return Promise.all([
        videoPatchedFfmpegWorkerUrl(ffmpegBaseURL),
        utilMod.toBlobURL(coreBaseURL+"/ffmpeg-core.js", "text/javascript"),
        utilMod.toBlobURL(coreBaseURL+"/ffmpeg-core.wasm", "application/wasm")
      ]).then(function(urls){
        return ffmpeg.load({classWorkerURL:urls[0], coreURL:urls[1], wasmURL:urls[2]}).then(function(){
          __ffmpegInstance = ffmpeg;
          return ffmpeg;
        });
      });
    });
  });
}
function videoParseSilenceLog(text){
  var starts = [], ends = [], m;
  var startRe = /silence_start:\s*([0-9.]+)/g;
  var endRe = /silence_end:\s*([0-9.]+)/g;
  while((m = startRe.exec(text))) starts.push(parseFloat(m[1]));
  while((m = endRe.exec(text))) ends.push(parseFloat(m[1]));
  var silences = [];
  for(var i=0;i<starts.length;i++){
    silences.push([starts[i], ends[i]!=null ? ends[i] : starts[i]+999999]);
  }
  return silences;
}
function videoComputeKeepSegments(silences, duration, paddingSec){
  var cuts = silences.map(function(s){
    return [Math.min(duration, s[0])+paddingSec, Math.min(duration, s[1])-paddingSec];
  }).filter(function(c){ return c[1] > c[0]; }).sort(function(a,b){ return a[0]-b[0]; });
  var keep = [], cursor = 0;
  cuts.forEach(function(c){
    if(c[0] > cursor) keep.push([cursor, c[0]]);
    cursor = Math.max(cursor, c[1]);
  });
  if(cursor < duration) keep.push([cursor, duration]);
  return keep.filter(function(k){ return (k[1]-k[0]) > 0.05; });
}
function videoCutSilence(thresholdDb, minSilenceMs, paddingMs){
  thresholdDb = thresholdDb || -30;
  var minSilenceSec = (minSilenceMs || 500)/1000;
  var paddingSec = (paddingMs!=null ? paddingMs : 150)/1000;
  var current = videoEditor.history[videoEditor.activeIndex];
  var inName = "in"+videoEditor.inputExt;
  videoSetStatus("Wczytuję silnik wideo (pierwsze użycie może potrwać kilkadziesiąt sekund)…", true);
  return ensureFfmpeg().then(function(ffmpeg){
    videoSetStatus("Analizuję ścieżkę dźwiękową…", true);
    return current.blob.arrayBuffer().then(function(buf){
      return ffmpeg.writeFile(inName, new Uint8Array(buf));
    }).then(function(){
      __ffmpegLogBuffer.length = 0;
      return ffmpeg.exec(["-i", inName, "-af", "silencedetect=noise="+thresholdDb+"dB:d="+minSilenceSec, "-f", "null", "-"]);
    }).then(function(){
      var silences = videoParseSilenceLog(__ffmpegLogBuffer.join("\n"));
      var duration = videoEditor.previewDuration || 0;
      var keepSegments = videoComputeKeepSegments(silences, duration, paddingSec);
      if(!keepSegments.length){
        throw new Error("Nie wykryto ciszy do wycięcia w tym nagraniu (przy tym progu czułości).");
      }
      videoSetStatus("Wycinam ciszę ("+keepSegments.length+" zachowanych fragmentów)…", true);
      var concatList = [];
      var chain = Promise.resolve();
      keepSegments.forEach(function(seg, i){
        var segName = "seg"+i+".mp4";
        chain = chain.then(function(){
          return ffmpeg.exec(["-i", inName, "-ss", String(seg[0]), "-to", String(seg[1]),
            "-c:v","libx264","-preset","ultrafast","-crf","23","-pix_fmt","yuv420p","-c:a","aac", segName]);
        });
        concatList.push("file '"+segName+"'");
      });
      return chain.then(function(){
        return ffmpeg.writeFile("concat.txt", new TextEncoder().encode(concatList.join("\n")));
      }).then(function(){
        return ffmpeg.exec(["-f","concat","-safe","0","-i","concat.txt","-c","copy","out.mp4"]);
      }).then(function(){
        return ffmpeg.readFile("out.mp4");
      }).then(function(data){
        var blob = new Blob([data.buffer], {type:"video/mp4"});
        var url = URL.createObjectURL(blob);
        videoPushHistoryStep({label:"Wycięto ciszę", blobUrl:url, blob:blob, note:keepSegments.length+" fragmentów, próg "+thresholdDb+" dB"});
        videoSetStatus("Gotowe — cisza wycięta.", false);
      });
    });
  }).catch(function(err){
    videoSetStatus("Błąd: "+((err && err.message) || err), false, true);
    throw err;
  });
}
function videoExecuteAction(action){
  if(action.type==="cut_silence"){
    return videoCutSilence(action.threshold_db, action.min_silence_ms, action.padding_ms);
  }
  return Promise.resolve();
}
function videoRunActionsSequentially(actions){
  var p = Promise.resolve();
  actions.forEach(function(action){ p = p.then(function(){ return videoExecuteAction(action); }); });
  return p;
}
function callAnthropicJSON(systemPrompt, userPrompt, schema, maxTokens){
  var key = localStorage.getItem("mdgtal_anthropic_key");
  if(!key) return Promise.reject(new Error("Brak klucza API Anthropic."));
  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "x-api-key": key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
      "content-type":"application/json"
    },
    body: JSON.stringify({
      model:"claude-opus-4-8",
      max_tokens: maxTokens || 1024,
      system: systemPrompt,
      output_config:{format:{type:"json_schema", schema:schema}},
      messages:[{role:"user", content:userPrompt}]
    })
  }).then(function(r){
    if(!r.ok){
      return r.json().catch(function(){return null;}).then(function(errBody){
        var msg = (errBody && errBody.error && errBody.error.message) || ("HTTP "+r.status);
        throw new Error("Anthropic API: "+msg);
      });
    }
    return r.json();
  }).then(function(data){
    var text = (data.content||[]).map(function(b){ return b.text||""; }).join("").trim();
    return JSON.parse(text);
  });
}
function interpretVideoPrompt(promptText){

function videoApplyPrompt(){

function videoExportSave(){
  var current = videoEditor.history[videoEditor.activeIndex];
  if(!current || !current.blob) return;
  var blob = current.blob;
  var baseName = (videoEditor.fileName||"wideo").replace(/\.[^.]+$/,"");
  var suggestedName = baseName+"_edytowane"+(videoEditor.activeIndex===0?videoEditor.inputExt:".mp4");
  if(window.showSaveFilePicker){
    window.showSaveFilePicker({suggestedName:suggestedName, types:[{description:"Wideo", accept:{"video/mp4":[".mp4"]}}]})
      .then(function(handle){
        return handle.createWritable().then(function(writable){
          return writable.write(blob).then(function(){ return writable.close(); });
        });
      })
      .then(function(){ videoSetStatus("Zapisano na dysku.", false); })
      .catch(function(err){
        if(err && err.name==="AbortError") return;
        videoSetStatus("Nie udało się zapisać: "+((err && err.message) || err), false, true);
      });
  } else {
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = suggestedName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

function accBrand(acc){

}
var MILESTONE_THRESHOLDS = [10,100,500,1000,2000,5000,10000,15000,20000];
function milestoneInfo(followers){
  var start = 0, goal = null;
  for(var i=0;i<MILESTONE_THRESHOLDS.length;i++){
    if(followers < MILESTONE_THRESHOLDS[i]){ goal = MILESTONE_THRESHOLDS[i]; start = i===0?0:MILESTONE_THRESHOLDS[i-1]; break; }
  }
  if(goal==null){
    start = MILESTONE_THRESHOLDS[MILESTONE_THRESHOLDS.length-1];
    goal = start + 5000*(Math.floor((followers-start)/5000)+1);
  }
  var pct = Math.max(0, Math.min(100, Math.round((followers-start)/(goal-start)*100)));
  return {start:start, goal:goal, pct:pct};
}
var SHORT_MONTHS = ["sty","lut","mar","kwi","maj","cze","lip","sie","wrz","paź","lis","gru"];
function pad2(n){ return String(n).padStart(2,"0"); }
function dISO(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function mondayOf(d){
  var nd = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var day = nd.getDay();
  var diff = day===0 ? -6 : 1-day;
  nd.setDate(nd.getDate()+diff);
  return nd;
}
function valueAsOf(stats, iso){
  var v = null;
  for(var i=0;i<stats.length;i++){ if(stats[i].date<=iso) v = stats[i].followers; else break; }
  return v;
}
function buildChartSeries(stats, range){
  var today = new Date(); today.setHours(0,0,0,0);
  var out = [];
  if(range==="tydzien"){
    var mon = mondayOf(today);
    for(var i=0;i<7;i++){
      var d = new Date(mon); d.setDate(mon.getDate()+i);
      if(d>today) break;
      var iso = dISO(d);
      var v = valueAsOf(stats, iso);
      if(v==null) continue;
      out.push({label:pad2(d.getDate())+"."+pad2(d.getMonth()+1), value:v});
    }
  } else if(range==="miesiac"){
    var m = today.getMonth(), y = today.getFullYear();
    var mon2 = mondayOf(new Date(y,m,1));
    if(mon2.getMonth()!==m) mon2.setDate(mon2.getDate()+7);
    while(mon2.getMonth()===m && mon2.getFullYear()===y && mon2<=today){
      var sunday = new Date(mon2); sunday.setDate(mon2.getDate()+6);
      var checkDate = sunday>today ? today : sunday;
      var v2 = valueAsOf(stats, dISO(checkDate));
      if(v2!=null) out.push({label:pad2(mon2.getDate())+"."+pad2(mon2.getMonth()+1), value:v2});
      mon2 = new Date(mon2); mon2.setDate(mon2.getDate()+7);
    }
  } else if(range==="kwartal"){
    var q = Math.floor(today.getMonth()/3);
    [q*3, q*3+1, q*3+2].forEach(function(mm){
      var monthStart = new Date(today.getFullYear(), mm, 1);
      if(monthStart>today) return;
      var monthEnd = new Date(today.getFullYear(), mm+1, 0);
      var checkDate = monthEnd>today?today:monthEnd;
      var v3 = valueAsOf(stats, dISO(checkDate));
      if(v3!=null) out.push({label:SHORT_MONTHS[mm], value:v3});
    });
  } else {
    for(var mm2=0; mm2<=today.getMonth(); mm2++){
      var monthEnd2 = new Date(today.getFullYear(), mm2+1, 0);
      var checkDate2 = monthEnd2>today?today:monthEnd2;
      var v4 = valueAsOf(stats, dISO(checkDate2));
      if(v4!=null) out.push({label:SHORT_MONTHS[mm2], value:v4});
    }
  }
  return out.length ? out : (stats.length ? [{label:"", value:stats[stats.length-1].followers}] : [{label:"", value:0}]);
}
function needsWeeklyUpdate(acc){
  var lastDate = acc.stats.length ? acc.stats[acc.stats.length-1].date : null;

  var days = Math.floor((new Date(todayStr()) - new Date(lastDate)) / 86400000);
  return new Date().getDay()===1 || days>=7;
}

function lineChart(stats){
  var w=1200, h=260, padL=54, padR=14, padT=16, padB=30;
  var vals = stats.map(function(s){return s.value;});
  var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  if(min===max){ min -= 1; max += 1; }
  var innerW = w-padL-padR, innerH = h-padT-padB;
  var stepX = innerW/((stats.length-1)||1);
  var pts = stats.map(function(s,i){
    var x = padL + i*stepX;
    var y = padT + innerH - ((s.value-min)/(max-min))*innerH;
    return [x,y];
  });
  var line = pts.map(function(p,i){ return (i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
  var area = line + " L"+pts[pts.length-1][0].toFixed(1)+","+(padT+innerH)+" L"+pts[0][0].toFixed(1)+","+(padT+innerH)+" Z";
  var gid = "grad"+Math.random().toString(36).slice(2,7);
  var lastPt = pts[pts.length-1];

  var xLabels = stats.map(function(s,i){
    return '<text x="'+pts[i][0].toFixed(1)+'" y="'+(h-8)+'" text-anchor="middle" font-size="12" fill="#8a8390">'+escapeHtml(s.label)+'</text>';
  }).join("");
  var yLabels =
    '<text x="'+(padL-10)+'" y="'+(padT+5)+'" text-anchor="end" font-size="12" fill="#8a8390">'+max+'</text>'+
    '<text x="'+(padL-10)+'" y="'+(padT+innerH+4)+'" text-anchor="end" font-size="12" fill="#8a8390">'+min+'</text>';

  var dots = stats.map(function(s,i){
    var placeBelow = (pts[i][1]-padT) < 40;
    var tipY = placeBelow ? pts[i][1]+44 : pts[i][1]-34;
    var tip = '<g id="stip'+i+'" class="chart-tip" style="display:none">'+
      '<rect x="'+(pts[i][0]-30).toFixed(1)+'" y="'+(tipY-18).toFixed(1)+'" width="60" height="26" rx="6" fill="#25232c" stroke="#2a2830"/>'+
      '<text x="'+pts[i][0].toFixed(1)+'" y="'+(tipY-1).toFixed(1)+'" text-anchor="middle" font-size="16" font-weight="800" fill="#cf9b4a">'+s.value+'</text>'+
      '</g>';
    return tip + '<circle cx="'+pts[i][0].toFixed(1)+'" cy="'+pts[i][1].toFixed(1)+'" r="12" fill="transparent" stroke="none" onmouseenter="showChartTip('+i+')" onmouseleave="hideChartTip()" onclick="showChartTip('+i+')" style="cursor:pointer"/>';
  }).join("");

  return '<div class="card" style="padding:16px 12px 6px"><svg viewBox="0 0 '+w+' '+h+'" style="width:100%; height:210px; display:block">'+
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#cf9b4a" stop-opacity="0.35"/><stop offset="100%" stop-color="#cf9b4a" stop-opacity="0"/>'+
    '</linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#'+gid+')" stroke="none"/>'+
    '<path d="'+line+'" fill="none" stroke="#cf9b4a" stroke-width="2.5"/>'+
    '<circle cx="'+lastPt[0].toFixed(1)+'" cy="'+lastPt[1].toFixed(1)+'" r="4" fill="#cf9b4a"/>'+
    yLabels + xLabels + dots +
    '</svg></div>';
}
function showChartTip(i){
  document.querySelectorAll(".chart-tip").forEach(function(e){ e.style.display="none"; });
  var el = document.getElementById("stip"+i);

}

function applyFbRefresh(platform){
  var list = platform==="instagram" ? state.igAccounts : state.fbAccounts;
  var activeId = platform==="instagram" ? igActiveId : fbActiveId;
  var acc = list.filter(function(a){return a.id===activeId;})[0];
  if(!acc) return;
  if(applyFbRefreshAcc(platform, acc, {silent:false})){ save(); renderAll(); }
}
function applyFbRefreshAcc(platform, acc, opts){
  opts = opts || {};
  var pages = window.__fbPagesData || [];
  var pageMatch = pages.filter(function(p){
    if(platform==="instagram"){
      if(!p.instagram_business_account) return false;
      if(acc.igBusinessId) return p.instagram_business_account.id===acc.igBusinessId;
      var handle = (acc.handle||"").replace("@","").toLowerCase();
      return (p.instagram_business_account.username||"").toLowerCase()===handle;
    }
    if(acc.fbPageId) return p.id===acc.fbPageId;
    return (p.name||"").toLowerCase()===(acc.name||"").toLowerCase();
  })[0];
  if(!pageMatch){
    if(!opts.silent) alert('Nie znaleziono konta "'+(platform==="instagram"?acc.handle:acc.name)+'" wśród stron/kont podłączonych do Twojego Facebooka. Sprawdź, czy masz do niego dostęp jako administrator.');
    return false;
  }
  var ig = pageMatch.instagram_business_account;
  var real = platform==="instagram" ? (ig && ig.followers_count) : pageMatch.fan_count;
  if(typeof real !== "number"){
    if(!opts.silent) alert("Facebook nie zwrócił liczby obserwujących dla tego konta.");
    return false;
  }
  var today = todayStr();
  var last = acc.stats[acc.stats.length-1];
  if(last && last.date===today){ last.followers = real; } else { acc.stats.push({date:today, followers:real}); }
  if(platform==="instagram" && ig){
    if(typeof ig.follows_count==="number") acc.followingCount = ig.follows_count;
    if(typeof ig.media_count==="number") acc.postsCount = ig.media_count;
    if(ig.biography) acc.bio = ig.biography;
    if(ig.profile_picture_url) acc.profilePic = ig.profile_picture_url;
  } else if(platform==="facebook"){
    if(pageMatch.about) acc.bio = pageMatch.about;
    if(pageMatch.picture && pageMatch.picture.data && pageMatch.picture.data.url) acc.profilePic = pageMatch.picture.data.url;
  }
  return true;
}
function saveMeasurement(platform){

}

function renderZadania(el){
  setTopActions('<button class="btn secondary" onclick="undoZad()">↺ Cofnij</button> <button class="btn" onclick="addTask()">+ Nowe zadanie</button>');
  var html = '<div class="tabsw">'+
    '<button class="'+(zadaniaSubview==="zadania"?"active":"")+'" onclick="setZadSub(\'zadania\')">Zadania</button>'+
    '<button class="'+(zadaniaSubview==="baza"?"active":"")+'" onclick="setZadSub(\'baza\')">Baza</button>'+
    '<button class="'+(zadaniaSubview==="wykonane"?"active":"")+'" onclick="setZadSub(\'wykonane\')">Wykonane</button>'+
    '<button class="'+(zadaniaSubview==="usuniete"?"active":"")+'" onclick="setZadSub(\'usuniete\')">Usunięte</button>'+
    '</div>';

  html += renderZadSearchSortBar();

  if(zadaniaSubview==="baza"){
    html += renderZadaniaBaza();
    el.innerHTML = html;
    return;
  }
  if(zadaniaSubview==="wykonane"){
    html += renderZadaniaWykonane();
    el.innerHTML = html;
    return;
  }
  if(zadaniaSubview==="usuniete"){
    html += renderZadaniaUsuniete();
    el.innerHTML = html;
    return;
  }

  var catFilter = zadCatFilter;

  html += '<div class="chiprow" style="justify-content:flex-end"><select onchange="setZadCatFilter(this.value)" style="width:auto">'+
    '<option value=""'+(catFilter===""?" selected":"")+'>Wszystkie kategorie</option>'+
    CATEGORIES.map(function(c){return '<option value="'+c+'"'+(catFilter===c?" selected":"")+'>'+CATEGORY_LABEL[c]+'</option>';}).join("")+
    '</select></div>';

  var weekDefault = currentWeekDates();
  if(!zadTydzienAnchor) zadTydzienAnchor = weekDefault[0];
  var weekDates = zadWeekDates(zadTydzienAnchor);
  var tydzienOd = weekDates[0], tydzienDo = weekDates[6];

  var now = new Date();
  if(!zadMiesiacVal) zadMiesiacVal = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  var miesiacVal = zadMiesiacVal;

  var todayWd = todayWeekdayIdx();
  html += '<div class="colcols">';
  [["dzien","Dziś"],["tydzien","Tydzień"],["miesiac","Miesiąc"]].forEach(function(pair){
    var scope=pair[0], label=pair[1];
    var items = state.tasks.filter(function(t){
      if(t.scope!==scope || t.deletedAt) return false;
      if(catFilter && t.category!==catFilter) return false;
      if(!matchesZadSearch(t)) return false;
      if(t.recurWeekday!=null){
        if(scope!=="dzien") return false;
        return t.recurWeekday===todayWd && !(t.recurCompletions && t.recurCompletions[todayStr()]);
      }
      if(t.done) return false;
      var d = t.completedAt || t.createdAt;
      if(scope==="tydzien"){ if(d < tydzienOd || d > tydzienDo) return false; }
      if(scope==="miesiac"){ if(!d || d.slice(0,7)!==miesiacVal) return false; }
      return true;
    });
    items = sortTasks(items, zadSortMode);
    var defaultDate = scope==="miesiac" ? miesiacVal+"-01" : (scope==="tydzien" ? tydzienOd : todayStr());
    html += '<div class="card"><div class="col-head"><span>'+label+'</span><b>'+items.length+'</b></div>';
    if(scope==="tydzien"){
      var isCurrentWeek = (tydzienOd === weekDefault[0]);
      var wkStartD = new Date(tydzienOd+"T00:00:00"), wkEndD = new Date(tydzienDo+"T00:00:00");
      var monthLabel = (wkStartD.getMonth()===wkEndD.getMonth())
        ? monthName(wkStartD.getMonth())+" "+wkStartD.getFullYear()
        : monthName(wkStartD.getMonth())+" / "+monthName(wkEndD.getMonth())+" "+wkEndD.getFullYear();
      html += '<div class="row" style="justify-content:space-between; align-items:center; margin-bottom:8px">'+
        '<button class="linklike" onclick="setZadTydzienWeek(-1)">‹ Poprzedni</button>'+
        '<div style="text-align:center">'+
        '<div style="font-weight:700; font-size:13.5px; color:#fff">'+monthLabel+'</div>'+
        (isCurrentWeek ? '' : '<button class="linklike" style="font-size:11px" onclick="zadTydzienToday()">Wróć do bieżącego tygodnia</button>')+
        '</div>'+
        '<button class="linklike" onclick="setZadTydzienWeek(1)">Następny ›</button>'+
        '</div>';
      html += '<div class="row" style="gap:5px; margin-bottom:12px">';
      var dayAbbr = ["Pon","Wt","Śr","Czw","Pt","Sob","Ndz"];
      weekDates.forEach(function(dstr, i){
        var isToday = dstr===todayStr();
        html += '<div style="flex:1; text-align:center; padding:7px 2px; border-radius:8px; font-size:12.5px'+
          (isToday ? "; background:rgba(207,155,74,.32); font-weight:700; color:var(--accent)" : "; color:var(--muted-light)")+'">'+
          '<div style="font-size:10.5px; text-transform:uppercase; letter-spacing:.03em">'+dayAbbr[i]+'</div>'+
          '<div style="font-size:14px; margin-top:2px">'+(+dstr.slice(8,10))+'</div></div>';
      });
      html += '</div>';
    }
    if(scope==="miesiac"){
      html += monthYearPickerHtml(miesiacVal, "setZadMiesiac");
    }
    if(!items.length){ html += '<div class="empty">Brak zadań.</div><button class="linklike" onclick="openTaskModal({scope:\''+scope+'\', category:\'MediaDGtal\', date:\''+defaultDate+'\'})">+ Dodaj do „'+label+'"</button>'; }
    else{
      var listOpen = scope==="miesiac" ? '<div style="max-height:450px; overflow-y:auto">' : '';
      html += listOpen;
      items.forEach(function(t){
        var togFn = t.recurWeekday!=null ? "toggleRecurTaskToday" : "toggleTask";
        var dayTag = "";
        if(scope==="tydzien"){
          var td = t.completedAt || t.createdAt;
          if(td){
            var wdIdx = (new Date(td+"T00:00:00").getDay()+6)%7;
            dayTag = ' <span style="font-size:10.5px; color:var(--accent); font-weight:700">'+["Pon","Wt","Śr","Czw","Pt","Sob","Ndz"][wdIdx]+' '+(+td.slice(8,10))+'</span>';
          }
        }
        html += '<div class="taskitem">'+
          '<input type="checkbox" onchange="'+togFn+'(\''+t.id+'\')">'+
          '<span class="dot"></span>'+
          '<div style="flex:1"><span class="ttitle">'+(t.recurWeekday!=null?"🔁 ":"")+escapeHtml(t.title)+'</span>'+dayTag+'<br><span class="tag tag-'+t.category+'">'+CATEGORY_LABEL[t.category]+'</span></div>'+
          '<div class="taskmeta"><button class="linklike" onclick="openTaskModal({id:\''+t.id+'\'})">Edytuj</button><button class="linklike danger" onclick="deleteTask(\''+t.id+'\')">Usuń</button></div>'+
          '</div>';
      });
      if(scope==="miesiac") html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  el.innerHTML = html;
}
