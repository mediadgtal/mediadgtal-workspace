<style>
  :root{
    --sidebar-bg:#16151a; --bg:#1e1c22; --active-bg:#25232c;
    --accent:#cf9b4a; --accent-2:#d9914e; --accent-dim:#8a6a35;
    --pink:#c77398; --pink-bg:#33222a;
    --tool4arts-bg:#342c1f; --tool4arts-text:#cf9b4a;
    --rozwoj-bg:#322419; --rozwoj-text:#e0954a;
    --admin-text:#837a82; --admin-bg:#2a2830;
    --muted:#8a8390; --muted-light:#c5bec3;
    --danger:#d1636f; --success:#7fb88a;
    --border:#2a2830; --text:#f0eef2;
    --radius:12px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); display:flex; min-height:100vh; overflow-x:hidden;
    font-size:14px;
  }
  a{color:inherit}
  button{font-family:inherit; cursor:pointer}
  input,select,textarea{font-family:inherit; font-size:13.5px}

  /* ---- Sidebar ---- */
  #sidebar{
    width:230px; flex:0 0 230px; background:var(--sidebar-bg); color:var(--muted-light);
    display:flex; flex-direction:column; padding:20px 14px; gap:4px; border-right:1px solid var(--border);
  }
  #sidebar .brand{ padding:2px 4px 22px 4px; }
  #sidebar .brand img{ width:100%; height:auto; display:block; }
  .navitem{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:9px;
    color:var(--muted-light); text-decoration:none; font-size:13.5px; border:none; background:transparent; width:100%; text-align:left;
  }
  .navitem:hover{background:rgba(255,255,255,.04); color:#fff}

  .wx-cloud.c1{width:90px; height:28px; top:26px; left:-150px; animation:driftCloud 32s linear infinite}
  .wx-cloud.c1:before{width:42px; height:42px; top:-20px; left:10px}
  .wx-cloud.c1:after{width:32px; height:32px; top:-14px; left:44px}
  .wx-cloud.c2{width:66px; height:22px; top:78px; left:-120px; opacity:.7; animation:driftCloud 44s linear infinite; animation-delay:-12s}
  .wx-cloud.c2:before{width:32px; height:32px; top:-15px; left:8px}
  .wx-cloud.c2:after{width:24px; height:24px; top:-11px; left:32px}
  .wx-cloud.c3{width:104px; height:32px; top:128px; left:-160px; opacity:.55; animation:driftCloud 56s linear infinite; animation-delay:-26s}

function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function seedHistoricalLog(habitName, log){
  var hist = HABIT_HISTORY_2026[habitName];
  if(!hist) return;
  Object.keys(hist).forEach(function(ym){
    var parts = ym.split("-"), y = +parts[0], m = +parts[1];
    var dim = daysInMonth(y,m);
    var doneCount = Math.round(hist[ym]/100*dim);
    for(var d=1; d<=doneCount; d++){ log[ym+"-"+String(d).padStart(2,"0")] = true; }
  });
}
function habitMonthStats(h, ym){
  var parts = ym.split("-"), y = +parts[0], m = +parts[1];
  var dim = daysInMonth(y,m);
  var done = 0;
  for(var d=1; d<=dim; d++){
    if(h.log && h.log[ym+"-"+String(d).padStart(2,"0")]) done++;
  }
  return {done: done, days: dim, pct: dim ? Math.round(done/dim*100) : 0};
}
function habitYearStats(h, yr){
  var totalDone=0, totalDays=0;
  for(var m=1;m<=12;m++){
    var st = habitMonthStats(h, yr+"-"+String(m).padStart(2,"0"));
    totalDone += st.done; totalDays += st.days;
  }
  return {done: totalDone, days: totalDays, pct: totalDays ? Math.round(totalDone/totalDays*100) : 0};
}

To nie jest problem ceny. To nie jest problem zajДҷДҮ.\n\nTo jest problem tego, Ејe NIKT do nich nie pisze po zapisie.\n\nBrak przypomnienia. Brak kontaktu. Brak relacji.\n\nOne po prostuвҖҰ zapominajД… albo siДҷ stresujД….\n\nNapisz 'DM' вҖ“ pokaЕјДҷ Ci dokЕӮadnie co pisaДҮ, Ејeby przyszЕӮy na pierwsze zajДҷcia."}, {"hook": "To jedno zdanie zwiДҷksza zapisy na zajДҷcia pole dance.", "opis": "WiДҷkszoЕӣДҮ studiГіw odpowiada tak: 'karnet kosztuje 180 zЕӮ'. I klient znika.\n\nZamiast tego napisz: 'Super, ktГіry poziom CiДҷ interesuje i kiedy chcesz zaczД…ДҮ?'\n\nI nagle rozmowa idzie dalej.\n\nNapisz 'SPRZEDAЕ»' вҖ“ dam Ci wiДҷcej takich tekstГіw."}, {"hook": "Masz 1000 obserwujД…cych i dalej zero klientГіw?", "opis": "Bo obserwujД…cy NIE kupujД…. KupujД… ludzie, z ktГіrymi rozmawiasz.\n\nJeЕӣli nie masz rozmГіw w DM, systemu odpowiedzi, konkretnego zaproszenia вҖ” to moЕјesz mieДҮ i 10k followersГіw i dalej 0 zapisГіw.\n\nNapisz 'SYSTEM' вҖ“ pokaЕјДҷ Ci jak zamieniaДҮ obserwujД…cych w klientki."}, {"hook": "Multisport zniszczyЕӮ szkoЕӮy taЕ„ca", "opis": "Karty benefitowe miaЕӮy pomГіc, miaЕӮy przyciД…gaДҮ klientГіw, a w praktyce czДҷsto rozwalajД… biznes od Еӣrodka вҖ” kursanci pЕӮacД… grosze, sД… bardziej roszczeniowi i mniej zaangaЕјowani. TraktujД… zajДҷcia jak dobrД… zabawДҷ, zajawkДҷ 'na chwilДҷ'. A kiedy im siДҷ nie chce, to nie przyjdД…, logiczne.\n\nEfekt? Czasem masz peЕӮne sale, czasem puste. Czasem hajs siДҷ zgadza, czasem czekasz na 20-sty jak na gwГіЕәdЕә do trumny Twojego biznesu.\n\nNajgorsze? CiДҷЕјko z tego wyjЕӣДҮ. Bo jak zabierzesz multisporta to poЕӮowa osГіb zniknie. I wЕӮaЕӣciciel zostaje z problemem вҖ” masz podobnie u siebie?\n\nJeЕӣli tak, napisz w komentarzu 'MULTI' a wyЕӣlДҷ Ci rozwiД…zanie, ktГіre pomogЕӮo moim klientom pozbyДҮ siДҷ benefitГіw."}, {"hook": "NajwiДҷkszy problem StudiГіw TaЕ„ca i Pole Dance to nie marketing", "opis": "WiДҷkszoЕӣДҮ wЕӮaЕӣcicieli z ktГіrymi rozmawiaЕӮem uwaЕјa, Ејe jeЕӣli nie ma zapeЕӮnionego grafiku to potrzebuje marketingu i dostarczenia nowych klientГіw. A prawda jest taka, Ејe nie majД… systemu do zapisГіw i opЕӮacania zajДҷДҮ, nie majД… kontroli nad grafikiem, wszystkim zajmuje siДҷ wЕӮaЕӣciciel 'przy okazji' wolnego czasu. Jeden wielki chaos.\n\nI nawet jak przyjdД… nowi kursanci to robi siДҷ jeszcze wiДҷkszy chaos. Marketing bez ogarniДҷtych podstaw to tylko przyspieszenie Twoich problemГіw.\n\nTrafiЕӮem w sedno? Skomentuj 'SYSTEM' a podrzucДҷ Ci checklistДҷ procesГіw, ktГіre powinny byДҮ ogarniДҷte zanim ruszysz z kampaniД…."}, {"hook": "Dlaczego reklamy nie dziaЕӮajД… szkoЕӮom taЕ„ca", "opis": "Bo prГіbujД… sprzedawaДҮ wszystkim, zamiast konkretnej osobie, konkretnego poziomu, konkretnej godziny.\n\nReklama typu 'pole dance WrocЕӮaw' nie dziaЕӮa tak dobrze jak 'Еӣroda 18:00 вҖ“ start od zera вҖ“ 3 miejsca'.\n\nLudzie chcД… konkretu.\n\nRobisz reklamy ogГіlne czy pod konkretne grupy?"}, {"hook": "To najbardziej wkurwia wЕӮaЕӣcicieli", "opis": "Zapisuje siДҷ. Nie przychodzi. Chce odrabiaДҮ. Przyprowadza koleЕјankДҷ na multisporcie. I jeszcze ma pretensje, Ејe nie moЕјe wejЕӣДҮ.\n\nBranЕјa taneczna to trochДҷ jak praca z dzieДҮmi вҖ” tylko Ејe doroЕӣli.\n\nKto to zna z Ејycia?"}, {"hook": "Jak zapeЕӮniДҮ grupДҷ z 2 osГіb", "opis": "Nie robisz ogГіlnej reklamy, tylko pokazujesz konkretnД… grupДҷ, konkretny dzieЕ„, konkretny vibe вҖ” i mГіwisz: 'zostaЕӮy 3 miejsca'.\n\nLudzie kupujД… decyzjДҷ, nie ofertДҷ.\n\nMasz takie puste grupy u siebie?"}, {"hook": "Instruktorki robiД… ten bЕӮД…d na IG", "opis": "WrzucajД… wszystko вҖ” pole dance, Ејycie, wakacje, koty вҖ” i chcД… sprzedawaДҮ jednД… rzecz. Ale ludzie nie wiedzД… po co majД… je obserwowaДҮ.\n\nProfil = jeden kierunek.\n\nMasz jeden kierunek czy wszystko naraz?"}, {"hook": "Ostatnio gadaЕӮem z instruktorkД… z WarszawyвҖҰ", "opis": "Chce robiДҮ zajДҷcia online, ma pomysЕӮy, ma potencjaЕӮ, ale nie wie jak to poukЕӮadaДҮ. I to jest mega czДҷsty przypadek вҖ” duЕјo umiejДҷtnoЕӣci, zero strategii.\n\nA wystarczy dobrze function computeKoniecDate(r){
  if(!r.startKampanii || !r.okresDni) return r.koniecKampanii||"";
  var d = new Date(r.startKampanii+"T00:00:00");
  d.setDate(d.getDate()+(+r.okresDni||0));
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function campaignAutoColor(r){
  var koniec = computeKoniecDate(r);
  if(!koniec) return {startKampanii:null, koniecKampanii:null};
  var end = new Date(koniec+"T00:00:00");
  var today = new Date(todayStr()+"T00:00:00");
  var diffDays = Math.round((end-today)/86400000);
  if(isNaN(diffDays)) return {startKampanii:null, koniecKampanii:null};
  if(diffDays < 0) return {startKampanii:"var(--muted)", koniecKampanii:"var(--muted)"};
  if(diffDays <= 3) return {startKampanii:null, koniecKampanii:"var(--danger)"};
  return {startKampanii:null, koniecKampanii:null};
}

function pushZadUndo(a){ zadUndoStack.push(a); if(zadUndoStack.length>50) zadUndoStack.shift(); }
function undoZad(){
  var a = zadUndoStack.pop();
  if(!a) return;
  if(a.type==="toggle"){
    var t = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t){ t.done = a.prevDone; t.completedAt = a.prevCompletedAt; }
  } else if(a.type==="add"){
    state.tasks = state.tasks.filter(function(t){return t.id!==a.id;});
  } else if(a.type==="edit"){
    var t2 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t2){ t2.title=a.prev.title; t2.category=a.prev.category; t2.scope=a.prev.scope; t2.createdAt=a.prev.createdAt; t2.completedAt=a.prev.completedAt; t2.recurWeekday=a.prev.recurWeekday; }
  } else if(a.type==="softdelete" || a.type==="restore"){
    var t3 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t3) t3.deletedAt = a.prevDeletedAt;
  } else if(a.type==="recurtoggle"){
    var t4 = state.tasks.filter(function(x){return x.id===a.id;})[0];
    if(t4){
      if(!t4.recurCompletions) t4.recurCompletions = {};
      if(a.prev) t4.recurCompletions[a.dateKey] = true; else delete t4.recurCompletions[a.dateKey];
    }
  }
  save(); renderAll();
}
function toggleRecurTaskToday(id){
  var t = state.tasks.filter(function(x){return x.id===id;})[0];
  if(!t) return;
  if(!t.recurCompletions) t.recurCompletions = {};
  var key = todayStr();
  var prev = !!t.recurCompletions[key];
  pushZadUndo({type:"recurtoggle", id:id, dateKey:key, prev:prev});
  if(prev) delete t.recurCompletions[key]; else t.recurCompletions[key] = true;
  save(); renderAll();
}

function load(){
  var raw = localStorage.getItem(STORAGE_KEY);
  var def = defaultState();
  if(!raw){ state = def; save(); return; }
  try{
    var parsed = JSON.parse(raw);
    Object.keys(def).forEach(function(k){ if(!(k in parsed)) parsed[k] = def[k]; });
    state = migrateState(parsed);
  }catch(e){ state = def; }
}
function save(){ state._updatedAt = Date.now(); localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); scheduleHabitsBackupPush(); scheduleClientsBackupPush(); }

function renderNav(){

  NAV_GROUPS.forEach(function(g){
    var groupTabs = TABS.filter(function(t){ return t.group===g; });
    if(!groupTabs.length) return;
    html += '<div class="nav-group-label">'+g+'</div>';
    groupTabs.forEach(function(t){
      html += '<button class="navitem'+(currentTab===t.id?" active":"")+'" onclick="switchTab(\''+t.id+'\')">'+
        '<span class="ico">'+(TAB_ICON_SVG[t.id]||"")+'</span><span>'+t.label+'</span></button>';
    });
  });
  document.getElementById("navwrap").innerHTML = html;

function formatFollowerCount(n){
  var sign = n<0 ? "-" : "";
  var abs = Math.abs(n);
  if(abs>=1000000) return sign+(abs/1000000).toFixed(1)+"M";
  if(abs>=1000) return sign+(abs/1000).toFixed(1)+"K";
  return sign+String(abs);
}
function computeSocialTrend(history){
  if(!history || !history.length) return null;
  var sorted = history.slice().sort(function(a,b){ return a.date<b.date?-1:(a.date>b.date?1:0); });
  var latest = sorted[sorted.length-1];
  if(sorted.length===1) return {current:latest.count, delta:null};
  var latestDate = new Date(latest.date+"T00:00:00");
  var weekAgoTarget = new Date(latestDate); weekAgoTarget.setDate(weekAgoTarget.getDate()-7);
  var prev = null;
  for(var i=sorted.length-2; i>=0; i--){
    var d = new Date(sorted[i].date+"T00:00:00");
    if(d <= weekAgoTarget){ prev = sorted[i]; break; }
  }
  if(!prev) prev = sorted[0];
  if(prev===latest) return {current:latest.count, delta:null};
  return {current:latest.count, delta:latest.count-prev.count};
}

function isoLocal(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function currentWeekDates(){
  var d = new Date();
  var day = d.getDay(); // 0=niedziela
  var mondayOffset = day===0 ? -6 : 1-day;
  var monday = new Date(d); monday.setDate(d.getDate()+mondayOffset);
  var out = [];
  for(var i=0;i<7;i++){
    var dd = new Date(monday); dd.setDate(monday.getDate()+i);
    out.push(isoLocal(dd));
  }
  return out;
}

function weatherCategory(code, isNight){
  if(code===0) return isNight?"clear-night":"clear-day";
  if(code===1 || code===2) return isNight?"cloudy-night":"clear-day";
  if(code===3) return isNight?"cloudy-night":"cloudy";
  if(code===45 || code===48) return "fog";
  if([51,53,55,56,57,61,63,65,66,67,80,81].indexOf(code)>=0) return "rain";
  if([71,73,75,77,85,86].indexOf(code)>=0) return "snow";
  if([82,95,96,99].indexOf(code)>=0) return "storm";
  return isNight?"clear-night":"clear-day";
}

function buildSnowFlakes(){

    var size = (2+Math.random()*3).toFixed(1);
    var dur = (4+Math.random()*4).toFixed(2);
    var delay = (Math.random()*5).toFixed(2);
    var drift = Math.round((Math.random()*40)-20);
    html += '<div class="wx-flake" style="left:'+left+'%; width:'+size+'px; height:'+size+'px; animation-duration:'+dur+'s; animation-delay:-'+delay+'s; --drift:'+drift+'px"></div>';

function loadWeather(forceRetry){
  var cacheRaw = localStorage.getItem(WEATHER_CACHE_KEY);
  var cache = null;
  try{ cache = cacheRaw ? JSON.parse(cacheRaw) : null; }catch(e){ cache = null; }
  if(cache && !forceRetry){ renderWeatherFromData(cache); }
  if(cache && !forceRetry && (Date.now()-cache.ts) < WEATHER_MAX_AGE_MS) return;
  if(!navigator.geolocation){ if(!cache) renderWeatherError("Twoja przeglД…darka nie wspiera geolokalizacji.", false); return; }
  if(!cache) renderWeatherError("Pobieranie lokalizacjiвҖҰ", false);
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    var url = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+
      "&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7";
    fetch(url).then(function(r){ return r.json(); }).then(function(j){
      var place = null;
      fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude="+lat+"&longitude="+lon+"&localityLanguage=pl")
        .then(function(r){ return r.json(); }).then(function(g){
          if(g) place = g.city || g.locality || null;
        }).catch(function(){})
        .finally(function(){
          var data = {
            ts: Date.now(),
            place: place,
            current: {temp: j.current.temperature_2m, code: j.current.weather_code},
            daily: j.daily.time.map(function(date, i){
              return {date: date, tmax: j.daily.temperature_2m_max[i], tmin: j.daily.temperature_2m_min[i], code: j.daily.weather_code[i]};
            })
          };
          localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify(data));
          renderWeatherFromData(data);
        });
    }).catch(function(){
      if(!cache) renderWeatherError("Nie udaЕӮo siДҷ pobraДҮ pogody.", true);
    });
  }, function(err){
    if(!cache) renderWeatherError(err.code===1 ? "Brak zgody na lokalizacjДҷ вҖ” wЕӮД…cz jД… w ustawieniach przeglД…darki." : "Nie udaЕӮo siДҷ ustaliДҮ lokalizacji.", true);
  }, {timeout:10000, maximumAge:600000});
}

function extractDriveFolderId(url){

function extractDateFromFolderName(name, year){
  var m = name.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1]+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[3]).padStart(2,"0");
  m = name.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m) return m[3]+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[1]).padStart(2,"0");
  m = name.match(/(\d{1,2})\.(\d{1,2})(?!\d)/);
  if(m) return year+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[1]).padStart(2,"0");
  return null;
}
function driveApiListChildren(folderId){

  return fetch(url, {headers:{Authorization:"Bearer "+window.__gcalToken}}).then(function(r){
    if(r.status===401){ window.__gcalToken=null; throw new Error("401"); }
    return r.json();
  }).then(function(j){ return j.files||[]; });
}

    var subfolders = children.filter(function(f){ return f.mimeType==="application/vnd.google-apps.folder"; });
    if(!subfolders.length){ statusEl.textContent = "Brak podfolderГіw w tym folderze."; btn.disabled=false; return; }
    statusEl.textContent = "Znaleziono "+subfolders.length+" podfolderГіw, wczytujДҷ zawartoЕӣДҮ...";
    var matched = [], unmatched = [];
    subfolders.forEach(function(f){
      var date = extractDateFromFolderName(f.name, year);
      if(date) matched.push({folder:f, date:date}); else unmatched.push(f.name);
    });
    Promise.all(matched.map(function(m){
      return driveApiListChildren(m.folder.id).then(function(files){
        var images = files.filter(function(f){ return f.mimeType.indexOf("image/")===0; })
          .sort(function(a,b){ return a.name<b.name?-1:(a.name>b.name?1:0); })
          .map(function(f){ return "https://drive.google.com/uc?export=view&id="+f.id; });
        var videoFile = files.filter(function(f){ return f.mimeType.indexOf("video/")===0; })[0];
        var textFiles = files.filter(function(f){ return f.mimeType==="text/plain" || f.mimeType==="application/vnd.google-apps.document" || /\.txt$/i.test(f.name); });
        var fbFile = textFiles.filter(function(f){ return /fb|facebook/i.test(f.name); })[0];
        var igFile = textFiles.filter(function(f){ return /ig|insta/i.test(f.name); })[0];
        var soloFile = (!fbFile && !igFile) ? textFiles[0] : null;
        var textPromises = [];
        if(fbFile) textPromises.push(driveFetchTextContent(fbFile).then(function(t){ m.captionFb = t; }));
        if(igFile) textPromises.push(driveFetchTextContent(igFile).then(function(t){ m.captionIg = t; }));
        if(soloFile) textPromises.push(driveFetchTextContent(soloFile).then(function(t){ m.captionFb = t; m.captionIg = t; }));
        return Promise.all(textPromises).then(function(){
          m.images = images;
          m.video = videoFile ? "https://drive.google.com/uc?export=view&id="+videoFile.id : null;
          m.folderName = m.folder.name;
        });
      });
    })).then(function(){
      var created = 0, updated = 0;
      matched.forEach(function(m){
        var post = state.posts.filter(function(p){ return !p.deletedAt && p.brand===postyFilter && p.date===m.date; })[0];
        if(!post){
          post = {id:uid("post"), title:m.folderName, brand:postyFilter, stage:"zaplanowany", category:null, date:m.date, platform:"fbig", isCarousel:m.images.length>1, fbImage:"", captionFb:"", captionIg:""};
          state.posts.unshift(post);
          created++;
        } else {
          updated++;
        }
        post.images = m.images;
        if(m.video) post.video = m.video;
        if(post.platform==="fbig") post.isCarousel = m.images.length>1;
        if(m.captionFb!=null && !post.captionFb) post.captionFb = m.captionFb;
        if(m.captionIg!=null && !post.captionIg) post.captionIg = m.captionIg;
      });
      save(); renderAll();
      var msg = "Gotowe вҖ” dopasowano "+matched.length+" ("+created+" nowych, "+updated+" zaktualizowanych).";
      if(unmatched.length) msg += " Bez daty w nazwie (pominiДҷte): "+unmatched.join(", ")+".";
      var el2 = document.getElementById("driveImportStatus");
      if(el2) el2.textContent = msg;
      var btn2 = document.getElementById("driveImportBtn");
      if(btn2) btn2.disabled = false;
    });
  }).catch(function(e){
    statusEl.textContent = e.message==="401" ? "Sesja Google wygasЕӮa вҖ” kliknij ponownie \"PoЕӮД…cz z Google\" i sprГіbuj jeszcze raz." : "CoЕӣ poszЕӮo nie tak przy wczytywaniu z Dysku.";
    btn.disabled = false;
  });
}

function normalizeImageUrl(url){
  url = (url||"").trim();
  if(!url) return url;
  var m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(!m) m = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
  if(!m) m = url.match(/drive\.google\.com\/uc\?(?:export=[a-zA-Z]+&)?id=([a-zA-Z0-9_-]+)/);
  if(m) return "https://drive.google.com/uc?export=view&id="+m[1];
  return url;
}

function accBrand(acc){

}
var MILESTONE_THRESHOLDS = [10,100,500,1000,2000,5000,10000,15000,20000];
function milestoneInfo(followers){
  var start = 0, goal = null;
  for(var i=0;i<MILESTONE_THRESHOLDS.length;i++){
    if(followers < MILESTONE_THRESHOLDS[i]){ goal = MILESTONE_THRESHOLDS[i]; start = i===0?0:MILESTONE_THRESHOLDS[i-1]; break; }
  }
  if(goal==null){
    start = MILESTONE_THRESHOLDS[MILESTONE_THRESHOLDS.length-1];
    goal = start + 5000*(Math.floor((followers-start)/5000)+1);
  }
  var pct = Math.max(0, Math.min(100, Math.round((followers-start)/(goal-start)*100)));
  return {start:start, goal:goal, pct:pct};
}
var SHORT_MONTHS = ["sty","lut","mar","kwi","maj","cze","lip","sie","wrz","paЕә","lis","gru"];
function pad2(n){ return String(n).padStart(2,"0"); }
function dISO(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function mondayOf(d){
  var nd = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var day = nd.getDay();
  var diff = day===0 ? -6 : 1-day;
  nd.setDate(nd.getDate()+diff);
  return nd;
}
function valueAsOf(stats, iso){
  var v = null;
  for(var i=0;i<stats.length;i++){ if(stats[i].date<=iso) v = stats[i].followers; else break; }
  return v;
}
function buildChartSeries(stats, range){
  var today = new Date(); today.setHours(0,0,0,0);
  var out = [];
  if(range==="tydzien"){
    var mon = mondayOf(today);
    for(var i=0;i<7;i++){
      var d = new Date(mon); d.setDate(mon.getDate()+i);
      if(d>today) break;
      var iso = dISO(d);
      var v = valueAsOf(stats, iso);
      if(v==null) continue;
      out.push({label:pad2(d.getDate())+"."+pad2(d.getMonth()+1), value:v});
    }
  } else if(range==="miesiac"){
    var m = today.getMonth(), y = today.getFullYear();
    var mon2 = mondayOf(new Date(y,m,1));
    if(mon2.getMonth()!==m) mon2.setDate(mon2.getDate()+7);
    while(mon2.getMonth()===m && mon2.getFullYear()===y && mon2<=today){
      var sunday = new Date(mon2); sunday.setDate(mon2.getDate()+6);
      var checkDate = sunday>today ? today : sunday;
      var v2 = valueAsOf(stats, dISO(checkDate));
      if(v2!=null) out.push({label:pad2(mon2.getDate())+"."+pad2(mon2.getMonth()+1), value:v2});
      mon2 = new Date(mon2); mon2.setDate(mon2.getDate()+7);
    }
  } else if(range==="kwartal"){
    var q = Math.floor(today.getMonth()/3);
    [q*3, q*3+1, q*3+2].forEach(function(mm){
      var monthStart = new Date(today.getFullYear(), mm, 1);
      if(monthStart>today) return;
      var monthEnd = new Date(today.getFullYear(), mm+1, 0);
      var checkDate = monthEnd>today?today:monthEnd;
      var v3 = valueAsOf(stats, dISO(checkDate));
      if(v3!=null) out.push({label:SHORT_MONTHS[mm], value:v3});
    });
  } else {
    for(var mm2=0; mm2<=today.getMonth(); mm2++){
      var monthEnd2 = new Date(today.getFullYear(), mm2+1, 0);
      var checkDate2 = monthEnd2>today?today:monthEnd2;
      var v4 = valueAsOf(stats, dISO(checkDate2));
      if(v4!=null) out.push({label:SHORT_MONTHS[mm2], value:v4});
    }
  }
  return out.length ? out : (stats.length ? [{label:"", value:stats[stats.length-1].followers}] : [{label:"", value:0}]);
}

  return new Date().getDay()===1 || days>=7;
}

function lineChart(stats){
  var w=1200, h=260, padL=54, padR=14, padT=16, padB=30;
  var vals = stats.map(function(s){return s.value;});
  var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  if(min===max){ min -= 1; max += 1; }
  var innerW = w-padL-padR, innerH = h-padT-padB;
  var stepX = innerW/((stats.length-1)||1);
  var pts = stats.map(function(s,i){
    var x = padL + i*stepX;
    var y = padT + innerH - ((s.value-min)/(max-min))*innerH;
    return [x,y];
  });
  var line = pts.map(function(p,i){ return (i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
  var area = line + " L"+pts[pts.length-1][0].toFixed(1)+","+(padT+innerH)+" L"+pts[0][0].toFixed(1)+","+(padT+innerH)+" Z";
  var gid = "grad"+Math.random().toString(36).slice(2,7);
  var lastPt = pts[pts.length-1];

  var xLabels = stats.map(function(s,i){
    return '<text x="'+pts[i][0].toFixed(1)+'" y="'+(h-8)+'" text-anchor="middle" font-size="12" fill="#8a8390">'+escapeHtml(s.label)+'</text>';
  }).join("");
  var yLabels =
    '<text x="'+(padL-10)+'" y="'+(padT+5)+'" text-anchor="end" font-size="12" fill="#8a8390">'+max+'</text>'+
    '<text x="'+(padL-10)+'" y="'+(padT+innerH+4)+'" text-anchor="end" font-size="12" fill="#8a8390">'+min+'</text>';

  var dots = stats.map(function(s,i){
    var tipY = Math.max(pts[i][1]-16, padT+12);
    var tip = '<g id="stip'+i+'" class="chart-tip" style="display:none">'+
      '<rect x="'+(pts[i][0]-24).toFixed(1)+'" y="'+(tipY-16).toFixed(1)+'" width="48" height="20" rx="5" fill="#25232c" stroke="#2a2830"/>'+
      '<text x="'+pts[i][0].toFixed(1)+'" y="'+(tipY-2).toFixed(1)+'" text-anchor="middle" font-size="12" font-weight="700" fill="#f0eef2">'+s.value+'</text>'+
      '</g>';
    return tip + '<circle cx="'+pts[i][0].toFixed(1)+'" cy="'+pts[i][1].toFixed(1)+'" r="12" fill="transparent" stroke="none" onmouseenter="showChartTip('+i+')" onmouseleave="hideChartTip()" onclick="showChartTip('+i+')" style="cursor:pointer"/>';
  }).join("");

  return '<div class="card" style="padding:16px 12px 6px"><svg viewBox="0 0 '+w+' '+h+'" style="width:100%; height:210px; display:block">'+
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#cf9b4a" stop-opacity="0.35"/><stop offset="100%" stop-color="#cf9b4a" stop-opacity="0"/>'+
    '</linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#'+gid+')" stroke="none"/>'+
    '<path d="'+line+'" fill="none" stroke="#cf9b4a" stroke-width="2.5"/>'+
    '<circle cx="'+lastPt[0].toFixed(1)+'" cy="'+lastPt[1].toFixed(1)+'" r="4" fill="#cf9b4a"/>'+
    yLabels + xLabels + dots +
    '</svg></div>';
}

  document.querySelectorAll(".chart-tip").forEach(function(e){ e.style.display="none"; });
  var el = document.getElementById("stip"+i);

function applyFbRefreshAcc(platform, acc, opts){
  opts = opts || {};
  var pages = window.__fbPagesData || [];
  var pageMatch = pages.filter(function(p){
    if(platform==="instagram"){
      if(!p.instagram_business_account) return false;
      if(acc.igBusinessId) return p.instagram_business_account.id===acc.igBusinessId;
      var handle = (acc.handle||"").replace("@","").toLowerCase();
      return (p.instagram_business_account.username||"").toLowerCase()===handle;
    }
    if(acc.fbPageId) return p.id===acc.fbPageId;
    return (p.name||"").toLowerCase()===(acc.name||"").toLowerCase();
  })[0];
  if(!pageMatch){
    if(!opts.silent) alert('Nie znaleziono konta "'+(platform==="instagram"?acc.handle:acc.name)+'" wЕӣrГіd stron/kont podЕӮД…czonych do Twojego Facebooka. SprawdЕә, czy masz do niego dostДҷp jako administrator.');
    return false;
  }
  var ig = pageMatch.instagram_business_account;
  var real = platform==="instagram" ? (ig && ig.followers_count) : pageMatch.fan_count;
  if(typeof real !== "number"){
    if(!opts.silent) alert("Facebook nie zwrГіciЕӮ liczby obserwujД…cych dla tego konta.");
    return false;
  }
  var today = todayStr();
  var last = acc.stats[acc.stats.length-1];
  if(last && last.date===today){ last.followers = real; } else { acc.stats.push({date:today, followers:real}); }
  if(platform==="instagram" && ig){
    if(typeof ig.follows_count==="number") acc.followingCount = ig.follows_count;
    if(typeof ig.media_count==="number") acc.postsCount = ig.media_count;
    if(ig.biography) acc.bio = ig.biography;
    if(ig.profile_picture_url) acc.profilePic = ig.profile_picture_url;
  } else if(platform==="facebook"){
    if(pageMatch.about) acc.bio = pageMatch.about;
    if(pageMatch.picture && pageMatch.picture.data && pageMatch.picture.data.url) acc.profilePic = pageMatch.picture.data.url;
  }
  return true;
}

/* ================= KALENDARZ ================= */
function gcalMonthKey(){ return calYear+"-"+calMonth; }
function ensureGCalCalendars(){
  if(!window.__gcalToken || gcalCalendars || gcalLoading) return;
  gcalLoading = true;
  gcalConnectError = null;
  fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList", {headers:{Authorization:"Bearer "+window.__gcalToken}})
    .then(function(r){ if(r.status===401){ window.__gcalToken=null; throw new Error("401"); } return r.json(); })
    .then(function(j){
      gcalCalendars = (j.items||[]).map(function(it){ return {id:it.id, name:it.summary, color:it.backgroundColor||"#8a8390"}; });
      gcalLoading = false;
      renderAll();
      fetchGCalEventsForVisibleMonth();
    }).catch(function(){
      gcalLoading = false;
      gcalConnectError = "Nie udaЕӮo siДҷ pobraДҮ listy kalendarzy Google.";
      renderAll();
    });
}
function calTextColorFor(bgColor){
  var c = (bgColor||"").replace("#","");
  if(c.length===3) c = c.split("").map(function(ch){return ch+ch;}).join("");
  if(c.length!==6) return "#161519";
  var r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  var luminance = (0.299*r + 0.587*g + 0.114*b)/255;
  return luminance > 0.6 ? "#161519" : "#ffffff";
}
function eventDateRange(it){
  var startStr = it.start.date || (it.start.dateTime||"").slice(0,10);
  var endRaw = it.end && (it.end.date || (it.end.dateTime||"").slice(0,10));
  if(!endRaw) return [startStr];
  var start = new Date(startStr+"T00:00:00");
  var end = new Date(endRaw+"T00:00:00");
  if(it.end.date){ end.setDate(end.getDate()-1); } // all-day end date w Google jest wyЕӮД…czna
  if(end < start) end = new Date(start);
  var dates = [];
  var cur = new Date(start);
  while(cur <= end){
    dates.push(cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0")+"-"+String(cur.getDate()).padStart(2,"0"));
    cur.setDate(cur.getDate()+1);
  }
  return dates.length ? dates : [startStr];
}
function fetchGCalEventsForVisibleMonth(){
  if(!gcalCalendars || !window.__gcalToken) return;
  var key = gcalMonthKey();
  if(gcalEventsCache[key]){ renderAll(); return; }
  var first = new Date(calYear, calMonth, 1);
  var startOffset = (first.getDay()+6)%7;
  var gridStart = new Date(calYear, calMonth, 1-startOffset);
  var gridEnd = new Date(gridStart); gridEnd.setDate(gridStart.getDate()+42);
  var timeMin = gridStart.toISOString(), timeMax = gridEnd.toISOString();
  Promise.all(gcalCalendars.map(function(cal){
    return fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(cal.id)+"/events?timeMin="+encodeURIComponent(timeMin)+"&timeMax="+encodeURIComponent(timeMax)+"&singleEvents=true&orderBy=startTime", {headers:{Authorization:"Bearer "+window.__gcalToken}})
      .then(function(r){ if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); } return r.json(); })
      .then(function(j){
        var out = [];
        (j.items||[]).forEach(function(it){
          if(!it.start) return;
          var dates = eventDateRange(it);
          var t = it.start.dateTime ? it.start.dateTime.slice(11,16) : null;
          var endT = it.end && it.end.dateTime ? it.end.dateTime.slice(11,16) : null;
          var rawStart = it.start.date || (it.start.dateTime||"").slice(0,10);
          var rawEnd = (it.end && (it.end.date || (it.end.dateTime||"").slice(0,10))) || rawStart;
          dates.forEach(function(d){
            out.push({id:it.id, calendarId:cal.id, title: it.summary||"(bez tytuЕӮu)", date:d, time:t, endTime:endT,
              calendarName:cal.name, calendarColor:cal.color, allDay: !!it.start.date,
              rawStartDate: rawStart, rawEndDate: rawEnd, multiDay: dates.length>1});
          });
        });
        return out;
      }).catch(function(){ return []; });
  })).then(function(results){
    gcalEventsCache[key] = [].concat.apply([], results);
    renderAll();
  });
}
var gcalDashboardCache = null; // {key:"start_end", events:[...]} zakres dziЕӣвҶ’koniec tygodnia widoczny na Dashboardzie

  if(!window.__gcalToken || !gcalCalendars) return;

  var lastDay = new Date(weekDates[6]+"T00:00:00"); lastDay.setDate(lastDay.getDate()+1);

  Promise.all(gcalCalendars.map(function(cal){

      .then(function(r){ if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); } return r.json(); })
      .then(function(j){
        var out = [];
        (j.items||[]).forEach(function(it){
          if(!it.start) return;
          var dates = eventDateRange(it);
          var t = it.start.dateTime ? it.start.dateTime.slice(11,16) : null;
          dates.forEach(function(d){
            out.push({title: it.summary||"(bez tytuЕӮu)", date:d, time:t, calendarName:cal.name, calendarColor:cal.color});

        });
        return out;
      }).catch(function(){ return []; });
  })).then(function(results){
    gcalDashboardCache = {key:key, events: [].concat.apply([], results)};
    renderAll();
  });
}

    html += '<div class="stub-note">'+escapeHtml(gcalConnectError)+' <a href="#" onclick="window.reconnectGCal(); return false;" style="color:var(--accent)">SprГіbuj ponownie</a></div>';
  } else {
    html += '<div class="stub-note">PoЕӮД…czono z Google Calendar ('+gcalCalendars.map(function(c){return escapeHtml(c.name);}).join(", ")+').</div>';
  }

  var legendSource = gcalCalendars || state.calendars;
  html += '<div class="cal-legend">';
  legendSource.forEach(function(c){
    html += '<span><i style="background:'+c.color+'"></i>'+escapeHtml(c.name)+'</span>';
  });
  html += '</div>';

  html += '<div class="cal-header"><button class="btn secondary small" onclick="calNav(-1)">вҶҗ Poprzedni</button>'+
    '<h2>'+monthName(calMonth)+' '+calYear+'</h2>'+
    '<button class="btn secondary small" onclick="calNav(1)">NastДҷpny вҶ’</button></div>';

  var today = todayStr();
  var gcalEvents = gcalCalendars ? (gcalEventsCache[gcalMonthKey()]||null) : null;
  calEventRefs = [];
  var isMobile = window.innerWidth <= 860;

  if(isMobile){
    html += '<div class="cal-agenda">';
    var dim = daysInMonth(calYear, calMonth+1);
    for(var d=1; d<=dim; d++){
      var dstr = calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      var isToday = dstr===today;
      var wd = dowShort(calYear, calMonth+1, d);
      var evs = calEventsForDay(dstr, gcalEvents);
      html += '<div class="cal-agenda-row'+(isToday?" today":"")+'" ondblclick="openEventModal({date:\''+dstr+'\'})">'+
        '<div class="cal-agenda-date"><span class="cal-agenda-dow">'+wd+'</span><span class="cal-agenda-num">'+d+'</span></div>'+
        '<div class="cal-agenda-events">';
      if(!evs.length){ html += '<span style="color:var(--muted); font-size:12px">вҖ”</span>'; }
      evs.forEach(function(ev){
        var idx = calEventRefs.length;
        calEventRefs.push(ev.ctx);
        html += '<div class="cal-ev" style="background:'+ev.color+'; color:'+calTextColorFor(ev.color)+'; white-space:normal; font-size:12px" onclick="event.stopPropagation(); openEventModal(calEventRefs['+idx+'])">'+(ev.time?ev.time+" В· ":"")+escapeHtml(ev.title)+'</div>';
      });
      html += '</div></div>';
    }
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  html += '<div class="cal-scroll" id="calScrollBox"><div class="cal-grid-outer">';
  html += '<div class="cal-weekgrid">';
  WEEKDAYS_SHORT.forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });
  html += '</div>';

  var first = new Date(calYear, calMonth, 1);
  var startOffset = (first.getDay()+6)%7; // Monday=0
  var gridStart = new Date(calYear, calMonth, 1-startOffset);

  var monthEventsById = {};
  if(gcalEvents){
    gcalEvents.forEach(function(e){ if(e.multiDay && !monthEventsById[e.id]) monthEventsById[e.id] = e; });
  }
  var multiDayList = Object.keys(monthEventsById).map(function(k){ return monthEventsById[k]; });
  function calIncEnd(e){
    if(!e.allDay) return e.rawEndDate;
    var dd = new Date(e.rawEndDate+"T00:00:00"); dd.setDate(dd.getDate()-1);
    return dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0");
  }
  function calDaysBetween(a,b){ return Math.round((new Date(b+"T00:00:00") - new Date(a+"T00:00:00"))/86400000); }

  for(var w=0; w<6; w++){
    var weekDates = [];
    for(var i=0;i<7;i++){
      var gd = new Date(gridStart); gd.setDate(gridStart.getDate()+w*7+i);
      weekDates.push(gd.getFullYear()+"-"+String(gd.getMonth()+1).padStart(2,"0")+"-"+String(gd.getDate()).padStart(2,"0"));
    }
    var wkStart = weekDates[0], wkEnd = weekDates[6];

    var segs = [];
    multiDayList.forEach(function(e){
      var incEnd = calIncEnd(e);
      if(incEnd < wkStart || e.rawStartDate > wkEnd) return;
      var segStart = e.rawStartDate < wkStart ? wkStart : e.rawStartDate;
      var segEnd = incEnd > wkEnd ? wkEnd : incEnd;
      segs.push({ e:e, startCol: calDaysBetween(wkStart, segStart), endCol: calDaysBetween(wkStart, segEnd),
        isRealStart: segStart===e.rawStartDate, isRealEnd: segEnd===incEnd });
    });
    segs.sort(function(a,b){ return a.startCol-b.startCol; });
    var lanes = [];
    segs.forEach(function(s){
      var laneIdx = -1;
      for(var li=0; li<lanes.length; li++){ if(lanes[li] < s.startCol){ laneIdx = li; break; } }
      if(laneIdx===-1){ laneIdx = lanes.length; lanes.push(-1); }
      lanes[laneIdx] = s.endCol;
      s.lane = laneIdx;
    });
    var laneCount = lanes.length;

    html += '<div class="cal-weekrow">';
    html += '<div class="cal-weekgrid">';
    weekDates.forEach(function(dstr){
      var gd2 = new Date(dstr+"T00:00:00");
      var inMonth = gd2.getMonth()===calMonth;
      var gIsToday = dstr===today;
      html += '<div class="cal-cell'+(inMonth?"":" out")+(gIsToday?" today":"")+'" ondblclick="openEventModal({date:\''+dstr+'\'})"><div class="cal-daynum">'+gd2.getDate()+'</div>';
      if(laneCount) html += '<div style="height:'+(laneCount*19)+'px"></div>';
      var gEvs = calEventsForDay(dstr, gcalEvents).filter(function(ev){ return !ev.multiDay; });
      gEvs.forEach(function(ev){
        var idx = calEventRefs.length;
        calEventRefs.push(ev.ctx);
        html += '<div class="cal-ev" style="background:'+ev.color+'; color:'+calTextColorFor(ev.color)+'" title="'+escapeHtml(ev.title)+'" onclick="event.stopPropagation(); openEventModal(calEventRefs['+idx+'])">'+(ev.time?ev.time+" В· ":"")+escapeHtml(ev.title)+'</div>';
      });
      html += '</div>';
    });
    html += '</div>';

    if(laneCount){
      html += '<div class="cal-bars-layer" style="top:26px; height:'+(laneCount*20)+'px">';
      segs.forEach(function(s){
        var idx = calEventRefs.length;
        calEventRefs.push({existing:true, source:"gcal", id:s.e.id, calendarId:s.e.calendarId, title:s.e.title, date:s.e.rawStartDate, time:s.e.time, endTime:s.e.endTime, calendar:s.e.calendarName, allDay:s.e.allDay, rawStartDate:s.e.rawStartDate, rawEndDate:s.e.rawEndDate});
        var leftPct = (s.startCol/7*100);
        var widthPct = ((s.endCol-s.startCol+1)/7*100);
        var radius = (s.isRealStart?"9px":"0")+" "+(s.isRealEnd?"9px":"0")+" "+(s.isRealEnd?"9px":"0")+" "+(s.isRealStart?"9px":"0");
        html += '<div class="cal-bar" style="left:calc('+leftPct+'% + 2px); width:calc('+widthPct+'% - 4px); top:'+(s.lane*20)+'px; background:'+s.e.calendarColor+'; color:'+calTextColorFor(s.e.calendarColor)+'; border-radius:'+radius+'" title="'+escapeHtml(s.e.title)+'" onclick="event.stopPropagation(); openEventModal(calEventRefs['+idx+'])">'+escapeHtml(s.e.title)+'</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div></div>';

  el.innerHTML = html;
  attachPinchZoom("calScrollBox");
}
function calEventsForDay(dstr, gcalEvents){
  var dayEvents;
  if(gcalEvents!==null){
    dayEvents = gcalEvents.filter(function(e){ return e.date===dstr; });
  } else {
    var dwd = (new Date(dstr+"T00:00:00").getDay()+6)%7;
    dayEvents = state.events.filter(function(e){
      if(e.date===dstr) return true;
      if(e.recurWeekday!=null && e.recurWeekday===dwd && dstr>=e.date) return true;
      return false;
    });
  }
  return dayEvents.map(function(e){
    if(gcalEvents!==null){
      return {
        color: e.calendarColor, title: e.title, time: e.time, multiDay: e.multiDay,
        ctx: {existing:true, source:"gcal", id:e.id, calendarId:e.calendarId, title:e.title, date:dstr, time:e.time, endTime:e.endTime,
          calendar:e.calendarName, allDay:e.allDay, rawStartDate:e.rawStartDate, rawEndDate:e.rawEndDate}
      };
    }
    var cal = state.calendars.filter(function(c){return c.name===e.calendar;})[0] || {color:"#8a8390"};
    return {
      color: cal.color, title: e.title, time: e.time,
      ctx: {existing:true, source:"local", id:e.id, title:e.title, date:e.date, time:e.time, calendar:e.calendar}
    };
  });
}

var RRULE_BYDAY = ["MO","TU","WE","TH","FR","SA","SU"]; // 0=Pon..6=Ndz
function saveEventModal(){
  var ctx = window.__eventModalCtx || {};
  var title = document.getElementById("evmTitle").value.trim();
  var date = document.getElementById("evmDate").value;
  var time = document.getElementById("evmTime").value;
  var endDateIn = document.getElementById("evmEndDate").value;
  var endTimeIn = document.getElementById("evmEndTime").value;
  var calName = document.getElementById("evmCal").value;
  if(!title || !date){ alert("Podaj przynajmniej tytuЕӮ i datДҷ."); return; }
  var recurEl = document.getElementById("evmRecur");
  var isRecur = !ctx.existing && recurEl && recurEl.checked;

  var useGcal = ctx.source==="gcal" || (!ctx.existing && gcalCalendars && window.__gcalToken);
  if(useGcal){
    var cal = gcalCalendars.filter(function(c){return c.name===calName;})[0] || gcalCalendars[0];
    var targetCalendarId = ctx.existing ? ctx.calendarId : cal.id;
    var body = {summary:title};
    if(time){
      var endDateFinal = endDateIn && endDateIn>=date ? endDateIn : date;
      var endTimeFinal = endTimeIn || (function(){ var p=time.split(":"); var h=(parseInt(p[0],10)+1)%24; return String(h).padStart(2,"0")+":"+p[1]; })();
      body.start = {dateTime:date+"T"+time+":00", timeZone:"Europe/Warsaw"};
      body.end = {dateTime:endDateFinal+"T"+endTimeFinal+":00", timeZone:"Europe/Warsaw"};
    } else {
      var endDateAllDay = endDateIn && endDateIn>=date ? endDateIn : date;
      var endExclusive = new Date(endDateAllDay+"T00:00:00"); endExclusive.setDate(endExclusive.getDate()+1);
      body.start = {date:date};
      body.end = {date: isoLocal(endExclusive)};
    }
    if(isRecur){
      var recurWd = (new Date(date+"T00:00:00").getDay()+6)%7;
      body.recurrence = ["RRULE:FREQ=WEEKLY;BYDAY="+RRULE_BYDAY[recurWd]];
    }
    var url = "https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(targetCalendarId)+"/events"+(ctx.existing?"/"+encodeURIComponent(ctx.id):"");
    fetch(url, {
      method: ctx.existing ? "PATCH" : "POST",
      headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
      body: JSON.stringify(body)
    }).then(function(r){
      if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); }
      if(!r.ok) throw new Error("save failed");
      return r.json();
    }).then(function(){
      closeEventModal();
      delete gcalEventsCache[gcalMonthKey()];
      fetchGCalEventsForVisibleMonth();
    }).catch(function(){
      alert("Nie udaЕӮo siДҷ zapisaДҮ wydarzenia w Google Calendar вҖ” sprГіbuj poЕӮД…czyДҮ ponownie.");
    });
  } else {
    if(ctx.existing){
      var t = state.events.filter(function(x){return x.id===ctx.id;})[0];
      if(t){ t.title=title; t.date=date; t.time=time||null; t.calendar=calName; save(); }
    } else {
      var newEv = {id:uid("ev"), title:title, date:date, time:time||null, location:null, calendar:calName};
      if(isRecur){ newEv.recurWeekday = (new Date(date+"T00:00:00").getDay()+6)%7; }
      state.events.push(newEv);
      save();
    }
    closeEventModal();
    renderAll();
  }
}
function deleteEventModal(){
  var ctx = window.__eventModalCtx || {};
  if(!confirm('UsunД…ДҮ wydarzenie "'+ctx.title+'"?')) return;
  if(ctx.source==="gcal"){
    fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(ctx.calendarId)+"/events/"+encodeURIComponent(ctx.id), {
      method:"DELETE",
      headers:{Authorization:"Bearer "+window.__gcalToken}
    }).then(function(r){
      if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); }
      if(!r.ok && r.status!==410 && r.status!==204) throw new Error("delete failed");
      closeEventModal();
      delete gcalEventsCache[gcalMonthKey()];
      fetchGCalEventsForVisibleMonth();
    }).catch(function(){
      alert("Nie udaЕӮo siДҷ usunД…ДҮ wydarzenia.");
    });
  } else {
    state.events = state.events.filter(function(x){return x.id!==ctx.id;});
    save();
    closeEventModal();
    renderAll();
  }
}
function calNav(dir){
  calMonth += dir;
  if(calMonth<0){ calMonth=11; calYear--; }
  if(calMonth>11){ calMonth=0; calYear++; }
  if(gcalCalendars) fetchGCalEventsForVisibleMonth();
  renderAll();
}
function parseEventCommand(text){
  var res = {title:null, date:null, time:null, location:null, calendar:"Osobiste"};
  var t = text.trim();
  t = t.replace(/^dodaj\s+(spotkanie|wydarzenie)\s+z\s+/i, "spotkanie z ");
  var dateMatch = t.match(/(\d{1,2})\.(\d{1,2})\.?/);
  if(dateMatch){
    var day = parseInt(dateMatch[1],10), month = parseInt(dateMatch[2],10);
    var year = new Date().getFullYear();
    res.date = year+"-"+String(month).padStart(2,"0")+"-"+String(day).padStart(2,"0");
  }
  var timeMatch = t.match(/godz\.?\s*(\d{1,2}):(\d{2})/i);
  if(timeMatch){ res.time = String(timeMatch[1]).padStart(2,"0")+":"+timeMatch[2]; }
  var calSource = gcalCalendars || state.calendars;
  if(gcalCalendars){
    var wspolny = gcalCalendars.filter(function(c){ return c.name.toLowerCase().indexOf("wspГіlny")!==-1 || c.name.toLowerCase().indexOf("wspolny")!==-1; })[0];
    res.calendar = wspolny ? wspolny.name : gcalCalendars[0].name;
  }
  var calMatch = t.match(/kalendarz\s+"([^"]+)"/i);
  if(calMatch){
    var name = calMatch[1];
    var found = calSource.filter(function(c){ return c.name.toLowerCase()===name.toLowerCase() || c.name.toLowerCase().indexOf(name.toLowerCase())!==-1; })[0];
    res.calendar = found ? found.name : (gcalCalendars ? gcalCalendars[0].name : (name.charAt(0).toUpperCase()+name.slice(1)));
  }
  var withMatch = t.match(/z\s+([A-ZЕ»Е№ДҶД„ЕҡДҳЕҒГ“Еғ][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+(?:\s+[A-ZЕ»Е№ДҶД„ЕҡДҳЕҒГ“Еғ][a-zД…ДҮДҷЕӮЕ„ГіЕӣЕәЕј]+)?)/);
  var locMatch = t.match(/,\s*([A-ZЕ»Е№ДҶД„ЕҡДҳЕҒГ“Еғ][^,]*?)(?:,\s*kalendarz|$)/);
  if(locMatch){ res.location = locMatch[1].trim(); }

  var titleParts = ["Spotkanie"];
  if(withMatch){ titleParts.push("z "+withMatch[1]); }
  res.title = titleParts.join(" ");
  return res;
}
function insertGCalEvent(parsed){
  var cal = gcalCalendars.filter(function(c){ return c.name===parsed.calendar; })[0] || gcalCalendars[0];
  var body;
  if(parsed.time){
    var parts = parsed.time.split(":");
    var endH = (parseInt(parts[0],10)+1)%24;
    var endTime = String(endH).padStart(2,"0")+":"+parts[1];
    body = {summary:parsed.title, location:parsed.location||undefined,
      start:{dateTime:parsed.date+"T"+parsed.time+":00", timeZone:"Europe/Warsaw"},
      end:{dateTime:parsed.date+"T"+endTime+":00", timeZone:"Europe/Warsaw"}};
  } else {
    body = {summary:parsed.title, location:parsed.location||undefined,
      start:{date:parsed.date}, end:{date:parsed.date}};
  }
  fetch("https://www.googleapis.com/calendar/v3/calendars/"+encodeURIComponent(cal.id)+"/events", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify(body)
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; gcalCalendars=null; throw new Error("401"); }
    if(!r.ok) throw new Error("insert failed");
    return r.json();
  }).then(function(){
    delete gcalEventsCache[gcalMonthKey()];
    fetchGCalEventsForVisibleMonth();
  }).catch(function(){
    alert("Nie udaЕӮo siДҷ dodaДҮ wydarzenia do Google Calendar вҖ” sprГіbuj poЕӮД…czyДҮ ponownie (przycisk w Kalendarzu).");
    renderAll();
  });
}
function submitNlp(){
  var val = document.getElementById("nlpInput").value;
  if(!val.trim()) return;
  var parsed = parseEventCommand(val);
  if(!parsed.date){ alert("Nie udaЕӮo siДҷ rozpoznaДҮ daty w komendzie."); return; }
  if(gcalCalendars && window.__gcalToken){
    insertGCalEvent(parsed);
  } else {
    state.events.push({id:uid("ev"), title:parsed.title, date:parsed.date, time:parsed.time, location:parsed.location, calendar:parsed.calendar});
    save();
  }
  document.getElementById("nlpInput").value = "";
  renderAll();
}

var HABIT_DOW_SHORT = ["PN","WT","ЕҡR","CZW","PT","SO","NDZ"]; // poniedziaЕӮek pierwszy, jak w PL
function dowShort(y,m,d){ return HABIT_DOW_SHORT[(new Date(y,m-1,d).getDay()+6)%7]; }

var nawykiTab = null; // "YYYY-MM" wybranego miesiД…ca albo "TOTAL"

var pinchZoomLevels = {nawykiScrollBox:1, klienciScrollBox:1, calScrollBox:1};
function attachPinchZoom(boxId){
  var box = document.getElementById(boxId);
  if(!box) return;
  box.style.zoom = pinchZoomLevels[boxId];
  var startDist = 0, startZoom = 1;
  box.ontouchstart = function(e){
    if(e.touches.length===2){
      startDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      startZoom = pinchZoomLevels[boxId];
    }
  };
  box.ontouchmove = function(e){
    if(e.touches.length===2 && startDist>0){
      e.preventDefault();
      var dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      var scale = startZoom * (dist/startDist);
      scale = Math.max(0.4, Math.min(1.6, scale));
      pinchZoomLevels[boxId] = scale;
      box.style.zoom = scale;
    }
  };
}
function pushNawykiUndo(action){
  nawykiUndoStack.push(action);
  if(nawykiUndoStack.length>50) nawykiUndoStack.shift();
}
function undoNawyki(){
  var a = nawykiUndoStack.pop();
  if(!a) return;
  if(a.type==="toggle"){
    var h = state.habits.filter(function(x){return x.id===a.habitId;})[0];
    if(h){ if(a.prev) h.log[a.dateKey] = true; else delete h.log[a.dateKey]; }
  } else if(a.type==="rename"){
    var h2 = state.habits.filter(function(x){return x.id===a.habitId;})[0];
    if(h2) h2.name = a.prevName;
  } else if(a.type==="delete"){
    state.habits.splice(a.index, 0, a.habit);
  } else if(a.type==="add"){
    state.habits = state.habits.filter(function(h){return h.id!==a.habitId;});
  } else if(a.type==="reportrow-add"){
    var rr1 = state.habitReports[a.ym];
    if(rr1) rr1.splice(a.index,1);
  } else if(a.type==="reportrow-edit"){
    var rr2 = state.habitReports[a.ym];
    if(rr2 && rr2[a.index]) rr2[a.index][a.field] = a.prevValue;
  } else if(a.type==="reportrow-delete"){
    var rr3 = state.habitReports[a.ym];
    if(rr3) rr3.splice(a.index, 0, a.row);
  }
  save(); renderAllKeepScroll("nawykiScrollBox");
}

function toggleHabitDay(id, dateKey){

function setHabitReps(id){

  repsStr = repsStr.trim();
  if(!repsStr){ h.repsPerDay = null; h.repsUnit = null; save(); renderAllKeepScroll("nawykiScrollBox"); return; }
  var reps = parseInt(repsStr, 10);
  if(!reps || reps<=0){ alert("Podaj liczbДҷ wiДҷkszД… od zera."); return; }
  var unit = prompt('Jak nazwaДҮ sumДҷ w raporcie (np. "brzuszkГіw", "pompek", "ЕӮД…cznie")?', h.repsUnit||"razy");
  h.repsPerDay = reps;

}
function addHabit(){
  var name = prompt("Nazwa nawyku:");
  if(!name) return;
  var newHabit = {id:uid("hab"), name:name, log:{}};
  state.habits.push(newHabit);
  pushNawykiUndo({type:"add", habitId:newHabit.id});
  save(); renderAll();
}
function deleteHabit(id){
  if(!confirm("Na pewno usunД…ДҮ ten nawyk? MoЕјesz to cofnД…ДҮ przyciskiem \"Cofnij\".")) return;
  var idx = -1;
  for(var i=0;i<state.habits.length;i++){ if(state.habits[i].id===id){ idx=i; break; } }
  if(idx<0) return;
  var removed = state.habits[idx];
  state.habits.splice(idx,1);
  pushNawykiUndo({type:"delete", habit:removed, index:idx});
  save(); renderAll();
}

/* ---- Kopia zapasowa NawykГіw w osobnym arkuszu Google Sheets (nie dotyka arkusza Damiana) ---- */
var habitsBackupSyncTimer = null;
var habitsBackupPending = false;
var habitsBackupCreating = false;
var habitsBackupStatus = "idle"; // idle|ok|error

function ensureHabitsBackupSheet(){
  if(!window.__gcalToken || state.habitsBackupSheetId || habitsBackupCreating) return;
  habitsBackupCreating = true;
  fetch("https://sheets.googleapis.com/v4/spreadsheets", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      properties:{title:"Nawyki вҖ” kopia zapasowa (system)"},
      sheets:[{properties:{title:"TOTAL"}},{properties:{title:"RAW"}},{properties:{title:"RAPORTY"}}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    return r.json();
  }).then(function(data){
    habitsBackupCreating = false;
    if(data.spreadsheetId){
      state.habitsBackupSheetId = data.spreadsheetId;
      state.habitsBackupSheetUrl = data.spreadsheetUrl || ("https://docs.google.com/spreadsheets/d/"+data.spreadsheetId+"/edit");
      save();
      renderAll();
    }
  }).catch(function(){ habitsBackupCreating = false; });
}
function scheduleHabitsBackupPush(){
  if(!window.__gcalToken || !state.habitsBackupSheetId) return;
  habitsBackupPending = true;
  if(habitsBackupSyncTimer) clearTimeout(habitsBackupSyncTimer);
  habitsBackupSyncTimer = setTimeout(flushHabitsBackupPush, 1500);
}
function flushHabitsBackupPush(){
  if(!habitsBackupPending) return;
  habitsBackupPending = false;
  if(!window.__gcalToken || !state.habitsBackupSheetId) return;
  var yr = new Date().getFullYear();

  var totalHeader = ["NAWYK","WYKONANIA (ROK)","DNI (ROK)","% ROK"].concat(HABIT_MONTH_ABBR.map(function(mn){return mn.toUpperCase();})).concat(["SUMA"]);
  var totalRows = [totalHeader];
  state.habits.forEach(function(h){
    var ys = habitYearStats(h, String(yr));
    var row = [h.name, ys.done, ys.days, ys.pct+"%"];
    for(var m=1;m<=12;m++){ row.push(habitMonthStats(h, yr+"-"+String(m).padStart(2,"0")).pct+"%"); }
    row.push(ys.done);
    totalRows.push(row);
  });

  var rawRows = [["id","name","log_json"]];
  state.habits.forEach(function(h){ rawRows.push([h.id, h.name, JSON.stringify(h.log||{})]); });

  var reportRows = [["miesiac","dni","raport"]];
  Object.keys(state.habitReports||{}).sort().forEach(function(ym){
    var rows = state.habitReports[ym];
    if(typeof rows === "string"){ reportRows.push([ym, "", rows]); return; }
    (rows||[]).forEach(function(r){ reportRows.push([ym, r.value||"", r.label||""]); });
  });

  fetch("https://sheets.googleapis.com/v4/spreadsheets/"+state.habitsBackupSheetId+"/values:batchUpdate", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      valueInputOption:"RAW",
      data:[
        {range:"TOTAL!A1", values: totalRows},
        {range:"RAW!A1", values: rawRows},
        {range:"RAPORTY!A1", values: reportRows}
      ]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    habitsBackupStatus = r.ok ? "ok" : "error";
  }).catch(function(){ habitsBackupStatus = "error"; });
}

function updateClientOpsField(id, field, value){
  var c = state.clientOps.clients.filter(function(x){return x.id===id;})[0];
  if(!c) return;
  var prev = c[field];
  var val = (field==="okresDni") ? (+value||0) : (field==="obslugaKampanii") ? !!value : value;
  if(prev===val) return;
  pushClientOpsUndo({type:"field", id:id, field:field, prevValue:prev});
  c[field] = val;
  save(); renderAll();
}
function deleteClientOpsClient(id){
  if(!confirm("Na pewno usunД…ДҮ tego klienta wraz z jego zadaniami? Historia screenshotГіw zostanie (dane w Storage), ale zniknie z widoku. MoЕјna cofnД…ДҮ przyciskiem \"Cofnij\".")) return;
  var idx = state.clientOps.clients.findIndex(function(x){return x.id===id;});
  if(idx===-1) return;
  var client = state.clientOps.clients[idx];
  var tasks = state.clientOps.tasks.filter(function(t){ return t.clientId===id; });
  state.clientOps.clients.splice(idx,1);
  state.clientOps.tasks = state.clientOps.tasks.filter(function(t){ return t.clientId!==id; });
  pushClientOpsUndo({type:"deleteClient", index:idx, client:client, tasks:tasks});
  if(clientOpsExpandedId===id) clientOpsExpandedId=null;
  save(); renderAll();
}

function toggleClientOpsTask(id){
  var t = state.clientOps.tasks.filter(function(x){return x.id===id;})[0];
  if(!t) return;
  var prevNextDue = t.nextDue, prevDone = t.done, prevLastDoneAt = t.lastDoneAt;
  if(t.freq==="once"){
    t.done = !t.done;
  } else {
    var d = new Date();
    if(t.freq==="weekly") d.setDate(d.getDate()+7);
    else if(t.freq==="monthly") d.setMonth(d.getMonth()+1);
    else d.setDate(d.getDate()+Math.max(1, t.customDays||1));
    t.nextDue = isoLocal(d);
    t.lastDoneAt = todayStr();
  }
  pushClientOpsUndo({type:"toggleTask", id:id, prevNextDue:prevNextDue, prevDone:prevDone, prevLastDoneAt:prevLastDoneAt});
  save(); renderAll();
}

function fileToBase64(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(){ resolve(reader.result.split(",")[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function uploadClientOpsScreenshot(clientId, inputEl){
  var file = inputEl.files && inputEl.files[0];
  if(!file) return;
  var statusEl = document.getElementById("coShotStatus_"+clientId);
  if(statusEl) statusEl.textContent = "WgrywamвҖҰ";
  if(!window.uploadClientScreenshot){
    if(statusEl) statusEl.textContent = "BЕӮД…d: brak poЕӮД…czenia z Firebase Storage.";
    return;
  }
  var shotId = uid("shot");
  var ext = (file.type.split("/")[1]||"jpg").replace(/[^a-z0-9]/gi,"");
  var path = "clientScreens/"+clientId+"/"+shotId+"."+ext;
  window.uploadClientScreenshot(file, path).then(function(url){
    var rec = {id:shotId, clientId:clientId, storagePath:path, url:url, uploadedAt:new Date().toISOString(), analysis:"", analysisStatus:"pending"};
    state.clientOps.screenshots.push(rec);
    save(); renderAll();
    fileToBase64(file).then(function(b64){
      return analyzeClientScreenshot(b64, file.type||"image/jpeg");
    }).then(function(text){
      rec.analysis = text;
      rec.analysisStatus = "ok";
      save(); renderAll();
    }).catch(function(err){
      rec.analysis = (err && err.message) ? err.message : "Nie udaЕӮo siДҷ przeanalizowaДҮ screenshota.";
      rec.analysisStatus = "error";
      save(); renderAll();
    });
  }).catch(function(){
    if(statusEl) statusEl.textContent = "BЕӮД…d wgrywania do Firebase Storage.";
  });
  inputEl.value = "";
}
function analyzeClientScreenshot(base64, mediaType){
  var key = localStorage.getItem("mdgtal_anthropic_key");
  if(!key) return Promise.reject(new Error("Brak klucza API Anthropic вҖ” ustaw go w Ustawieniach AI."));
  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "x-api-key": key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
      "content-type":"application/json"
    },
    body: JSON.stringify({
      model:"claude-sonnet-4-5",
      max_tokens:500,
      messages:[{role:"user", content:[
        {type:"image", source:{type:"base64", media_type:mediaType, data:base64}},
        {type:"text", text: CLIENT_SHOT_PROMPT}
      ]}]
    })
  }).then(function(r){
    if(!r.ok){
      return r.json().catch(function(){return null;}).then(function(errBody){
        var msg = (errBody && errBody.error && errBody.error.message) || ("HTTP "+r.status);
        throw new Error("Anthropic API: "+msg);
      });
    }
    return r.json();
  }).then(function(data){
    var text = (data.content||[]).map(function(b){ return b.text||""; }).join("\n").trim();
    return text || "Brak odpowiedzi od modelu.";
  });
}

function ceoTotalXp(){
  var sum = 0;

  return sum;
}
function ceoCharLevelInfo(){
  var xp = ceoTotalXp();
  var perLevel = 1000;
  return {level: Math.floor(xp/perLevel)+1, xp:xp, xpInLevel: xp%perLevel, xpForNext: perLevel};
}
function ceoMilestoneAchieved(m){
  if(m.type==="manual") return !!m.done;
  if(m.type==="financeAvgRevenue"){
    var months = (state.finance||[]).slice(-m.months);
    if(months.length<m.months) return false;
    var avg = months.reduce(function(s,f){return s+(f.revenue||0);},0)/months.length;
    return avg>=m.target;
  }
  if(m.type==="financeField"){
    return (state.ceo.finance[m.field]||0) >= m.target;
  }
  if(m.type==="financePositiveMonths"){
    var months2 = (state.finance||[]).slice(-m.months);
    if(months2.length<m.months) return false;
    return months2.every(function(f){ return (f.revenue||0)-(f.bizCost||0)-(f.personalCost||0) > 0; });
  }
  if(m.type==="postsPublished"){
    return state.posts.filter(function(p){return p.stage==="opublikowany" && !p.deletedAt;}).length >= m.target;
  }
  if(m.type==="agentDone"){
    return state.agentRequests.filter(function(r){return r.status==="gotowe";}).length >= m.target;
  }
  if(m.type==="habitYearPct"){
    var yr = String(new Date().getFullYear());
    var habit = state.habits.filter(function(h){return ceoHabitMapping(h.name).skill===m.matchSkill;})[0];
    if(!habit) return false;
    return habitYearStats(habit, yr).pct >= m.target;
  }
  return false;
}
function ceoSkillMilestoneLevel(key){
  var list = state.ceo.skillMilestones[key] || [];
  var lvl = 0;
  list.forEach(function(m){ if(ceoMilestoneAchieved(m) && m.level>lvl) lvl = m.level; });
  return Math.min(100, lvl);
}

function ceoMentorInsight(){

    lines.push('DziЕӣ odhaczone '+doneToday+' / '+mainItems.length+' zadaЕ„ gЕӮГіwnych.'+(doneToday<mainItems.length ? ' ZostaЕӮo jeszcze '+(mainItems.length-doneToday)+' do zrobienia.' : ' Wszystko zrobione вҖ” dobra robota!'));

  if(weakest){

  }

function updateClientField(ym, rowId, field, value){
  var rows = state.clientsMonthly[ym]||[];
  var r = rows.filter(function(x){return x.id===rowId;})[0];
  if(!r) return;
  var prev = r[field];
  var isNumeric = typeof prev==="number";
  var val = isNumeric ? (+value||0) : value;
  if(prev===val) return;
  pushKlienciUndo({type:"field", ym:ym, rowId:rowId, field:field, prevValue:prev});
  r[field] = val;
  save(); renderAllKeepScroll("klienciScrollBox");
}
function updateClientGoal(ym, value){
  var prev = state.clientsGoals[ym]||0;
  var val = +value||0;
  if(prev===val) return;
  pushKlienciUndo({type:"goal", ym:ym, prevValue:prev});
  state.clientsGoals[ym] = val;
  save(); renderAll();
}

  state.clientsMonthly[klienciTab].push(row);
  pushKlienciUndo({type:"add", ym:klienciTab, rowId:row.id});

}
function deleteClientRow(ym, rowId){
  if(!confirm("Na pewno usunД…ДҮ tego klienta z tego miesiД…ca? MoЕјesz to cofnД…ДҮ przyciskiem \"Cofnij\".")) return;
  var rows = state.clientsMonthly[ym]||[];
  var idx = -1;
  for(var i=0;i<rows.length;i++){ if(rows[i].id===rowId){ idx=i; break; } }
  if(idx<0) return;
  var removed = rows[idx];
  rows.splice(idx,1);
  pushKlienciUndo({type:"delete", ym:ym, row:removed, index:idx});
  save(); renderAll();
}

/* ---- Kopia zapasowa KlientГіw w osobnym arkuszu Google Sheets (nie dotyka Bazy KlientГіw Agencji 2026) ---- */
var clientsBackupSyncTimer = null;
var clientsBackupPending = false;
var clientsBackupCreating = false;
var clientsBackupStatus = "idle";

function ensureClientsBackupSheet(){
  if(!window.__gcalToken || state.clientsBackupSheetId || clientsBackupCreating) return;
  clientsBackupCreating = true;
  fetch("https://sheets.googleapis.com/v4/spreadsheets", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      properties:{title:"Klienci вҖ” kopia zapasowa (system)"},
      sheets:[{properties:{title:"TOTAL"}},{properties:{title:"RAW"}}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    return r.json();
  }).then(function(data){
    clientsBackupCreating = false;
    if(data.spreadsheetId){
      state.clientsBackupSheetId = data.spreadsheetId;
      state.clientsBackupSheetUrl = data.spreadsheetUrl || ("https://docs.google.com/spreadsheets/d/"+data.spreadsheetId+"/edit");
      save(); renderAll();
    }
  }).catch(function(){ clientsBackupCreating = false; });
}
function scheduleClientsBackupPush(){
  if(!window.__gcalToken || !state.clientsBackupSheetId) return;
  clientsBackupPending = true;
  if(clientsBackupSyncTimer) clearTimeout(clientsBackupSyncTimer);
  clientsBackupSyncTimer = setTimeout(flushClientsBackupPush, 1500);
}
function flushClientsBackupPush(){
  if(!clientsBackupPending) return;
  clientsBackupPending = false;
  if(!window.__gcalToken || !state.clientsBackupSheetId) return;
  var yr = new Date().getFullYear();

  var totalRows = [["MIESIД„C","ЕҒД„CZNA ILOЕҡДҶ KLIENTГ“W","NOWI KLIENCI","WYNAGRODZENIE","CEL $","% CELU"]];
  for(var m=1;m<=12;m++){
    var ym = yr+"-"+String(m).padStart(2,"0");
    var s = clientMonthSummary(ym);
    var cel = state.clientsGoals[ym]||0;
    var pctCelu = cel>0 ? Math.round(s.wynagrodzenia/cel*100)+"%" : "";
    totalRows.push([monthName(m-1), s.laczna, s.nowi, s.wynagrodzenia, cel, pctCelu]);
  }

  var rawRows = [["miesiac","id","nazwa","lokalizacja","faktura","statusKlienta","wynagrodzenie","budzetRekl","iloscWsp","okresDni","etapWsp","startKampanii","koniecKampanii","cel","ocenaWsp","notatki"]];
  Object.keys(state.clientsMonthly).sort().forEach(function(ym){
    (state.clientsMonthly[ym]||[]).forEach(function(r){
      rawRows.push([ym, r.id, r.nazwa, r.lokalizacja, r.faktura, r.statusKlienta, r.wynagrodzenie, r.budzetRekl, r.iloscWsp, r.okresDni, r.etapWsp, r.startKampanii, computeKoniecDate(r), r.cel, r.ocenaWsp, r.notatki]);
    });
  });

  fetch("https://sheets.googleapis.com/v4/spreadsheets/"+state.clientsBackupSheetId+"/values:batchUpdate", {
    method:"POST",
    headers:{Authorization:"Bearer "+window.__gcalToken, "Content-Type":"application/json"},
    body: JSON.stringify({
      valueInputOption:"RAW",
      data:[{range:"TOTAL!A1", values: totalRows},{range:"RAW!A1", values: rawRows}]
    })
  }).then(function(r){
    if(r.status===401){ window.__gcalToken=null; }
    clientsBackupStatus = r.ok ? "ok" : "error";
  }).catch(function(){ clientsBackupStatus = "error"; });
}

function crmPushT4ARow(c){

function crmPullT4AStatuses(){

  var base = "https://sheets.googleapis.com/v4/spreadsheets/"+T4A_SHEET_ID;

  var params = linked.map(function(c){ return "ranges="+encodeURIComponent(T4A_SHEET_TAB+"!K"+c.t4aSheetRow+":O"+c.t4aSheetRow); }).join("&");

      if(r.status===401){ window.__gcalToken=null; throw new Error("401"); }
      if(!r.ok) throw new Error("http"+r.status);
      return r.json();
    }).then(function(data){
      var changed = false;
      (data.valueRanges||[]).forEach(function(vr, i){
        var c = linked[i];
        var row = (vr.values && vr.values[0]) || [];
        var t = crmGetT4A(c);
        var next = {sent:crmT4ABoolify(row[0]), offer:crmT4ABoolify(row[1]), decision:crmT4ABoolify(row[2]), listed:crmT4ABoolify(row[3]), client:crmT4ABoolify(row[4])};

          t.sent=next.sent; t.offer=next.offer; t.decision=next.decision; t.listed=next.listed; t.client=next.client;

        }
      });
      if(changed){ save(); renderAll(); }
    }).catch(function(){});

function pushCrmUndo(a){ crmUndoStack.push(a); if(crmUndoStack.length>50) crmUndoStack.shift(); }
function crmUndo(){
  var a = crmUndoStack.pop();
  if(!a) return;
  if(a.type==="add"){
    state.crmContacts = state.crmContacts.filter(function(c){ return c.id!==a.id; });
  } else if(a.type==="edit"){
    var c = state.crmContacts.filter(function(x){ return x.id===a.id; })[0];
    if(c){ c.name=a.prev.name; c.city=a.prev.city; c.ig=a.prev.ig; c.fb=a.prev.fb; c.website=a.prev.website; c.email=a.prev.email; c.phone=a.prev.phone; c.notes=a.prev.notes; c.category=a.prev.category; c.system=a.prev.system; c.statusT4A=a.prev.statusT4A; }
  } else if(a.type==="softdelete" || a.type==="restore"){
    var c2 = state.crmContacts.filter(function(x){ return x.id===a.id; })[0];
    if(c2) c2.deletedAt = a.prevDeletedAt;
  } else if(a.type==="bulkcategory"){
    a.changes.forEach(function(ch){
      var c3 = state.crmContacts.filter(function(x){ return x.id===ch.id; })[0];
      if(c3) c3.category = ch.prevCategory;
    });
  }
  save(); renderAll();
}

function crmNormHeader(h){
  return (h||"").toString().trim().toLowerCase()
    .replace(/Д…/g,"a").replace(/ДҮ/g,"c").replace(/Дҷ/g,"e").replace(/ЕӮ/g,"l").replace(/Е„/g,"n")
    .replace(/Гі/g,"o").replace(/Еӣ/g,"s").replace(/Еә/g,"z").replace(/Еј/g,"z");
}
function crmParseCSV(text){
  if(text.charCodeAt(0)===0xFEFF) text = text.slice(1);
  var firstLine = text.split("\n")[0] || "";
  var delim = (firstLine.split(";").length > firstLine.split(",").length) ? ";" : ",";
  var rows = []; var row = []; var field = ""; var inQuotes = false;
  for(var i=0;i<text.length;i++){
    var ch = text[i];
    if(inQuotes){
      if(ch === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else {
      if(ch === '"') inQuotes = true;
      else if(ch === delim){ row.push(field); field = ""; }
      else if(ch === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
      else if(ch === '\r'){ /* skip */ }
      else field += ch;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(function(r){ return r.some(function(f){ return f && f.trim() !== ""; }); });
}
function crmMapColumns(headerRow){
  var map = {};
  var norm = headerRow.map(crmNormHeader);
  Object.keys(CRM_COL_ALIASES).forEach(function(field){
    var aliases = CRM_COL_ALIASES[field].map(crmNormHeader);
    for(var i=0;i<norm.length;i++){
      if(aliases.indexOf(norm[i]) > -1){ map[field] = i; return; }
    }
  });
  if(map.name === undefined) map.name = 0;
  return map;
}
function crmHandleFile(ev){
  var file = ev.target.files && ev.target.files[0];
  if(!file) return;
  var isExcel = /\.xlsx?$/i.test(file.name);
  var reader = new FileReader();
  reader.onload = function(e){
    if(isExcel){
      if(typeof XLSX === "undefined"){
        crmImportPending = null; crmImportWorkbook = null;
        alert("Biblioteka do czytania plikГіw Excela jeszcze siДҷ nie zaЕӮadowaЕӮa вҖ” odЕӣwieЕј stronДҷ i sprГіbuj ponownie.");
        renderAll();
        return;
      }
      var wb = XLSX.read(e.target.result, {type:"array"});
      crmImportWorkbook = {wb:wb, fileName:file.name};
      crmImportPending = null;
    } else {
      var rows = crmParseCSV(String(e.target.result || ""));
      crmImportWorkbook = null;
      if(!rows.length){ crmImportPending = null; renderAll(); return; }
      var headerRow = rows[0];
      var dataRows = rows.slice(1);
      crmImportPending = {headerRow:headerRow, dataRows:dataRows, map:crmMapColumns(headerRow), fileName:file.name};
    }
    renderAll();
  };
  if(isExcel) reader.readAsArrayBuffer(file); else reader.readAsText(file, "UTF-8");
  ev.target.value = "";
}

function crmPickSheet(sheetName){
  if(!crmImportWorkbook) return;
  var ws = crmImportWorkbook.wb.Sheets[sheetName];
  var fileLabel = crmImportWorkbook.fileName + " вҖ” " + sheetName;
  if(!ws || !ws['!ref']){ crmImportWorkbook = null; renderAll(); return; }
  var range = XLSX.utils.decode_range(ws['!ref']);
  var rows = [];
  for(var R=range.s.r; R<=range.e.r; R++){
    var row = []; var anyVal = false;
    for(var C=range.s.c; C<=range.e.c; C++){
      var cell = ws[XLSX.utils.encode_cell({r:R,c:C})];
      var val = "";
      if(cell){
        if(cell.l && cell.l.Target) val = cell.l.Target;
        else if(cell.v!=null) val = String(cell.v);
        if(val && val.trim()!=="") anyVal = true;
      }
      row.push(val);
    }
    if(anyVal) rows.push(row);
  }
  crmImportWorkbook = null;
  if(!rows.length){ crmImportPending = null; renderAll(); return; }
  var headerRow = rows[0];
  var dataRows = rows.slice(1);
  crmImportPending = {headerRow:headerRow, dataRows:dataRows, map:crmMapColumns(headerRow), fileName:fileLabel};
  renderAll();
}

function crmFilterMatch(c, filter){
  if(!c || c.deletedAt) return false;
  if(filter==="all") return true;
  if(filter==="untagged") return !c.status;
  return c.status === filter;
}
function crmFindIndex(fromIndex, dir, filter){
  var list = state.crmContacts;
  var n = list.length;
  if(!n) return -1;
  var i = fromIndex;
  for(var steps=0; steps<n; steps++){
    i += dir;
    if(i<0) i = n-1;
    if(i>=n) i = 0;
    if(crmFilterMatch(list[i], filter)) return i;
  }
  return crmFilterMatch(list[fromIndex], filter) ? fromIndex : -1;
}

function crmUrl(v, kind){
  v = (v||"").trim();
  if(!v) return "";
  if(/^(link|brak|-|n\/a|nd|brak danych)$/i.test(v)) return "";
  if(/^https?:\/\//i.test(v)) return v;
  if(kind==="ig") return "https://instagram.com/"+encodeURIComponent(v.replace(/^@/,""));
  if(kind==="fb") return "https://facebook.com/"+encodeURIComponent(v);
  if(kind==="website"){
    if(/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(v)) return "https://"+v.replace(/^\/+/, "");
    return "";
  }
  return v;
}

function crmDaysSince(c){
  var base = c.lastContact || c.taggedAt || c.importedAt;
  if(!base) return Infinity;
  var d = new Date(base+"T00:00:00");
  if(isNaN(d)) return Infinity;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}
function crmPriorityBuckets(){
  var buckets = {hot:[], reaktywacja:[], followup:[], nowe:[]};
  crmActiveContacts().forEach(function(c){
    if(c.status==="klient" || c.status==="odrzucili") return;
    if(c.hot){ buckets.hot.push(c); return; }
    if(!c.status){ buckets.nowe.push(c); return; }
    if(c.status==="w_rozmowie"){ buckets.followup.push(c); return; }
    if(c.status==="ucichlo" || c.status==="brak_odpowiedzi"){ buckets.reaktywacja.push(c); return; }
  });
  buckets.nowe.sort(function(a,b){ return (a.importedAt||"").localeCompare(b.importedAt||"") || a.name.localeCompare(b.name); });
  buckets.followup.sort(function(a,b){ return crmDaysSince(b) - crmDaysSince(a); });
  buckets.hot.sort(function(a,b){ return crmDaysSince(b) - crmDaysSince(a); });
  buckets.reaktywacja.sort(function(a,b){
    var rank = {ucichlo:0, brak_odpowiedzi:1};
    var ra = rank[a.status], rb = rank[b.status];
    if(ra !== rb) return ra - rb;
    return crmDaysSince(b) - crmDaysSince(a);
  });
  return buckets;
}

function crmDailyBriefing(){
  var items = [];
  crmActiveContacts().forEach(function(c){
    if(c.status==="klient" || c.status==="odrzucili") return;
    var days = crmDaysSince(c);
    if(c.hot && days>=2){
      items.push({tier:0, days:days, id:c.id, text:'рҹ”Ҙ <b style="color:#fff">'+escapeHtml(c.name)+'</b> вҖ” blisko zamkniДҷcia, cisza od '+days+' dni. ZadzwoЕ„ albo napisz do niego dziЕӣ.'});
    } else if(c.status==="w_rozmowie" && days>=4){
      items.push({tier:1, days:days, id:c.id, text:'<b style="color:#fff">'+escapeHtml(c.name)+'</b> вҖ” zrГіb follow-up: rozmowa w toku, cisza od '+days+' dni.'});
    } else if(c.status==="ucichlo" && days>=10){
      items.push({tier:2, days:days, id:c.id, text:'<b style="color:#fff">'+escapeHtml(c.name)+'</b> вҖ” reaktywuj: odpisali, ale ucichЕӮo juЕј '+days+' dni temu.'});
    } else if(c.status==="brak_odpowiedzi" && days>=5){
      items.push({tier:2, days:days, id:c.id, text:'<b style="color:#fff">'+escapeHtml(c.name)+'</b> вҖ” ponГіw kontakt: brak odpowiedzi od '+days+' dni.'});
    }
  });
  items.sort(function(a,b){ return (a.tier-b.tier) || (b.days-a.days); });
  return {items:items, noweCount:crmPriorityBuckets().nowe.length};
}
