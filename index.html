<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediaDGtal — Workspace</title>
<meta name="description" content="MediaDGtal — prywatny workspace do prowadzenia agencji">
<style>
  :root{
    --sidebar-bg:#16151a; --bg:#1e1c22; --active-bg:#25232c;
    --accent:#cf9b4a; --accent-2:#d9914e; --accent-dim:#8a6a35;
    --pink:#c77398; --pink-bg:#33222a;
    --tool4arts-bg:#342c1f; --tool4arts-text:#cf9b4a;
    --rozwoj-bg:#322419; --rozwoj-text:#e0954a;
    --admin-text:#837a82; --admin-bg:#2a2830;
    --muted:#8a8390; --muted-light:#c5bec3;
    --danger:#d1636f;
    --border:#2a2830; --text:#f0eef2;
    --radius:12px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); display:flex; min-height:100vh; overflow-x:hidden;
    font-size:14px;
  }
  a{color:inherit}
  button{font-family:inherit; cursor:pointer}
  input,select,textarea{font-family:inherit; font-size:13.5px}

  /* ---- Sidebar ---- */
  #sidebar{
    width:230px; flex:0 0 230px; background:var(--sidebar-bg); color:var(--muted-light);
    display:flex; flex-direction:column; padding:20px 14px; gap:4px; border-right:1px solid var(--border);
  }
  #sidebar .brand{ padding:2px 4px 22px 4px; }
  #sidebar .brand img{ width:100%; height:auto; display:block; }
  .navitem{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:9px;
    color:var(--muted-light); text-decoration:none; font-size:13.5px; border:none; background:transparent; width:100%; text-align:left;
  }
  .navitem:hover{background:rgba(255,255,255,.04); color:#fff}
  .navitem.active{background:var(--active-bg); color:#fff; font-weight:600}
  .navitem .ico{width:18px; text-align:center; opacity:.85; font-size:13px}
  .sidebar-footer{
    margin-top:auto; padding-top:16px; border-top:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .avatar{
    width:34px; height:34px; border-radius:50%; flex:0 0 34px;
    background:linear-gradient(135deg,#dc9d6b,#d38b7d);
    display:flex; align-items:center; justify-content:center; color:#241a14; font-weight:700; font-size:12.5px;
  }
  .sidebar-footer .who{font-size:13px; color:#fff; font-weight:600}
  .sidebar-footer .handle{font-size:11.5px; color:var(--muted)}

  /* ---- Main ---- */
  #main{flex:1; min-width:0; display:flex; flex-direction:column}
  #topbar{
    display:flex; align-items:center; justify-content:space-between; padding:20px 30px 16px;
  }
  #topbar .eyebrow{font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:4px}
  #topbar h1{font-size:24px; margin:0; font-weight:700; color:#fff}
  #content{padding:0 30px 60px; flex:1}

  .grid{display:grid; gap:16px}
  .grid-2{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  .grid-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:1100px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}}

  .card{
    background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 20px; box-shadow:var(--shadow);
  }
  .card h3{margin:0 0 12px; font-size:12px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.05em}
  .stat-value{font-size:30px; font-weight:700; color:#fff}
  .stat-sub{font-size:11.5px; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:.03em}
  .stat-sub.up{color:var(--accent)}
  .hero-greet{font-size:26px; font-style:italic; font-family:Georgia,'Times New Roman',serif; margin:0 0 4px; color:#fff}
  .hero-date{color:var(--muted); font-size:13px}

  .weather-widget{margin-top:16px}
  .weather-now{display:flex; align-items:center; gap:10px; margin-bottom:12px}
  .weather-now .w-emoji{font-size:28px}
  .weather-now .w-temp{font-size:24px; font-weight:700; color:#fff}
  .weather-now .w-desc{color:var(--muted); font-size:13px}
  .weather-week{display:flex; gap:8px; flex-wrap:wrap}
  .weather-day{background:var(--sidebar-bg); border:1px solid var(--border); border-radius:8px; padding:8px 10px; text-align:center; min-width:64px}
  .weather-day .wd-name{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; margin-bottom:4px}
  .weather-day .wd-emoji{font-size:18px; margin-bottom:4px}
  .weather-day .wd-temp{font-size:12px; color:var(--muted-light)}

  .chip{
    display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:999px;
    background:transparent; color:var(--muted-light); font-size:12.5px; border:1px solid var(--border); cursor:pointer; user-select:none;
  }
  .chip.active{background:var(--accent); color:#241a0a; border-color:var(--accent); font-weight:600}
  .chiprow{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center}

  .btn{
    background:var(--accent); color:#241a0a; border:none; border-radius:8px; padding:9px 16px;
    font-size:13px; font-weight:700;
  }
  .btn:hover{background:var(--accent-2)}
  .btn.secondary{background:transparent; color:var(--muted-light); border:1px solid var(--border)}
  .btn.secondary:hover{border-color:var(--accent); color:#fff}
  .btn.small{padding:6px 11px; font-size:12px}
  .btn.danger{background:transparent; color:var(--danger); border:1px solid var(--border)}

  table{width:100%; border-collapse:collapse; font-size:13px}
  th{text-align:left; color:var(--muted); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding:8px 10px; border-bottom:1px solid var(--border)}
  td{padding:10px 10px; border-bottom:1px solid var(--border); color:var(--muted-light)}
  tr:last-child td{border-bottom:none}

  .tag{padding:2px 9px; border-radius:999px; font-size:11px; font-weight:600; display:inline-block}
  .tag-MediaDGtal{background:var(--pink-bg); color:var(--pink)}
  .tag-tool4arts{background:var(--tool4arts-bg); color:var(--tool4arts-text); border:1px solid rgba(207,155,74,.25)}
  .tag-Rozwoj{background:var(--rozwoj-bg); color:var(--rozwoj-text)}
  .tag-Admin{background:var(--admin-bg); color:var(--admin-text)}
  .tag-Osobiste{background:#20302a; color:#63b58a}

  .stub-note{
    background:rgba(207,155,74,.08); border:1px solid rgba(207,155,74,.25); color:var(--accent);
    font-size:12px; padding:9px 13px; border-radius:8px; margin-bottom:16px;
  }

  input[type=text],input[type=number],input[type=date],input[type=time],input[type=month],select,textarea{
    padding:9px 11px; border:1px solid var(--border); border-radius:8px; background:var(--sidebar-bg); color:var(--text); width:100%;
  }
  input::placeholder{color:var(--muted)}
  select{appearance:none; -webkit-appearance:none; padding-right:26px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238a8390'/></svg>");
    background-repeat:no-repeat; background-position:right 10px center;}
  .row{display:flex; gap:8px; align-items:center}
  .field{display:flex; flex-direction:column; gap:4px; margin-bottom:10px}
  .field label{font-size:12px; color:var(--muted); font-weight:600}

  .kanban{display:grid; grid-template-columns:repeat(4,1fr); gap:14px}
  @media(max-width:1100px){.kanban{grid-template-columns:repeat(2,1fr)}}
  .kanban-col{background:rgba(255,255,255,.015); border:1px solid var(--border); border-radius:10px; padding:12px; min-height:120px}
  .kanban-col h4{margin:2px 4px 12px; font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; display:flex; justify-content:space-between}
  .kcard{background:var(--sidebar-bg); border:1px solid var(--border); border-radius:8px; padding:10px 11px; margin-bottom:9px; font-size:12.5px; color:var(--muted-light)}
  .kcard .kdate{font-size:10.5px; color:var(--muted); margin-top:6px}

  .tabsw{display:flex; gap:22px; margin-bottom:18px; border-bottom:1px solid var(--border)}
  .tabsw button{
    background:none; border:none; padding:0 0 10px; font-size:13px; color:var(--muted);
    border-bottom:2px solid transparent; font-weight:600;
  }
  .tabsw button.active{color:#fff; border-color:var(--accent)}

  .colcols{display:grid; grid-template-columns:repeat(3,1fr); gap:16px}
  @media(max-width:1000px){.colcols{grid-template-columns:1fr}}
  .col-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-weight:700}
  .col-head b{color:var(--muted-light); font-weight:700}
  .taskitem{display:flex; align-items:center; gap:9px; padding:8px 4px; border-bottom:1px solid var(--border)}
  .taskitem:last-child{border-bottom:none}
  .taskitem.done .ttitle{text-decoration:line-through; color:var(--muted)}
  .taskitem input[type=checkbox]{width:15px; height:15px; accent-color:var(--accent)}
  .ttitle{flex:1; font-size:13px; color:var(--muted-light)}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--accent-2); flex:0 0 6px}
  .taskmeta{display:flex; align-items:center; gap:8px}
  .linklike{font-size:11.5px; color:var(--muted-light); text-decoration:none; background:none; border:none; padding:0}
  .linklike:hover{color:#fff}
  .linklike.danger{color:var(--danger)}

  .habitrow{display:flex; align-items:center; gap:14px; padding:12px 4px; border-bottom:1px solid var(--border)}
  .habitrow:last-child{border-bottom:none}
  .habitname{flex:1; font-size:13.5px; color:var(--muted-light); font-weight:600}
  .habitpct{font-size:11.5px; color:var(--muted); width:110px; text-align:right}
  .habitstreak{font-size:11.5px; color:var(--accent); width:100px; text-align:right; font-weight:600}
  .weekdots{display:flex; gap:5px}
  .weekdots .wd{width:22px; text-align:center}
  .weekdots .wd .lbl{font-size:9px; color:var(--muted); margin-bottom:3px}
  .weekdots .wd input{width:15px; height:15px; accent-color:var(--accent)}
  .dash-habit{display:flex; align-items:center; gap:9px; padding:6px 0}
  .dash-habit input{accent-color:var(--accent)}
  .dash-habit .n{flex:1; font-size:13px; color:var(--muted-light)}
  .dash-habit .s{font-size:11.5px; color:var(--accent); font-weight:600}

  .notif{display:flex; gap:11px; padding:11px 4px; border-bottom:1px solid var(--border)}
  .notif:last-child{border-bottom:none}
  .notif .dot2{width:7px; height:7px; border-radius:50%; background:var(--accent); margin-top:5px; flex:0 0 7px}
  .notif .dot2.read{background:transparent; border:1px solid var(--border)}
  .notif .ntext{font-size:13px; color:var(--muted-light)}
  .notif .ntime{font-size:11px; color:var(--muted); margin-top:2px}

  .acc-switch{display:flex; gap:8px; margin-bottom:22px; align-items:center; flex-wrap:wrap}
  .acc-switch select{width:auto; min-width:170px}

  .prof-row{display:flex; align-items:center; gap:14px; margin-bottom:22px}
  .prof-row .avatar{width:52px; height:52px; flex:0 0 52px; font-size:15px}
  .prof-name{font-size:17px; font-weight:700; color:#fff}
  .prof-bio{font-size:12.5px; color:var(--muted); margin-top:2px}

  .kpi-row{display:flex; gap:46px; margin-bottom:22px; flex-wrap:wrap}
  .kpi-row .k-value{font-size:26px; font-weight:700; color:#fff}
  .kpi-row .k-value.accent{color:var(--accent)}
  .kpi-row .k-label{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:3px}

  .measure-row{display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap}
  .measure-row input[type=date]{width:150px}
  .measure-row input[type=number]{width:130px}
  .measure-row .goalwrap{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted)}
  .measure-row .goalwrap input{width:80px}

  .progress-label{display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin-bottom:6px}
  .habit-bar{height:7px; border-radius:5px; background:var(--sidebar-bg); overflow:hidden; margin-bottom:22px}
  .habit-bar > div{height:100%; background:var(--accent); border-radius:5px}

  .empty{color:var(--muted); font-size:13px; padding:16px 4px}

  #cmdbox{display:flex; gap:10px; margin-bottom:14px}
  #cmdbox input{flex:1}

  .cal-legend{display:flex; gap:16px; flex-wrap:wrap; margin-bottom:18px}
  .cal-legend span{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted)}
  .cal-legend i{width:8px; height:8px; border-radius:50%; display:inline-block}

  .cal-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
  .cal-header h2{font-size:15px; font-weight:700; color:#fff; margin:0}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden}
  .cal-dow{background:var(--sidebar-bg); color:var(--muted); font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; text-align:center; padding:8px 0; font-weight:700}
  .cal-cell{background:var(--bg); min-height:88px; padding:7px; position:relative}
  .cal-cell.out{opacity:.35}
  .cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--accent); border-radius:4px}
  .cal-daynum{font-size:12px; color:var(--muted-light); margin-bottom:5px}
  .cal-ev{font-size:10.5px; padding:2px 5px; border-radius:4px; margin-bottom:3px; color:#161519; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

  .ideas-box{margin-top:22px}
  .ideas-input-row{display:flex; gap:10px; margin-bottom:10px}
  .idea-item{padding:9px 4px; border-bottom:1px solid var(--border); font-size:13px; color:var(--muted-light)}
  .idea-item:last-child{border-bottom:none}

  ::-webkit-scrollbar{width:10px; height:10px}
  ::-webkit-scrollbar-thumb{background:#333038; border-radius:6px}

  #authGate{
    position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center;
    background:var(--sidebar-bg); color:var(--text); flex-direction:column; gap:16px; text-align:center; padding:20px;
  }
  #authGate.hidden{display:none}
  #authGate .gatecard{max-width:360px}
  #authGate h2{margin:0 0 8px; font-size:20px}
  #authGate p{color:var(--muted); font-size:14px; line-height:1.5; margin:0 0 18px}
  #authGate .btn{font-size:14px}
  .sync-status{font-size:11px; color:var(--muted); margin-top:2px}
</style>
</head>
<body>
<div id="authGate">
  <div class="gatecard">
    <img src="" alt="" id="gateLogo" style="max-width:160px; margin-bottom:18px; display:none">
    <h2 id="gateTitle">Sprawdzanie logowania…</h2>
    <p id="gateText">Chwileczkę.</p>
    <button class="btn" id="gateBtn" style="display:none" onclick="__authAction && __authAction()"></button>
  </div>
</div>
<div id="sidebar">
  <div class="brand"><img id="brandLogo" alt="MediaDGtal"></div>
  <div id="navwrap"></div>
  <div class="sidebar-footer">
    <div class="avatar">DG</div>
    <div>
      <div class="who">Damian Gogulski</div>
      <div class="handle">@damian.gogulski</div>
      <div class="sync-status" id="syncStatus">Łączenie…</div>
    </div>
  </div>
</div>
<div id="main">
  <div id="topbar">
    <div>
      <div class="eyebrow">MediaDGtal</div>
      <h1 id="pageTitle">Dashboard</h1>
    </div>
    <div id="topActions"></div>
  </div>
  <div id="content"></div>
</div>

function load(){
  var raw = localStorage.getItem(STORAGE_KEY);
  var def = defaultState();
  if(!raw){ state = def; save(); return; }
  try{
    var parsed = JSON.parse(raw);
    Object.keys(def).forEach(function(k){ if(!(k in parsed)) parsed[k] = def[k]; });
    state = parsed;
  }catch(e){ state = def; }
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function currentWeekDates(){
  var d = new Date();
  var day = d.getDay(); // 0=niedziela
  var mondayOffset = day===0 ? -6 : 1-day;
  var monday = new Date(d); monday.setDate(d.getDate()+mondayOffset);
  var out = [];
  for(var i=0;i<7;i++){
    var dd = new Date(monday); dd.setDate(monday.getDate()+i);
    out.push(dd.toISOString().slice(0,10));
  }
  return out;
}

function weatherLabel(code){ return WEATHER_CODES[code] || ["Nieznane",""]; }
var WEATHER_CACHE_KEY = "mdgtal_weather_v1";
var WEATHER_MAX_AGE_MS = 30*60*1000;
function renderWeatherFromData(data){
  var el = document.getElementById("weatherWidget");
  if(!el) return;
  var now = weatherLabel(data.current.code);
  var html = '<div class="weather-now"><span class="w-emoji">'+now[1]+'</span><span class="w-temp">'+Math.round(data.current.temp)+'°C</span><span class="w-desc">'+now[0]+(data.place?" · "+escapeHtml(data.place):"")+'</span></div>';
  html += '<div class="weather-week">';
  data.daily.forEach(function(d, i){
    var lab = weatherLabel(d.code);
    var dname = i===0 ? "Dziś" : new Date(d.date).toLocaleDateString("pl-PL",{weekday:"short"});
    html += '<div class="weather-day"><div class="wd-name">'+dname+'</div><div class="wd-emoji">'+lab[1]+'</div><div class="wd-temp">'+Math.round(d.tmax)+'°/'+Math.round(d.tmin)+'°</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}
function renderWeatherError(msg, showRetry){
  var el = document.getElementById("weatherWidget");
  if(!el) return;
  el.innerHTML = '<div class="empty">'+escapeHtml(msg)+(showRetry ? ' <a href="#" onclick="loadWeather(true); return false;" style="color:var(--accent)">Spróbuj ponownie</a>' : '')+'</div>';
}
function loadWeather(forceRetry){
  var cacheRaw = localStorage.getItem(WEATHER_CACHE_KEY);
  var cache = null;
  try{ cache = cacheRaw ? JSON.parse(cacheRaw) : null; }catch(e){ cache = null; }
  if(cache && !forceRetry){ renderWeatherFromData(cache); }
  if(cache && !forceRetry && (Date.now()-cache.ts) < WEATHER_MAX_AGE_MS) return;
  if(!navigator.geolocation){ if(!cache) renderWeatherError("Twoja przeglądarka nie wspiera geolokalizacji.", false); return; }
  if(!cache) renderWeatherError("Pobieranie lokalizacji…", false);
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    var url = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+
      "&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7";
    fetch(url).then(function(r){ return r.json(); }).then(function(j){
      var place = null;
      fetch("https://geocoding-api.open-meteo.com/v1/reverse?latitude="+lat+"&longitude="+lon+"&language=pl&count=1")
        .then(function(r){ return r.json(); }).then(function(g){
          if(g && g.results && g.results[0]) place = g.results[0].name;
        }).catch(function(){})
        .finally(function(){
          var data = {
            ts: Date.now(),
            place: place,
            current: {temp: j.current.temperature_2m, code: j.current.weather_code},
            daily: j.daily.time.map(function(date, i){
              return {date: date, tmax: j.daily.temperature_2m_max[i], tmin: j.daily.temperature_2m_min[i], code: j.daily.weather_code[i]};
            })
          };
          localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify(data));
          renderWeatherFromData(data);
        });
    }).catch(function(){
      if(!cache) renderWeatherError("Nie udało się pobrać pogody.", true);
    });
  }, function(err){
    if(!cache) renderWeatherError(err.code===1 ? "Brak zgody na lokalizację — włącz ją w ustawieniach przeglądarki." : "Nie udało się ustalić lokalizacji.", true);
  }, {timeout:10000, maximumAge:600000});
}
function goalBar(label, val, goal){
  var pct = Math.min(100, Math.round((val/goal)*100));
  return '<div style="margin-bottom:14px"><div class="progress-label"><span>'+escapeHtml(label)+'</span><span>'+val+' / '+goal+'</span></div>'+
    '<div class="habit-bar" style="margin-bottom:0"><div style="width:'+pct+'%"></div></div></div>';
}
function eventRow(e){
  var cal = state.calendars.filter(function(c){ return c.name===e.calendar; })[0] || {color:"#8a8390"};
  return '<div class="taskitem"><span class="dot" style="background:'+cal.color+'"></span><span class="ttitle">'+
    fmtDate(e.date)+(e.time?" · "+e.time:"")+" — "+escapeHtml(e.title)+'</span></div>';

function milestoneGoal(followers){

}
function needsWeeklyUpdate(acc){

  if(!lastDate) return true;
  var days = Math.floor((new Date(todayStr()) - new Date(lastDate)) / 86400000);
  return new Date().getDay()===1 || days>=7;

function renderSocial(el, platform){

  html += '<button class="btn secondary small" onclick="refreshAcc()">⟳ Odśwież</button></div>';

  var last = acc.stats[acc.stats.length-1].followers;
  var prev = acc.stats.length>1 ? acc.stats[acc.stats.length-2].followers : last;
  var change = last - prev;
  var goal = milestoneGoal(last);

  html += '<div class="prof-row"><div class="avatar">'+acc.initials+'</div><div>'+
    '<div class="prof-name">'+escapeHtml(platform==="instagram"?acc.handle:acc.name)+'</div>'+
    '<div class="prof-bio">'+escapeHtml(acc.bio)+'</div></div></div>';

  html += '<div class="kpi-row">'+
    '<div><div class="k-value">'+last+'</div><div class="k-label">Obserwujący (ostatni wpis)</div></div>'+
    '<div><div class="k-value accent">'+(change>=0?"+":"")+change+'</div><div class="k-label">Zmiana od poprzedniego wpisu</div></div>'+
    '<div><div class="k-value">'+acc.stats.length+'</div><div class="k-label">Zapisanych pomiarów</div></div>'+
    '</div>';

  if(needsWeeklyUpdate(acc)){
    html += '<div class="stub-note" style="background:rgba(207,155,74,.14)"><b>Czas zaktualizować obserwujących</b> — ostatni wpis: '+fmtDate(acc.stats[acc.stats.length-1].date)+'. '+
      '<span class="measure-row" style="display:inline-flex; gap:8px; margin-top:8px">'+

      '<button class="btn small" onclick="saveMeasurement(\''+platform+'\')">Zapisz</button></span></div>';
  }

  html += '<div class="progress-label"><span>Postęp do kolejnego kamienia milowego</span><span>'+last+' / '+goal+' obserwujących</span></div>';
  html += '<div class="habit-bar"><div style="width:'+Math.min(100,Math.round(last/goal*100))+'%"></div></div>';

  var enriched = acc.stats.map(function(s,i){
    var prevF = i>0 ? acc.stats[i-1].followers : s.followers;

  });

  var weekDates = currentWeekDates();
  var weekPlan = state.contentCalendar.filter(function(c){ return c.brand===brand && weekDates.indexOf(c.date)!==-1; })

function filterStatsByRange(stats, range){
  var days = {tydzien:7, miesiac:31, kwartal:93, rok:366}[range] || 366;
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-days);
  var cutoffStr = cutoff.toISOString().slice(0,10);
  var filtered = stats.filter(function(s){ return s.date >= cutoffStr; });
  return filtered.length ? filtered : stats.slice(-1);
}
function lineChart(stats){
  var w=1200, h=220, pad=10;
  var vals = stats.map(function(s){return s.followers;});
  var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  if(min===max){ min -= 1; max += 1; }
  var stepX = (w-pad*2)/(stats.length-1 || 1);
  var pts = stats.map(function(s,i){
    var x = pad + i*stepX;
    var y = h-pad - ((s.followers-min)/(max-min))*(h-pad*2);
    return [x,y];
  });
  var line = pts.map(function(p,i){ return (i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
  var area = line + " L"+pts[pts.length-1][0].toFixed(1)+","+(h-pad)+" L"+pts[0][0].toFixed(1)+","+(h-pad)+" Z";
  var gid = "grad"+Math.random().toString(36).slice(2,7);
  var last = pts[pts.length-1];
  var dots = stats.map(function(s,i){
    var deltaTxt = (s.delta>=0?"+":"")+s.delta;
    var title = "Tydzień "+fmtDate(s.date)+": "+s.followers+" obserwujących ("+deltaTxt+" vs poprzedni tydzień)";
    return '<circle cx="'+pts[i][0].toFixed(1)+'" cy="'+pts[i][1].toFixed(1)+'" r="9" fill="transparent" stroke="none"><title>'+escapeHtml(title)+'</title></circle>';
  }).join("");
  return '<div class="card" style="padding:20px 20px 6px"><svg viewBox="0 0 '+w+' '+h+'" style="width:100%; height:180px; display:block">'+
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#cf9b4a" stop-opacity="0.35"/><stop offset="100%" stop-color="#cf9b4a" stop-opacity="0"/>'+
    '</linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#'+gid+')" stroke="none"/>'+
    '<path d="'+line+'" fill="none" stroke="#cf9b4a" stroke-width="2.5"/>'+
    '<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="4" fill="#cf9b4a"/>'+
    dots+
    '</svg></div>';
}

          '</div>';
      });

function renderZadaniaBaza(){
  var years = {};
  state.tasks.forEach(function(t){
    var d = t.completedAt || t.createdAt;
    if(d) years[d.slice(0,4)] = true;
  });
  var yearList = Object.keys(years).sort().reverse();
  var yearEl = document.getElementById("bazaYearFilter");
  var yearFilter = yearEl ? yearEl.value : "";

  var html = '<div class="chiprow" style="justify-content:flex-end"><select id="bazaYearFilter" onchange="renderAll()" style="width:auto">'+
    '<option value="">Wszystkie lata</option>'+
    yearList.map(function(y){ return '<option value="'+y+'"'+(y===yearFilter?" selected":"")+'>'+y+'</option>'; }).join("")+
    '</select></div>';

  var items = state.tasks.filter(function(t){
    if(!yearFilter) return true;
    var d = t.completedAt || t.createdAt;
    return d && d.slice(0,4)===yearFilter;
  }).sort(function(a,b){
    var da = a.completedAt || a.createdAt || "", db = b.completedAt || b.createdAt || "";
    return da < db ? 1 : -1;
  });

  var scopeLabel = {dzien:"Dziś", tydzien:"Tydzień", miesiac:"Miesiąc"};
  html += '<div class="card"><table><thead><tr><th>Zadanie</th><th>Kategoria</th><th>Zakres</th><th>Status</th><th>Data</th></tr></thead><tbody>';
  if(!items.length){ html += '<tr><td colspan="5"><div class="empty">Brak zadań dla wybranego okresu.</div></td></tr>'; }
  items.forEach(function(t){
    html += '<tr><td>'+escapeHtml(t.title)+'</td>'+
      '<td><span class="tag tag-'+t.category+'">'+CATEGORY_LABEL[t.category]+'</span></td>'+
      '<td>'+(scopeLabel[t.scope]||t.scope)+'</td>'+
      '<td>'+(t.done ? "Ukończone" : "Otwarte")+'</td>'+
      '<td>'+fmtDate(t.completedAt || t.createdAt)+'</td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

/* ================= KALENDARZ ================= */
function renderKalendarz(el){
  var now = new Date();
  if(calMonth===undefined){ calMonth = now.getMonth(); calYear = now.getFullYear(); }
  setTopActions('<button class="btn" onclick="promptAddEvent()">+ Wydarzenie</button>');

  var html = '<div id="cmdbox"><input type="text" id="nlpInput" placeholder=\'np. dodaj spotkanie z Martą 10.07. godz. 12:00, Plaza Poznań, kalendarz "wspólny"\'>'+
    '<button class="btn" onclick="submitNlp()">Dodaj</button></div>';
  html += '<div class="stub-note">Kalendarz lokalny — synchronizacja z Google Calendar pojawi się po migracji na hosting.</div>';

  html += '<div class="cal-legend">';
  state.calendars.forEach(function(c){
    html += '<span><i style="background:'+c.color+'"></i>'+escapeHtml(c.name)+'</span>';
  });
  html += '</div>';

  html += '<div class="cal-header"><button class="btn secondary small" onclick="calNav(-1)">← Poprzedni</button>'+
    '<h2>'+monthName(calMonth)+' '+calYear+'</h2>'+
    '<button class="btn secondary small" onclick="calNav(1)">Następny →</button></div>';

  html += '<div class="cal-grid">';
  WEEKDAYS_SHORT.forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });

  var first = new Date(calYear, calMonth, 1);
  var startOffset = (first.getDay()+6)%7; // Monday=0
  var gridStart = new Date(calYear, calMonth, 1-startOffset);
  var today = todayStr();
  for(var i=0;i<42;i++){
    var d = new Date(gridStart); d.setDate(gridStart.getDate()+i);
    var dstr = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    var inMonth = d.getMonth()===calMonth;
    var isToday = dstr===today;
    var dayEvents = state.events.filter(function(e){ return e.date===dstr; });
    html += '<div class="cal-cell'+(inMonth?"":" out")+(isToday?" today":"")+'"><div class="cal-daynum">'+d.getDate()+'</div>';
    dayEvents.forEach(function(e){
      var cal = state.calendars.filter(function(c){return c.name===e.calendar;})[0] || {color:"#8a8390"};
      html += '<div class="cal-ev" style="background:'+cal.color+'" title="'+escapeHtml(e.title)+'">'+escapeHtml(e.title)+'</div>';
    });
    html += '</div>';
    if(i===41) break;
  }
  html += '</div>';

  el.innerHTML = html;
}
function calNav(dir){
  calMonth += dir;
  if(calMonth<0){ calMonth=11; calYear--; }
  if(calMonth>11){ calMonth=0; calYear++; }
  renderAll();
}
function parseEventCommand(text){
  var res = {title:null, date:null, time:null, location:null, calendar:"Osobiste"};
  var t = text.trim();
  t = t.replace(/^dodaj\s+(spotkanie|wydarzenie)\s+z\s+/i, "spotkanie z ");
  var dateMatch = t.match(/(\d{1,2})\.(\d{1,2})\.?/);
  if(dateMatch){
    var day = parseInt(dateMatch[1],10), month = parseInt(dateMatch[2],10);
    var year = new Date().getFullYear();
    res.date = year+"-"+String(month).padStart(2,"0")+"-"+String(day).padStart(2,"0");
  }
  var timeMatch = t.match(/godz\.?\s*(\d{1,2}):(\d{2})/i);
  if(timeMatch){ res.time = String(timeMatch[1]).padStart(2,"0")+":"+timeMatch[2]; }
  var calMatch = t.match(/kalendarz\s+"([^"]+)"/i);
  if(calMatch){
    var name = calMatch[1];
    var found = state.calendars.filter(function(c){ return c.name.toLowerCase()===name.toLowerCase(); })[0];
    res.calendar = found ? found.name : (name.charAt(0).toUpperCase()+name.slice(1));
  }
  var withMatch = t.match(/z\s+([A-ZŻŹĆĄŚĘŁÓŃ][a-ząćęłńóśźż]+(?:\s+[A-ZŻŹĆĄŚĘŁÓŃ][a-ząćęłńóśźż]+)?)/);
  var locMatch = t.match(/,\s*([A-ZŻŹĆĄŚĘŁÓŃ][^,]*?)(?:,\s*kalendarz|$)/);
  if(locMatch){ res.location = locMatch[1].trim(); }

  var titleParts = ["Spotkanie"];
  if(withMatch){ titleParts.push("z "+withMatch[1]); }
  res.title = titleParts.join(" ");
  return res;
}
function submitNlp(){
  var val = document.getElementById("nlpInput").value;
  if(!val.trim()) return;
  var parsed = parseEventCommand(val);
  if(!parsed.date){ alert("Nie udało się rozpoznać daty w komendzie."); return; }
  state.events.push({id:uid("ev"), title:parsed.title, date:parsed.date, time:parsed.time, location:parsed.location, calendar:parsed.calendar});
  save();
  document.getElementById("nlpInput").value = "";
  renderAll();
}
function promptAddEvent(){
  var title = prompt("Tytuł wydarzenia:"); if(!title) return;
  var date = prompt("Data (RRRR-MM-DD):", todayStr()); if(!date) return;
  var time = prompt("Godzina (GG:MM), opcjonalnie:", "");
  state.events.push({id:uid("ev"), title:title, date:date, time:time||null, location:null, calendar:"Osobiste"});
  save(); renderAll();
}

function renderNawyki(el){
  setTopActions('<button class="btn" onclick="addHabit()">+ Nawyk</button>');

    html += '<div class="habitrow"><div class="habitname">'+escapeHtml(h.name)+'</div>'+

      '<div class="habitstreak">🔥 '+h.streak+' dni z rzędu</div>'+
      '<div class="weekdots">'+HABIT_WEEK_ORDER.map(function(d){
        return '<div class="wd"><div class="lbl">'+d+'</div><input type="checkbox" '+(h.week[d]?"checked":"")+' onchange="toggleHabitDay(\''+h.id+'\',\''+d+'\')"></div>';
      }).join("")+'</div>'+

function toggleHabitDay(id, day){
  var h = state.habits.filter(function(x){return x.id===id;})[0];
  h.week[day] = !h.week[day];
  if(h.week[day]) h.streak++; else h.streak = Math.max(0,h.streak-1);
  save(); renderAll();
}
function addHabit(){
  var name = prompt("Nazwa nawyku:");
  if(!name) return;
  var week = {}; HABIT_WEEK_ORDER.forEach(function(d){week[d]=false;});
  state.habits.push({id:uid("hab"), name:name, historyPercent:0, streak:0, week:week});
  save(); renderAll();
}
function deleteHabit(id){
  state.habits = state.habits.filter(function(h){return h.id!==id;});
  save(); renderAll();
}

/* ================= STATYSTYKI ================= */
function renderStatystyki(el){
  var now = new Date();
  var html = '<div class="chiprow">';
  ["miesiac","rok"].forEach(function(p){
    var labels = {miesiac:"Miesiąc", rok:"Rok"};
    html += '<span class="chip'+(statPeriod===p?" active":"")+'" onclick="setStatPeriod(\''+p+'\')">'+labels[p]+'</span>';
  });
  if(statPeriod==="miesiac"){
    html += '<input type="month" id="statMonthInput" value="'+now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,"0")+'" onchange="renderAll()" style="width:auto; margin-left:10px">';
  } else {
    html += '<input type="number" id="statYearInput" value="'+now.getFullYear()+'" min="2020" max="2100" onchange="renderAll()" style="width:100px; margin-left:10px">';
  }
  html += '</div>';

  var cats = ["Wszystko","Cele","Zadania","Nawyki","Finanse","Posty","Instagram","Facebook"];
  html += '<div class="chiprow">';
  cats.forEach(function(c){
    html += '<span class="chip'+(statCats[c]?" active":"")+'" onclick="toggleStatCat(\''+c+'\')">'+c+'</span>';
  });
  html += '</div>';

  var periodKey, rangeLabel, matchesPeriod;
  if(statPeriod==="miesiac"){
    var monthInput = document.getElementById("statMonthInput");
    var ym = monthInput ? monthInput.value : (now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0"));
    var parts = ym.split("-"); var y = parseInt(parts[0],10), m = parseInt(parts[1],10);
    var start = y+"-"+String(m).padStart(2,"0")+"-01";
    var lastDay = new Date(y, m, 0).getDate();
    var end = y+"-"+String(m).padStart(2,"0")+"-"+lastDay;
    periodKey = ym;
    rangeLabel = monthName(m-1)+' '+y+'</b> ('+start+' → '+end+')';
    matchesPeriod = function(dateStr){ return dateStr && dateStr.slice(0,7)===ym; };
  } else {
    var yearInput = document.getElementById("statYearInput");
    var yr = yearInput ? yearInput.value : String(now.getFullYear());
    periodKey = yr;
    rangeLabel = 'Rok '+yr+'</b> ('+yr+'-01-01 → '+yr+'-12-31)';
    matchesPeriod = function(dateStr){ return dateStr && dateStr.slice(0,4)===yr; };
  }
  html += '<div style="color:var(--muted); font-size:12.5px; margin-bottom:16px">Zakres: <b style="color:var(--muted-light)">'+rangeLabel+'</div>';

  var showAll = statCats["Wszystko"];
  html += '<div class="grid grid-2">';

  if(showAll || statCats["Cele"]){
    var ig1 = state.igAccounts[0];
    html += '<div class="card"><h3>Cele</h3>'+goalBar("Instagram "+ig1.handle, ig1.stats[ig1.stats.length-1].followers, ig1.goal)+goalBar("tool4arts — klienci",0,100)+'</div>';
  }
  if(showAll || statCats["Zadania"]){
    var periodTasksCreated = state.tasks.filter(function(t){ return matchesPeriod(t.createdAt); });
    var doneInPeriod = state.tasks.filter(function(t){ return matchesPeriod(t.completedAt); });
    html += '<div class="card"><h3>Zadania</h3><table>'+
      '<tr><td>Ukończone w okresie</td><td style="text-align:right">'+doneInPeriod.length+'</td></tr>'+
      '<tr><td>Utworzone w okresie</td><td style="text-align:right">'+periodTasksCreated.length+'</td></tr>'+
      '<tr><td>Aktualnie otwarte (wszystkie)</td><td style="text-align:right">'+state.tasks.filter(function(t){return !t.done;}).length+'</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Nawyki"]){
    html += '<div class="card"><h3>Nawyki</h3>';
    state.habits.forEach(function(h){
      html += '<div style="display:flex; justify-content:space-between; padding:6px 0; font-size:13px; color:var(--muted-light)"><span>'+escapeHtml(h.name)+'</span><b>'+h.historyPercent+'%</b></div>';
    });
    html += '</div>';
  }
  if(showAll || statCats["Finanse"]){
    var finRows = statPeriod==="miesiac"
      ? state.finance.filter(function(f){return f.month===periodKey;})
      : state.finance.filter(function(f){return f.month && f.month.slice(0,4)===periodKey;});
    var fin = finRows.reduce(function(acc,f){
      acc.revenue += f.revenue; acc.bizCost += f.bizCost; acc.personalCost += f.personalCost; acc.target = f.target;
      return acc;
    }, {revenue:0,bizCost:0,personalCost:0,target:20000});
    var income = fin.revenue - fin.bizCost - fin.personalCost;
    html += '<div class="card"><h3>Finanse</h3><table>'+
      '<tr><td>Przychody</td><td style="text-align:right">'+fin.revenue+' zł</td></tr>'+
      '<tr><td>Koszty (biznes + osobiste)</td><td style="text-align:right">'+(fin.bizCost+fin.personalCost)+' zł</td></tr>'+
      '<tr><td>Dochód</td><td style="text-align:right">'+income+' zł</td></tr>'+
      '<tr><td>Cel finansowy'+(statPeriod==="rok"?" (ost. miesiąc)":"")+'</td><td style="text-align:right">'+fin.target.toLocaleString("pl-PL")+' zł</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Posty"]){
    var periodPosts = state.posts.filter(function(p){ return matchesPeriod(p.date); });
    html += '<div class="card"><h3>Posty</h3><table>'+
      '<tr><td>Opublikowane w okresie</td><td style="text-align:right">'+periodPosts.filter(function(p){return p.stage==="opublikowany";}).length+'</td></tr>'+
      '<tr><td>Wszystkie pomysły</td><td style="text-align:right">'+state.posts.filter(function(p){return p.stage==="pomysl";}).length+'</td></tr>'+
      '</table></div>';
  }
  if(showAll || statCats["Instagram"]){
    var ig = state.igAccounts[0];
    html += '<div class="card"><h3>Instagram</h3>'+lineChart(ig.stats)+'</div>';
  }
  if(showAll || statCats["Facebook"]){
    var fb = state.fbAccounts[0];
    html += '<div class="card"><h3>Facebook</h3>'+lineChart(fb.stats)+'</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}
function setStatPeriod(p){ statPeriod = p; renderAll(); }
function toggleStatCat(c){
  if(c==="Wszystko"){ statCats = {Wszystko:true}; }
  else{
    statCats.Wszystko = false;
    statCats[c] = !statCats[c];
  }
  renderAll();
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

var firebaseConfig = {
  apiKey: "AIzaSyD7vHSihsO2MYO-mNycfq5Tt6Zxf92ZbGs",
  authDomain: "mediadgtal-workspace.firebaseapp.com",
  projectId: "mediadgtal-workspace",
  storageBucket: "mediadgtal-workspace.firebasestorage.app",
  messagingSenderId: "720090374015",
  appId: "1:720090374015:web:09275e24f63f93980f844a"
};
var ALLOWED_EMAIL = "kontakt.mediadgtal@gmail.com";

var app = initializeApp(firebaseConfig);
var auth = getAuth(app);
var db = getFirestore(app);
var provider = new GoogleAuthProvider();

var gate = document.getElementById("authGate");
var gateTitle = document.getElementById("gateTitle");
var gateText = document.getElementById("gateText");
var gateBtn = document.getElementById("gateBtn");
var gateLogo = document.getElementById("gateLogo");
var syncStatusEl = document.getElementById("syncStatus");

function setSyncStatus(text){ if(syncStatusEl) syncStatusEl.textContent = text; }

function showGate(mode){
  gate.classList.remove("hidden");
  gateLogo.style.display = "";
  gateLogo.src = "data:image/png;base64," + (window.LOGO_B64 || "");
  if(mode === "loading"){
    gateTitle.textContent = "Sprawdzanie logowania…";
    gateText.textContent = "Chwileczkę.";
    gateBtn.style.display = "none";
  } else if(mode === "signin"){
    gateTitle.textContent = "MediaDGtal — Workspace";
    gateText.textContent = "To prywatny workspace Damiana. Zaloguj się przez Google, żeby wejść.";
    gateBtn.textContent = "Zaloguj się przez Google";
    gateBtn.style.display = "";
    window.__authAction = doSignIn;
  } else if(mode === "denied"){
    gateTitle.textContent = "Ten workspace jest prywatny";
    gateText.textContent = "To konto nie ma dostępu do tego workspace'u.";
    gateBtn.textContent = "Wyloguj i spróbuj innym kontem";
    gateBtn.style.display = "";
    window.__authAction = doSignOut;
  }
}
function hideGate(){ gate.classList.add("hidden"); }

function doSignIn(){
  gateText.textContent = "Otwieram okno logowania Google…";
  signInWithPopup(auth, provider).catch(function(err){
    gateText.textContent = "Logowanie nie powiodło się (" + err.code + "). Spróbuj ponownie.";
  });
}
function doSignOut(){ signOut(auth); }

var unsubscribeSnapshot = null;
var pushTimer = null;
var pendingPush = false;

function scheduleFirestorePush(){
  pendingPush = true;
  setSyncStatus("Zapisywanie…");
  if(pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(flushPush, 500);
}
function flushPush(){
  if(!pendingPush) return;
  if(pushTimer){ clearTimeout(pushTimer); pushTimer = null; }
  pendingPush = false;
  var docRef = doc(db, "workspace", "damian");
  setDoc(docRef, window.state).then(function(){
    setSyncStatus("Zsynchronizowano");
  }).catch(function(){
    setSyncStatus("Offline (tylko lokalnie)");
  });
}
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "hidden") flushPush();
});
window.addEventListener("pagehide", flushPush);

function startSync(){
  var originalSave = window.save;
  window.save = function(){
    originalSave();
    scheduleFirestorePush();
  };
  var docRef = doc(db, "workspace", "damian");
  unsubscribeSnapshot = onSnapshot(docRef, function(snap){
    if(snap.exists()){
      var remote = snap.data();
      var def = window.defaultState();
      Object.keys(def).forEach(function(k){ if(!(k in remote)) remote[k] = def[k]; });
      window.state = remote;
      originalSave();
      window.renderAll();
      setSyncStatus("Zsynchronizowano");
    } else {
      setDoc(docRef, window.state).then(function(){
        setSyncStatus("Zsynchronizowano");
      });
    }
  }, function(){
    setSyncStatus("Offline (tylko lokalnie)");
  });
}

showGate("loading");
onAuthStateChanged(auth, function(user){
  if(!user){
    showGate("signin");
    return;
  }
  if(user.email !== ALLOWED_EMAIL){
    showGate("denied");
    return;
  }
  hideGate();
  setSyncStatus("Łączenie…");
  startSync();
});
</script>
